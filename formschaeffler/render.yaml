# Render Blueprint — Deploys the Python backend from /letter_backend
# Place this file at the REPO ROOT (not inside letter_backend/)
# Render will auto-detect it when you connect this repo as a Blueprint.

services:
  - type: web
    name: letter-backend
    runtime: python
    rootDir: letter_backend            # ← commands run inside this folder
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

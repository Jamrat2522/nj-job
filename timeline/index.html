<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a{touch-action:manipulation;-webkit-touch-callout:none;user-select:none}
body{background:#0d1117;font-family:'Sarabun',sans-serif;color:#e2e8f4}
button,input,textarea,select{font-family:'Sarabun',sans-serif!important}
.wrap{max-width:100%;margin:0 auto;min-height:100vh}
@media(min-width:900px){
  body{padding:0 20px}
  .wrap{max-width:1200px;width:100%}
  .mode-bar{margin:0 0 14px}
  .fix-bar{max-width:1200px}
}
.hdr{padding:22px 16px 46px;position:relative;overflow:hidden}
.blob{position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.hdr-inner{position:relative;display:flex;align-items:center;gap:12px}
.card{background:#161b27;border:1px solid #1e2d45;border-radius:14px;padding:14px;margin-bottom:10px}
.btn-green{width:100%;background:#06C755;border:none;border-radius:14px;padding:15px;color:white;font-size:15px;font-weight:800;cursor:pointer}
.btn-outline{width:100%;background:transparent;border:1.5px solid #1e2d45;border-radius:14px;padding:13px;color:#64748b;font-size:14px;cursor:pointer;margin-top:10px}
.inp{width:100%;background:#0d1117;border:1.5px solid #1e2d45;border-radius:10px;padding:11px 12px;color:#e2e8f4;font-size:14px;outline:none}
.inp:focus{border-color:#06C755}
textarea.inp{resize:none;min-height:80px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#161b27;border:1px solid #1e2d45;color:#e2e8f4;padding:12px 22px;border-radius:100px;font-size:14px;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:999;max-width:90vw;overflow:hidden;text-overflow:ellipsis;display:none}
.fix-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#0d1117;border-top:1px solid #1e2d45;padding:10px 13px 28px;z-index:100}
@media(max-width:900px){.fix-bar{max-width:100%}}
.mode-bar{display:flex;gap:6px;margin:0 13px 14px;flex-wrap:wrap}
.mode-btn{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid #1e2d45;background:#161b27;color:#64748b;font-size:clamp(11px,2vw,15px);font-weight:800;cursor:pointer;text-align:center;white-space:nowrap}
.mode-btn.active{color:white}
.filter-bar{display:flex;gap:8px;margin-bottom:12px}
.filter-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #1e2d45;background:#1a2540;color:#64748b;font-size:12px;font-weight:700;cursor:pointer}

.modal-box{background:#161b27;width:100%;border-radius:22px 22px 0 0;padding:22px 18px 44px;border-top:1px solid #1e2d45}
.timeline-dot{width:10px;height:10px;border-radius:50%;border:2px solid #0f172a;flex-shrink:0}
.status-btn{background:#1a2540;border:1.5px solid #1e2d45;border-radius:12px;padding:11px 10px;cursor:pointer;font-size:12px;color:#94a3b8;font-weight:500;text-align:left;line-height:1.4}

.status-btn.sel-delay{background:rgba(245,158,11,.1);border-color:#f59e0b;color:#f59e0b;font-weight:700}

.copy-btn span{font-size:18px}

.fl-drop .fl-item{padding:11px 14px;cursor:pointer;font-size:13px;color:#e2e8f4;border-bottom:1px solid #1e2d45;display:flex;align-items:center;justify-content:space-between}

.fl-drop .fl-add{padding:8px 10px;border-top:1.5px solid #2a3a54;background:#0d1117;display:flex;gap:8px;align-items:center}
.notif-badge{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%;background:#06C755;border:2px solid #0d1117}
.notif-log-item{padding:10px 12px;border-bottom:1px solid #1e2d45;font-size:12px;line-height:1.6}
.notif-log-item:last-child{border-bottom:none}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* contenteditable placeholder */
[contenteditable][data-ph]:empty::before{content:attr(data-ph);color:#475569;pointer-events:none;display:block}
[contenteditable]:focus{border-color:#06C755!important;outline:none}
/* Perf: smooth scrolling */
.card{will-change:auto;contain:content}
#jobListArea{-webkit-overflow-scrolling:touch;overflow-anchor:none}
/* ── Stale job alert ── */
#staleAlert{
  position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
  width:calc(100% - 20px);max-width:480px;
  background:#161b27;border:1.5px solid rgba(245,158,11,.55);
  border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.7);
  z-index:200;display:none;overflow:hidden;
  transition:border-color .3s
}
@media(min-width:900px){
  #staleAlert{left:auto;right:20px;transform:none;width:380px;bottom:24px}
  @keyframes slideInDesktop{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  #staleAlert.sa-in{animation:slideInDesktop .25s ease}
}
@media(max-width:899px){
  @keyframes slideInMobile{from{transform:translateX(-50%) translateY(14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
  #staleAlert.sa-in{animation:slideInMobile .25s ease}
}
.stale-row{background:#1a2540;border:1.5px solid rgba(245,158,11,.35);border-radius:10px;padding:8px 10px;margin-bottom:6px}
.stale-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.4);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;margin-top:3px}

const LINE_CFG_KEY="nj_line_cfg_v1";
const LINE_LOG_KEY="nj_line_log_v1";

function getLineCfg(){
  try{return JSON.parse(localStorage.getItem(LINE_CFG_KEY)||"{}"); }catch(e){return{};}
}
function saveLineCfg(cfg){
  try{localStorage.setItem(LINE_CFG_KEY,JSON.stringify(cfg));}catch(e){}
}
function getLineLog(){
  try{return JSON.parse(localStorage.getItem(LINE_LOG_KEY)||"[]");}catch(e){return[];}
}
function addLineLog(entry){
  try{
    const log=getLineLog();
    log.unshift({...entry,ts:new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"})});
    if(log.length>50)log.splice(50);
    localStorage.setItem(LINE_LOG_KEY,JSON.stringify(log));
  }catch(e){}
}

async function sendLineMsg(text){
  const cfg=getLineCfg();
  if(!cfg.enabled||!cfg.token||!cfg.groupId){return;}
  const payload={to:cfg.groupId,messages:[{type:"text",text}]};
  try{
    // Use corsproxy to bypass CORS for browser→LINE API
    const PROXY="https://corsproxy.io/?url=";
    const LINE_PUSH="https://api.line.me/v2/bot/message/push";
    const r=await fetch(PROXY+encodeURIComponent(LINE_PUSH),{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+cfg.token
      },
      body:JSON.stringify(payload)
    });
    const ok=r.ok||r.status===200;
    addLineLog({type:ok?"success":"error",text:text.substring(0,80)+(text.length>80?"...":""),status:r.status});
    return ok;
  }catch(err){
    addLineLog({type:"error",text:text.substring(0,80),status:"network error"});
    return false;
  }
}

const JOB_LIST_SELECT="id,customer,bl,customs,warehouse,date,mode,done,owner_id,owner_name,created_at,last_updated_at,foot_note";

async function loadJobsFromDB(){
  if(!CURRENT_USER)return;
  STATE.loading=true;
  const loadEl=document.getElementById("jobListArea");
  if(loadEl&&STATE.page==="list"){loadEl.innerHTML='<div style="text-align:center;color:#64748b;padding:40px 0;font-size:14px">⏳ กำลังโหลด...</div>';}
  else render();
  const role=CURRENT_USER.role;
  const canSeeAll=(role==="admin"||role==="superadmin");
  const q=canSeeAll
    ?"mode=eq."+STATE.mode+"&order=created_at.desc&select="+JOB_LIST_SELECT
    :"mode=eq."+STATE.mode+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&select="+JOB_LIST_SELECT;
  const rawJobs=await sbGet("nj_jobs",q);
  // Merge with cached entries so job detail stays intact if already loaded
  const jobs=(rawJobs||[]).map(j=>({
    ...j,
    entries:STATE._entriesCache[j.id]||[]
  }));
  STATE.jobs=jobs;
  STATE.loading=false;
  if(STATE.filter==="today"){
    const hasToday=jobs.filter(j=>!j.done&&getDaysDiff(j.date)===0).length>0;
    const hasPending=jobs.filter(j=>!j.done&&getDaysDiff(j.date)>0).length>0;
    if(!hasToday&&hasPending)STATE.filter="older";
    else if(!hasToday&&!hasPending)STATE.filter="today";
  }
  if(STATE.page==="list"&&document.getElementById("jobListArea")){
    STATE._listVisCount=PAGE_SIZE;
    renderFilterBar();
    renderListOnly();
  } else {
    render();
  }
  setTimeout(()=>{if(STATE.page==="list")checkStaleJobs(STATE.jobs);},800);
}

// ── PERF: Lazy-load entries for a single job ──────────────
async function loadJobEntries(id){
  const raw=await sbGet("nj_entries","job_id=eq."+id+"&order=created_at.asc&select=*");
  const entries=(raw||[]).map(e=>({...e}));
  STATE._entriesCache[id]=entries;
  STATE.jobs=STATE.jobs.map(j=>j.id===id?{...j,entries}:j);
  if(STATE.aid!==id||STATE.page!=="job")return;
  // อัปเดตเฉพาะส่วน timeline — ไม่ rebuild ทั้งหน้า
  const tlEl=document.getElementById("tlSection");
  const active=STATE.jobs.find(j=>j.id===id);
  if(!tlEl||!active){render();return;}
  const m=MODES[STATE.mode]||MODES.sea;
  const G=m.color,GL=m.gl;
  const isDone=active.done;
  const sortedE=[...entries].sort((a,b)=>{
    const da=a.entry_date||active.date||"";const db=b.entry_date||active.date||"";
    if(da!==db)return da.localeCompare(db);
    return a.time.localeCompare(b.time);
  });
  // อัปเดต badge จำนวน entries
  const badge=document.getElementById("tlBadge");
  if(badge)badge.textContent=sortedE.length+" รายการ";
  // Build timeline HTML
  let tlHtml="";
  if(!sortedE.length){
    tlHtml='<div style="text-align:center;color:#64748b;font-size:13px;padding:18px 0;line-height:1.8">ยังไม่มีรายการ<br/>เลือกสถานะและกด + เพิ่ม</div>';
  } else {
    sortedE.forEach((ent,i)=>{
      const dotColor=ent.type==="delay"?"#f59e0b":G;
      const timeColor=ent.type==="delay"?"#f59e0b":G;
      tlHtml+=`<div style="display:flex;position:relative">
        ${i<sortedE.length-1?`<div style="position:absolute;left:15px;top:30px;bottom:0;width:2px;background:#2a3a54;z-index:0"></div>`:""}
        <div style="width:30px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:8px;z-index:1">
          <div class="timeline-dot" style="background:${dotColor}"></div>
        </div>
        <div style="flex:1;background:#1e2a3d;border:1px solid #1e2d45;border-radius:12px;padding:10px 12px;margin-bottom:10px;position:relative">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <div style="font-family:monospace;font-size:11px;color:${timeColor};font-weight:600">⏰ ${ent.time.replace(":",".") }${ent.entry_date&&ent.entry_date!==active.date?` <span style="color:#64748b;font-size:10px">(${esc(ent.entry_date)})</span>`:""}</div>
          </div>
          <div style="font-size:13px;font-weight:600;color:#e2e8f4;line-height:1.4;padding-right:${!isDone?"36px":"0"}">${esc(ent.status)}</div>

// ── PERF: Get filtered jobs (shared by list + filter bar) ─
function getFilteredJobs(modeJobs,filter,search){
  const q=search&&search.trim()?search.trim().toLowerCase():null;
  return modeJobs.filter(j=>{
    if(filter==="done"&&!j.done)return false;
    if(filter==="today"&&(j.done||getDaysDiff(j.date)!==0))return false;
    if(filter==="yesterday"&&(j.done||getDaysDiff(j.date)!==1))return false;
    if(filter==="older"&&(j.done||getDaysDiff(j.date)<2))return false;
    if(q&&!j.bl.toLowerCase().includes(q)&&!j.customer.toLowerCase().includes(q))return false;
    return true;
  });
}

// ── PERF: Windowed list render (no full-page rebuild) ─────
function renderListOnly(){
  const listEl=document.getElementById("jobListArea");
  if(!listEl){render();return;}
  const{mode,filter,search,jobs}=STATE;
  const m=MODES[mode];
  const modeJobs=jobs.filter(j=>j.mode===mode);
  const filtered=getFilteredJobs(modeJobs,filter,search);
  if(!STATE._listVisCount)STATE._listVisCount=PAGE_SIZE;
  const vis=filtered.slice(0,STATE._listVisCount);
  const hasMore=filtered.length>STATE._listVisCount;
  if(!filtered.length){
    listEl.innerHTML=`<div style="text-align:center;color:#64748b;padding:40px 0;font-size:14px;line-height:2"><div style="font-size:40px;margin-bottom:10px">${m.icon}</div>${modeJobs.length===0?"ยังไม่มีงาน<br/>กด + เปิดงานใหม่":"ไม่พบผลการค้นหา"}</div>`;
    return;
  }
  // Build HTML with string concat (faster than map+join for large sets)
  let html="";
  for(let i=0;i<vis.length;i++)html+=renderJobCard(vis[i]);
  if(hasMore)html+=`<button onclick="STATE._listVisCount+=${PAGE_SIZE};renderListOnly()" style="width:100%;background:#1a2540;border:1.5px solid #1e2d45;border-radius:12px;padding:13px;color:#94a3b8;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px">⬇️ โหลดเพิ่ม ${filtered.length-STATE._listVisCount} รายการ</button>`;
  listEl.innerHTML=html;
}

async function silentRefresh(){
  if(!CURRENT_USER||STATE.page!=="list")return;
  const role=CURRENT_USER.role;
  const canSeeAll=(role==="admin"||role==="superadmin");
  const q=canSeeAll
    ?"mode=eq."+STATE.mode+"&order=created_at.desc&select="+JOB_LIST_SELECT
    :"mode=eq."+STATE.mode+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&select="+JOB_LIST_SELECT;
  const rawJobs=await sbGet("nj_jobs",q);
  if(!rawJobs)return;
  const jobs=rawJobs.map(j=>({...j,entries:STATE._entriesCache[j.id]||[]}));
  // Signature: id + done + last_updated_at (no entry count needed)
  const sig=j=>j.id+(j.done?"1":"0")+(j.last_updated_at||"");
  const newSig=jobs.map(sig).join("|");
  const oldSig=STATE.jobs.map(sig).join("|");
  if(newSig!==oldSig){
    STATE.jobs=jobs;
    if(document.getElementById("jobListArea")){
      renderFilterBar();
      renderListOnly();
    } else {
      render();
    }
    if(STATE.page==="list")checkStaleJobs(jobs);
  }
}

function todayStr(){const d=new Date();return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function nowTime(){const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,"0");}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function showToast(m){

// ── STALE JOB ALERT ───────────────────────────────────────
const STALE_HOURS=2;
const STALE_MS=STALE_HOURS*60*60*1000;

// นับจากเวลาอัปเดตล่าสุด — reset ทุกครั้งที่มีการบันทึก
function getJobLastActivity(job){
  // 1. last_updated_at (อัปเดตทุกครั้งที่ addEntry)
  if(job.last_updated_at){const d=new Date(job.last_updated_at);if(!isNaN(d))return d;}
  // 2. created_at fallback
  if(job.created_at){const d=new Date(job.created_at);if(!isNaN(d))return d;}
  // 3. date field fallback
  if(job.date){
    const p=job.date.split("/");
    if(p.length===3){const d=new Date(`${p[2]}-${p[1]}-${p[0]}T00:00:00`);if(!isNaN(d))return d;}
  }
  return null;
}

// backward compat alias
function getJobOpenedAt(job){return getJobLastActivity(job);}

// stale = ยังไม่จบ + ไม่มีการอัปเดตเกิน 2 ชม.
function isJobStale(job){
  if(job.done)return false;
  const last=getJobLastActivity(job);
  if(!last)return false;
  return(Date.now()-last.getTime())>=STALE_MS;
}

// แสดงว่าไม่ได้อัปเดตมานานแค่ไหน
function fmtTimeAgo(job){
  const last=getJobLastActivity(job);
  if(!last)return"ไม่ทราบ";
  const ms=Date.now()-last.getTime();
  const mins=Math.floor(ms/60000);
  const hrs=Math.floor(mins/60);
  if(hrs>=1)return hrs+" ชม. "+(mins%60)+" นาที";
  return mins+" นาที";
}

// แสดงเวลาอัปเดตล่าสุด (Thai format)
function fmtOpenedAt(job){
  const last=getJobLastActivity(job);
  if(!last)return"-";
  return last.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Bangkok"})+" น. ("+last.toLocaleDateString("th-TH",{day:"numeric",month:"short",timeZone:"Asia/Bangkok"})+")";
}

// Admin: single query ทุก mode ในครั้งเดียว
async function checkStaleJobsAdmin(){
  if(!CURRENT_USER)return;
  if(STATE.page!=="list"){dismissStaleAlert();return;}
  const staleSelect="id,customer,mode,done,created_at,owner_id,owner_name,bl,customs,warehouse,date,last_updated_at";
  const allModes=Object.keys(MODES).join(",");
  const raw=await sbGet("nj_jobs",
    "done=eq.false&mode=in.("+allModes+")&select="+staleSelect+"&order=created_at.asc"
  );
  // เช็คอีกครั้งหลัง fetch — user อาจเปลี่ยนหน้าระหว่าง fetch
  if(STATE.page!=="list"){dismissStaleAlert();return;}
  const stale=(raw||[]).filter(j=>isJobStale(j));
  if(stale.length>0)showStaleAlert(stale);
  else dismissStaleAlert();
}

function checkStaleJobs(jobs){
  if(!CURRENT_USER)return;
  // แสดงเฉพาะหน้า list เท่านั้น — ไม่แสดงตอนกรอกข้อมูล
  if(STATE.page!=="list"){dismissStaleAlert();return;}
  const cu=CURRENT_USER;
  const isAdmin=cu.role==="admin"||cu.role==="superadmin";
  if(isAdmin){checkStaleJobsAdmin();return;}
  const src=jobs||STATE.jobs||[];
  const mine=src.filter(j=>j.owner_id===cu.id||j.owner_name===cu.username);
  const stale=mine.filter(j=>isJobStale(j));
  if(stale.length>0)showStaleAlert(stale);
  else dismissStaleAlert();
}

function showStaleAlert(staleJobs){

  const c=staleJobs.length;
  const cu=CURRENT_USER||{};
  const isAdmin=cu.role==="admin"||cu.role==="superadmin";

  // Admin: จัดกลุ่มตาม owner_name
  let rows="";
  if(isAdmin){
    const byUser={};
    staleJobs.forEach(job=>{
      const u=job.owner_name||"ไม่ระบุ";
      if(!byUser[u])byUser[u]=[];
      byUser[u].push(job);
    });
    Object.keys(byUser).sort().forEach(uname=>{

function buildMsg(job,mk){
  const m=MODES[mk];const L=[];
  const icon=mk==="air"?"✈️":mk==="exp"?"📤":mk==="sebkk"?"🚤":"📦";
  L.push(icon+" อัปเดตสถานะงาน : "+m.label);
  L.push("ลูกค้า : "+job.customer);
  const bls=job.bl.split("\n").map(h=>h.trim()).filter(h=>h);
  if(bls.length===1)L.push(m.bl+": "+bls[0]);
  else bls.forEach((h,i)=>L.push(m.bl+" "+(i+1)+": "+h));
  if(job.customs)L.push("เลขใบขน : "+job.customs);
  if(job.warehouse)L.push("โกดัง : "+job.warehouse);
  L.push("");
  // Group entries by date
  const entries=[...(job.entries||[])].sort((a,b)=>{
    const da=a.entry_date||job.date||"";const db=b.entry_date||job.date||"";
    if(da!==db){
      const pa=da.split("/");const pb=db.split("/");
      const ta=pa.length===3?pa[2]+pa[1]+pa[0]:"";
      const tb=pb.length===3?pb[2]+pb[1]+pb[0]:"";
      if(ta!==tb)return ta.localeCompare(tb);
    }
    return a.time.localeCompare(b.time);
  });
  const dateGroups={};
  entries.forEach(e=>{
    const d=e.entry_date||job.date||"";
    if(!dateGroups[d])dateGroups[d]=[];
    dateGroups[d].push(e);
  });
  Object.keys(dateGroups).forEach(d=>{
    L.push("⏱ Timeline การดำเนินงาน");
    L.push("วันที่ : "+d);
    L.push("");
    dateGroups[d].forEach(e=>{
      L.push("• ⏰ "+e.time.replace(":",".") +"  "+e.status+(e.note?" ("+e.note+")":""));
    });
    L.push("");
  });
  if(job.foot_note)L.push("📝 หมายเหตุ : "+job.foot_note);
  return L.join("\n");
}

function doCopy(text,type){
  const doIt=()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    showToast("📋 Copy "+type+" สำเร็จ!");
  };
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showToast("📋 Copy "+type+" สำเร็จ!")).catch(doIt);
  else doIt();
}

async function addEntry(){
  const ms=STATE.multiSel&&STATE.multiSel.length>0?[...STATE.multiSel]:null;
  let status=STATE.sel;
  if(!ms&&!status){showToast("⚠️ กรุณาเลือกสถานะก่อน");return;}
  if(!ms&&status==="__custom__"){if(!STATE.custom.trim()){showToast("⚠️ กรุณาพิมพ์สถานะ");return;}status=STATE.custom.trim();}
  showToast("⏳ กำลังบันทึก...");
  const time=STATE.eTime||nowTime();
  const finalStatus=ms?ms.join(" + "):status;
  // อ่านหมายเหตุจาก STATE.eNote (บันทึกโดย prompt dialog)
  const noteEl=document.getElementById("eNoteArea");
  const note=noteEl?noteEl.value.trim():STATE.eNote.trim();
  const active=STATE.jobs.find(j=>j.id===STATE.aid);
  const isDup=active&&(active.entries||[]).some(e=>e.status===finalStatus);
  if(isDup&&!STATE.dupWarn){setState({dupWarn:true});showToast("⚠️ สถานะนี้เคยเพิ่มไปแล้ว!");return;}
  const entry={id:uid(),job_id:STATE.aid,time,status:finalStatus,note,type:STATE.tab,created_by:(CURRENT_USER&&CURRENT_USER.username)?CURRENT_USER.username:"Unknown",entry_date:STATE.eDate||todayStr()};
  const ok=await sbInsert("nj_entries",entry);
  if(!ok){showToast("❌ บันทึกไม่สำเร็จ! เช็ค Supabase");return;}
  // Stamp last_updated_at on the job
  const now=new Date().toISOString();
  await sbUpdate("nj_jobs",STATE.aid,{last_updated_at:now});
  const updatedEntries=[...(STATE._entriesCache[STATE.aid]||[]),entry];
  STATE._entriesCache[STATE.aid]=updatedEntries;
  const jobs=STATE.jobs.map(j=>{
    if(j.id===STATE.aid)return{...j,entries:updatedEntries,last_updated_at:now};
    return j;
  });
  // Dismiss stale alert for this job if it was shown
  dismissStaleAlert();
  setState({jobs,sel:null,multiSel:[],custom:"",eTime:"",eDate:todayStr(),eNote:"",dupWarn:false,lastSaved:time});
  // Clear persistent note input
  const _ni=document.getElementById("eNoteArea");
  if(_ni)_ni.value="";
  showToast("💾 บันทึกสำเร็จ "+time+" น. แล้ว!");
  // ถ้ามาจาก stale alert → แสดง updated popup แทน (อยู่บนหน้างาน)
  if(STATE._alertJobData){
    const _updatedJob=jobs.find(j=>j.id===STATE.aid)||active;
    // อัปเดต last_updated_at ใน _alertJobData เพื่อ reset timer
    STATE._alertJobData={...STATE._alertJobData,last_updated_at:now};
    setTimeout(()=>showUpdatedPopup(_updatedJob,time),200);
  }
  // LINE notify entry
  const _lcfg=getLineCfg();
  const _isDelay=STATE.tab==="delay";
  if(_lcfg.enabled&&((_isDelay&&_lcfg.delay!==false)||(!_isDelay&&_lcfg.entry!==false))){
    const _activeJob=jobs.find(j=>j.id===STATE.aid)||active;
    sendLineMsg(buildLineEntryMsg(_activeJob,entry,STATE.mode));
  }
}

function exportCSV(){
  const{expDate,mode}=STATE;const m=MODES[mode];
  const list=STATE.jobs.filter(j=>j.mode===mode&&j.date===expDate.trim());
  if(!list.length){showToast("⚠️ ไม่พบงานในวันที่ "+expDate);return;}
  const eq=v=>'"'+String(v).replace(/"/g,'""')+'"';
  const rows=[[" วันที่","ลูกค้า",m.bl,"เลขใบขน","โกดัง","สถานะงาน","เวลา","สถานะ","หมายเหตุ","หมายเหตุท้าย"].map(eq).join(",")];
  list.forEach(job=>{
    const s=job.done?"จบงาน":"กำลังดำเนินการ";
    const blD=job.bl.split("\n").filter(h=>h.trim()).map(h=>h.trim()).join(", ");
    const se=[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time));
    if(!se.length){rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,"","(ยังไม่มี)","",job.foot_note||""].map(eq).join(","));}
    else se.forEach((e,i)=>rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,e.time.replace(":","."),e.status,e.note||"",i===0?(job.foot_note||""):""].map(eq).join(",")));
  });
  const csv="\uFEFF"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=mode.toUpperCase()+"-"+expDate.replace(/\//g,"-")+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  setState({showExp:false});showToast("✅ Export สำเร็จ "+list.length+" งาน");
}

async function doLogin(){
  const u=STATE.loginUser.trim();
  const p=STATE.loginPass.trim();
  if(!u||!p){setState({loginErr:"กรุณากรอกให้ครบ"});return;}
  setState({loginErr:"⏳ กำลังตรวจสอบ..."});
  
  let found=null;
  // 1. Check Supabase FIRST (source of truth ข้ามเครื่องได้)
  try{
    const all=await sbGet("users","select=*");
    if(all&&all.length>0){
      const sbFound=all.find(x=>x.username===u&&x.password===p);
      if(sbFound)found={...sbFound,_fromSupabase:true};
    }
  }catch(e){}
  
  // 2. Fallback to localStorage (กรณี offline หรือ Supabase fail)
  if(!found){
    const localUsers=getLocalUsers();
    found=localUsers.find(x=>x.username===u&&x.password===p);
    // ถ้าเจอใน localStorage แต่ไม่มีใน Supabase → sync ขึ้น Supabase
    if(found){
      try{
        const sbCheck=await sbGet("users","id=eq."+found.id+"&select=id");
        if(!sbCheck||sbCheck.length===0){
          await sbInsert("users",found);
        }
      }catch(e){}
    }
  }
  
  if(found){
    if(found.status==="pending"){
      setState({loginErr:"⏳ รอ Admin อนุมัติบัญชีของคุณก่อนครับ"});return;
    }
    // Accept approved, active, or any non-pending status
    CURRENT_USER=found;
    localStorage.setItem("nj_cu",JSON.stringify(found));
    // Load LINE cfg into state
    const lcfg=getLineCfg();
    STATE.lineToken=lcfg.token||"";STATE.lineGroupId=lcfg.groupId||"";STATE.lineEnabled=lcfg.enabled||false;
    STATE.lineNotifNewJob=lcfg.newJob!==false;STATE.lineNotifEntry=lcfg.entry!==false;
    STATE.lineNotifDone=lcfg.done!==false;STATE.lineNotifDelay=lcfg.delay!==false;
    setState({loginErr:""});
    loadJobsFromDB(); // loadJobsFromDB will call checkStaleJobs after loading
  } else {
    setState({loginErr:"Username หรือ Password ไม่ถูกต้อง"});
  }
}

  // Check duplicate in Supabase (source of truth)

    if(all&&all.length>0){setState({regErr:"Username นี้มีอยู่แล้ว"});return;}
  }catch(e){}

  const newU={id:uid(),username:regUser.trim(),password:regPass.trim(),role:"user",status:"pending"};

  else{setState({regErr:"เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง"});}

async function loadUserList(){
  let users=[];
  try{
    const sbUsers=await sbGet("users","order=created_at.asc&select=*");
    const localUsers=getLocalUsers();
    if(sbUsers&&sbUsers.length>0){
      // Merge: ใช้ Supabase เป็นหลัก แต่เพิ่ม user จาก localStorage ที่ยังไม่มีใน Supabase
      const sbIds=new Set(sbUsers.map(u=>u.id));
      const sbNames=new Set(sbUsers.map(u=>u.username));
      const localOnly=localUsers.filter(u=>!sbIds.has(u.id)&&!sbNames.has(u.username));
      users=[...sbUsers,...localOnly];
    } else {
      users=localUsers;
    }
  }catch(e){users=getLocalUsers();}
  setState({userList:users});
}

async function approveUser(id){
  const localUsers=getLocalUsers();
  const targetUser=localUsers.find(u=>u.id===id);
  // If user exists in localStorage but not yet in Supabase, insert first
  if(targetUser){
    try{
      const sbCheck=await sbGet("users","id=eq."+id+"&select=id");
      if(!sbCheck||sbCheck.length===0){
        await sbInsert("users",{...targetUser,status:"approved"});
      } else {
        await sbUpdate("users",id,{status:"approved"});
      }
    }catch(e){}
  } else {
    await sbUpdate("users",id,{status:"approved"});
  }
  const updatedLocal=localUsers.map(u=>u.id===id?{...u,status:"approved"}:u);

function exportReportExcel(jobs, filename){

  const rows=[["Mode","วันที่","ลูกค้า","B/L","เลขใบขน","โกดัง","สถานะงาน","เวลา","สถานะ Timeline","หมายเหตุ","ผู้บันทึก","วันที่บันทึก"].map(eq).join(",")];
  jobs.forEach(job=>{

      return da!==db?da.localeCompare(db):a.time.localeCompare(b.time);
    });
    if(!entries.length){
      rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",s,"","(ยังไม่มี)","",job.owner_name||"",job.date].map(eq).join(","));
    } else {
      entries.forEach((e,i)=>rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",s,e.time.replace(":","."),e.status,e.note||"",e.created_by||"",e.entry_date||job.date].map(eq).join(",")));
    }
  });
  const csv="﻿"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("✅ Export สำเร็จ!");
}

function getDaysDiff(dateStr){
  // dateStr format: DD/MM/YYYY
  if(!dateStr||typeof dateStr!=='string')return 0;
  try{
    const p=dateStr.split("/");
    if(p.length!==3)return 0;
    const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    const today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);
    return Math.floor((today-d)/(1000*60*60*24));
  }catch(e){return 0;}
}
function getDayLabel(job){
  if(job.done)return null;
  const diff=getDaysDiff(job.date);
  if(diff===0)return{label:"วันนี้",color:"#06C755",bg:"rgba(6,199,85,.15)"};
  if(diff===1)return{label:"ค้างจากเมื่อวาน",color:"#f59e0b",bg:"rgba(245,158,11,.15)"};
  if(diff>1)return{label:"ค้าง "+diff+" วัน",color:"#ef4444",bg:"rgba(239,68,68,.15)"};
  return{label:"วันนี้",color:"#06C755",bg:"rgba(6,199,85,.15)"};
}

let _flTarget=null; // 'cust' or 'wh'

function renderDrop(q, G, mode, type){
  const isAdmin=CURRENT_USER&&(CURRENT_USER.role==='admin'||CURRENT_USER.role==='superadmin');
  const drop=document.getElementById('flDrop');
  if(!drop)return;
  const allItems=type==='cust'?getAllCustomers():getAllWarehouses(mode);

  let html='';
  filtered.forEach((x,i)=>{
    const isCustom=type==='cust'?getCustomCustomers().includes(x):getCustomWarehouses(mode).includes(x);

      <span style="flex:1" onclick="pickDrop(${i},'${type}','${mode}')">${x.replace(/</g,'&lt;')}${isCustom?' <span style="font-size:10px;color:#64748b">(เพิ่มเอง)</span>':''}</span>
      ${canDel?`<span onclick="delDrop(${i},'${type}','${mode}')" style="color:#ef4444;font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(239,68,68,.1);margin-left:8px;flex-shrink:0">ลบ</span>`:''}
    </div>`;
  });
  if(filtered.length===0){
    html+=`<div style="padding:10px 14px;color:#64748b;font-size:13px">ไม่พบ "${q}"</div>`;
  }
  if(isAdmin){
    html+=`<div class="fl-add">

  const ql=inp?inp.value.toLowerCase():'';

        <textarea class="inp" id="editBl" style="min-height:50px">${esc(active.bl)}</textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:11px;color:#64748b;margin-bottom:4px">เลขใบขน</div>
          <input class="inp" id="editCustoms" value="${esc(active.customs||'')}" placeholder="เลขใบขน"/>
        </div>
        <div>
          <div style="font-size:11px;color:#64748b;margin-bottom:4px">โกดัง</div>
          <input class="inp" id="editWarehouse" value="${esc(active.warehouse||'')}" placeholder="โกดัง"/>
        </div>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:11px;color:#64748b;margin-bottom:4px">วันที่</div>
        <input class="inp" id="editDate" value="${esc(active.date||'')}" placeholder="DD/MM/YYYY"/>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="saveJobInfo('${aid}')" style="flex:1;background:${G};border:none;border-radius:10px;padding:11px;color:white;font-size:14px;font-weight:800;cursor:pointer">💾 บันทึก</button>
        <button onclick="setState({editJobInfo:false})" style="background:#1a2540;border:1px solid #1e2d45;border-radius:10px;padding:11px 14px;color:#64748b;font-size:13px;cursor:pointer">ยกเลิก</button>
      </div>
    </div>`:""}
    ${!isDone?`<div style="background:#161b27;border:1px solid #1e2d45;border-radius:18px;padding:16px;margin:-26px 13px 0;position:relative;z-index:10;box-shadow:0 12px 40px rgba(0,0,0,.45)">
      <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center">
        <div style="background:#0d1117;border:1.5px solid #1e2d45;border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer;position:relative;overflow:hidden" onclick="document.getElementById('timePicker').showPicker&&document.getElementById('timePicker').showPicker()">
          <span>⏰</span>
          <span style="font-family:monospace;font-size:15px;font-weight:600;color:${eTime?G:"#64748b"};letter-spacing:1px">${eTime||"--:--"}</span>
          <input id="timePicker" type="time" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%" onchange="STATE.eTime=this.value;render()"/>
        </div>
        <label style="background:#0d1117;border:1.5px solid #1e2d45;border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;cursor:pointer;position:relative;overflow:hidden">
          <span>📅</span>
          <span style="font-family:monospace;font-size:13px;font-weight:600;color:#64748b">${STATE.eDate||todayStr()}</span>
          <input type="date" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;color-scheme:dark" onchange="var p=this.value.split('-');if(p.length===3){STATE.eDate=p[2]+'/'+p[1]+'/'+p[0];render();}"/>
        </label>
        <button onclick="var v=prompt('📝 หมายเหตุ:',STATE.eNote||'');if(v!==null){STATE.eNote=v;render();}" style="flex:1;background:${eNote?G:'#0d1117'};border:1.5px solid ${eNote?G:'#1e2d45'};border-radius:10px;padding:9px 10px;color:${eNote?'#0d1117':G};font-size:12px;font-weight:700;cursor:pointer;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${eNote?'📝 '+esc(eNote):'📝 หมายเหตุ...'}
        </button>
      </div>
      ${sel&&eTime&&!dupWarn?`<div style="background:${GL};border:1px solid ${G};border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:${G};font-weight:600">✓ จับเวลา ${eTime} น. · ${sel==="__custom__"?"สถานะกำหนดเอง":esc(sel)}</div>`:""}
      ${dupWarn?`<div style="background:rgba(239,68,68,.1);border:1.5px solid #ef4444;border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:13px;color:#ef4444;font-weight:700;margin-bottom:4px">⚠️ สถานะนี้เคยเพิ่มไปแล้ว!</div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:10px">ต้องการเพิ่มซ้ำ หรือเลือกสถานะใหม่?</div>
        <div style="display:flex;gap:8px">
          <button onclick="setState({sel:null,eTime:'',dupWarn:false})" style="flex:1;background:#1a2540;border:1px solid #1e2d45;border-radius:8px;padding:9px;color:#94a3b8;font-size:13px;font-weight:700;cursor:pointer">🔄 เลือกใหม่</button>
          <button onclick="var s=STATE.sel==='__custom__'?STATE.custom.trim():STATE.sel;var t=STATE.eTime||nowTime();var entry={id:uid(),time:t,status:s,note:STATE.eNote.trim(),type:STATE.tab};var jobs=STATE.jobs.map(j=>j.id===STATE.aid?{...j,entries:[...(j.entries||[]),entry]}:j);setState({jobs,sel:null,custom:'',eTime:'',eNote:'',dupWarn:false});showToast('✅ เพิ่ม '+t+' น. เรียบร้อย')" style="flex:1;background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:8px;padding:9px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer">⚠️ เพิ่มซ้ำได้</button>
        </div>
      </div>`:""}
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="tab-btn${tab==="normal"?" active-normal":""}" onclick="setState({tab:'normal',sel:null,custom:'',dupWarn:false})">✅ สถานะปกติ</button>
        <button class="tab-btn${tab==="delay"?" active-delay":""}" onclick="setState({tab:'delay',sel:null,custom:'',dupWarn:false})">⚠️ ล่าช้า/ปัญหา</button>
      </div>
      <div style="font-size:10px;color:#64748b;margin-bottom:6px;font-weight:600">💡 กดเลือกได้หลายสถานะ รวมด้วย <b style="color:${ac}">+</b></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${curList.map((s,si)=>{
          const ms=STATE.multiSel||[];
          const on=ms.includes(s);
          return `<button class="status-btn${on?" sel-"+tab:""}" onclick="toggleMultiSel(${si},'${tab}')">${esc(s)}${on?" ✓":""}</button>`;
        }).join("")}
        <button class="status-btn${sel==="__custom__"?" sel-"+tab:""}" style="grid-column:span 2;text-align:center" onclick="setState({sel:'__custom__',multiSel:[],eTime:nowTime(),dupWarn:false})">✏️ อื่นๆ (พิมพ์เอง)</button>
      </div>
      ${(STATE.multiSel&&STATE.multiSel.length>0)?`<div style="margin-top:8px;background:${ab};border:1.5px solid ${ac};border-radius:10px;padding:8px 12px;font-size:12px;color:${ac};font-weight:700;line-height:1.7">✓ เลือกแล้ว:<br/>${esc(STATE.multiSel.join(" + "))}</div>`:""}
      ${sel==="__custom__"?`<input class="inp" style="margin-top:10px;border-color:${G}" value="${esc(custom)}" oninput="STATE.custom=this.value" placeholder="พิมพ์สถานะ..." autofocus/>`:""}
      <button onclick="addEntry()" style="width:100%;margin-top:10px;background:${(STATE.multiSel&&STATE.multiSel.length>0)||sel?G:'#2a3a54'};border:none;border-radius:12px;padding:14px;color:white;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        <span style="font-size:20px">💾</span>
        <span>${(STATE.multiSel&&STATE.multiSel.length>0)?"บันทึก "+STATE.multiSel.length+" สถานะ":sel?"บันทึกลง Timeline":"เลือกสถานะก่อน"}</span>
      </button>
    </div>`:""}
    <div style="padding:0 13px;margin-top:18px">
      <div style="font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;gap:6px">
        ⏱ Timeline<span id="tlBadge" style="background:${GL};color:${G};border-radius:20px;padding:1px 10px;font-size:10px;margin-left:4px">${sortedE.length} รายการ</span>
      </div>
      <div id="tlSection">
      ${sortedE.length===0?`<div style="text-align:center;color:#64748b;font-size:13px;padding:18px 0;line-height:1.8">ยังไม่มีรายการ<br/>เลือกสถานะและกด + เพิ่ม</div>`:""}
      ${sortedE.map((ent,i)=>{
        const isEditing=editEId===ent.id;
        const dotColor=ent.type==="delay"?"#f59e0b":G;
        const timeColor=ent.type==="delay"?"#f59e0b":G;
        return `<div style="display:flex;position:relative">
          ${i<sortedE.length-1?`<div style="position:absolute;left:15px;top:30px;bottom:0;width:2px;background:#2a3a54;z-index:0"></div>`:""}
          <div style="width:30px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:8px;z-index:1">
            <div class="timeline-dot" style="background:${dotColor}"></div>
          </div>
          <div style="flex:1;background:#1e2a3d;border:1px solid #1e2d45;border-radius:12px;padding:10px 12px;margin-bottom:10px;position:relative">
            ${isEditing?`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
              <input type="time" value="${ent.time}" onchange="STATE.editTime=this.value" style="background:#0d1117;border:1.5px solid ${G};border-radius:8px;padding:6px 10px;color:#e2e8f4;font-size:14px;outline:none;font-family:monospace;flex:1;color-scheme:dark"/>
              <button onclick="updateEntryTime('${ent.id}',STATE.editTime||'${ent.time}')" style="background:${G};border:none;border-radius:8px;padding:6px 12px;color:white;font-size:12px;font-weight:700;cursor:pointer">✓ บันทึก</button>
              <button onclick="setState({editEId:null,editTime:''})" style="background:#1a2540;border:1px solid #1e2d45;border-radius:8px;padding:6px 10px;color:#64748b;font-size:12px;cursor:pointer">✕</button>
            </div>`:`<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
              <div style="font-family:monospace;font-size:11px;color:${timeColor};font-weight:600">⏰ ${ent.time.replace(":",".") }${ent.entry_date&&ent.entry_date!==active.date?` <span style="color:#64748b;font-size:10px">(${esc(ent.entry_date)})</span>`:""}</div>
              ${(!isDone)?`<button onclick="setState({editEId:'${ent.id}',editTime:'${ent.time}'})" style="background:rgba(100,116,139,.15);border:1px solid #1e2d45;border-radius:6px;padding:3px 8px;color:#64748b;font-size:11px;cursor:pointer">✏️ แก้เวลา</button>`:""}
            </div>`}
            <div style="font-size:13px;font-weight:600;color:#e2e8f4;line-height:1.4;padding-right:${!isDone&&!isEditing?"36px":"0"}">${esc(ent.status)}</div>
            ${ent.note?`<div style="font-size:12px;color:#64748b;margin-top:3px">📌 ${esc(ent.note)}</div>`:""}
            <div style="font-size:11px;font-weight:600;margin-top:5px;display:inline-flex;align-items:center;gap:4px;background:rgba(100,116,139,.18);border-radius:20px;padding:2px 9px"><span>👤</span><span style="color:#94a3b8">${esc(ent.created_by||"ไม่ระบุ")}</span></div>
            ${(!isDone)?`<button onclick="removeEntry('${ent.id}')" style="position:absolute;top:8px;right:8px;background:rgba(239,68,68,.15);border:1px solid #ef4444;border-radius:8px;padding:4px 10px;color:#ef4444;font-size:11px;font-weight:700;cursor:pointer">🗑 ลบ</button>`:""}
          </div>
        </div>`;
      }).join("")}
      </div>
    </div>

    <div style="padding:12px 13px 0">
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="setState({showPrev:!STATE.showPrev})" style="background:#1a2540;border:1px solid #1e2d45;border-radius:12px;padding:9px 16px;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer">
          ${showPrev?"▲ ซ่อนตัวอย่าง":"▼ ดูตัวอย่างข้อความ"}
        </button>
        ${!isDone?`<button onclick="setState({editJobInfo:!STATE.editJobInfo})" style="background:${STATE.editJobInfo?"rgba(6,199,85,.15)":"#1a2540"};border:1.5px solid ${STATE.editJobInfo?"#06C755":"#1e2d45"};border-radius:12px;padding:9px 14px;color:${STATE.editJobInfo?"#06C755":"#94a3b8"};font-size:13px;font-weight:700;cursor:pointer">✏️ แก้ไขงาน</button>`:""}
      </div>
      ${showPrev?`<div style="margin-top:10px;background:#161b27;border:1px solid #1e2d45;border-radius:12px;padding:14px;font-family:monospace;font-size:11.5px;line-height:2;color:#e2e8f4;white-space:pre-wrap">${esc(buildMsg(active,mode))}</div>`:""}
    </div>
    <div style="height:130px"></div>
    <div class="fix-bar">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        ${isDone
          ?`<div style="background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800;color:#ef4444;display:flex;align-items:center;gap:6px">🔒 ปิดแก้ไขแล้ว — งานจบแล้ว</div>`
          :`<div style="display:flex;gap:8px;flex:1">
              <button onclick="addEntry()" style="flex:1;background:${(sel||(STATE.multiSel&&STATE.multiSel.length>0))?G:'#2a3a54'};border:none;border-radius:10px;padding:9px 16px;color:${(sel||(STATE.multiSel&&STATE.multiSel.length>0))?'white':'#64748b'};font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;${(sel||(STATE.multiSel&&STATE.multiSel.length>0))?'box-shadow:0 3px 12px '+GL:''}"><span>💾</span><span>${(STATE.multiSel&&STATE.multiSel.length>0)?"บันทึก "+STATE.multiSel.length+" สถานะ":sel?"บันทึกลง Timeline":"เลือกสถานะก่อน"}</span></button>
              ${(!isDone&&(isSuperAdmin||isAdmin||(active&&active.owner_id===CU.id)))?`<button onclick="toggleDone('${aid}')" style="background:rgba(100,116,139,.15);border:1px solid #64748b;border-radius:10px;padding:9px 16px;color:#94a3b8;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap">✅ จบงาน</button>`:""}
            </div>`
        }
        ${STATE.lastSaved?`<span style="font-size:11px;color:#06C755;font-weight:600">✅ บันทึก ${STATE.lastSaved} น.</span>`:""}
      </div>
      <div style="font-size:10px;color:#64748b;text-align:center;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Copy รูปแบบ</div>
      <div style="display:flex;gap:8px">
        <button class="copy-btn" style="border:1.5px solid ${G};color:${G}" onclick="doCopy(buildMsg(STATE.jobs.find(j=>j.id===STATE.aid),STATE.mode),'LINE')">
          <span>💚</span><span style="font-size:13px">LINE</span>
        </button>
        <button class="copy-btn" style="border:1.5px solid #3b82f6;color:#3b82f6" onclick="var job=STATE.jobs.find(j=>j.id===STATE.aid);var m=MODES[STATE.mode];var L=[]; L.push('อัปเดตสถานะงาน : '+m.label);L.push('ลูกค้า : '+job.customer);var bls=job.bl.split('\n').map(h=>h.trim()).filter(h=>h);if(bls.length===1)L.push(m.bl+': '+bls[0]);else bls.forEach((h,i)=>L.push(m.bl+' '+(i+1)+': '+h));if(job.customs)L.push('เลขใบขน : '+job.customs);if(job.warehouse)L.push('โกดัง : '+job.warehouse);L.push('');L.push('Timeline การดำเนินงาน');L.push('วันที่ : '+job.date);L.push('');[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time)).forEach(e=>{L.push('  '+e.time.replace(':','.')+' '+e.status+(e.note?' ('+e.note+')':''))});if(job.foot_note)L.push('\nหมายเหตุ : '+job.foot_note);doCopy(L.join('\n'),'Word')">
          <span>📝</span><span style="font-size:13px">Word</span>
        </button>
        <button class="copy-btn" style="border:1.5px solid #a855f7;color:#a855f7" onclick="var job=STATE.jobs.find(j=>j.id===STATE.aid);var m=MODES[STATE.mode];var bls=job.bl.split('\n').map(h=>h.trim()).filter(h=>h);var L=[];L.push('Subject: อัปเดตสถานะงาน '+m.label+' | '+job.customer+' | '+m.bl+': '+bls.join(', '));L.push('');L.push('เรียน ทีมงาน / ลูกค้า');L.push('');L.push('ขอแจ้งอัปเดตสถานะงาน ดังนี้');L.push('');L.push('ลูกค้า       : '+job.customer);if(bls.length===1)L.push(m.bl+'          : '+bls[0]);else bls.forEach((h,i)=>L.push(m.bl+' '+(i+1)+'       : '+h));if(job.customs)L.push('เลขใบขน     : '+job.customs);if(job.warehouse)L.push('โกดัง       : '+job.warehouse);L.push('วันที่       : '+job.date);L.push('');L.push('Timeline การดำเนินงาน');L.push('─────────────────────────');[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time)).forEach(e=>{L.push('  '+e.time.replace(':','.')+' น.   '+e.status+(e.note?' ('+e.note+')':''))});L.push('─────────────────────────');if(job.foot_note){L.push('');L.push('หมายเหตุ : '+job.foot_note)}L.push('');L.push('ขอแสดงความนับถือ');doCopy(L.join('\n'),'Email')">
          <span>📧</span><span style="font-size:13px">Email</span>
        </button>
      </div>
    </div>`;
  }

  document.getElementById("app").innerHTML=html;

  // Restore search input value and focus after render
  const si=document.getElementById("searchInp");
  if(si){
    si.value=STATE.search||"";
    if(STATE._searchFocused){
      si.focus();
      const len=si.value.length;
      si.setSelectionRange(len,len);
    }
  }
  // Restore warehouse input value
  const wi=document.getElementById("whInp");
  if(wi)wi.value=STATE.nWarehouse||"";
  // Restore customer input value
  const ci=document.getElementById("custInp");
  if(ci)ci.value=STATE.nCust||"";
  // Restore note input value after render (e.g. when time/date is picked)
  const ni=document.getElementById("eNoteArea");
  if(ni&&STATE.eNote)ni.value=STATE.eNote;
  // Restore new job form values after render (e.g. when date changes)
  const ci2=document.getElementById("custInp"); if(ci2&&STATE.nCust)ci2.value=STATE.nCust;
  const bi=document.getElementById("blInp"); if(bi&&STATE.nBl)bi.value=STATE.nBl;
  const xi=document.getElementById("customsInp"); if(xi&&STATE.nCustoms)xi.value=STATE.nCustoms;
  const wi2=document.getElementById("whInp"); if(wi2&&STATE.nWarehouse)wi2.value=STATE.nWarehouse;
  // Restore admin search input
  const asi=document.getElementById("adminSearchInp");
  if(asi){
    asi.value=STATE.adminSearch||"";
    if(STATE._adminSearchFocused){
      const l=asi.value.length;
      asi.focus();
      asi.setSelectionRange(l,l);
    }
  }
}

if(CURRENT_USER){
  loadJobsFromDB();
} else {
  render();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>N.J.LOGISTIC & FRUIT CO.,LTD - Import Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a{touch-action:manipulation;-webkit-touch-callout:none;user-select:none}
body{background:#0d1117;font-family:'Sarabun',sans-serif;color:#e2e8f4}
button,input,textarea,select{font-family:'Sarabun',sans-serif!important}
.wrap{max-width:100%;margin:0 auto;min-height:100vh}
@media(min-width:900px){
  body{padding:0 20px}
  .wrap{max-width:1200px;width:100%}
  .mode-bar{margin:0 0 14px}
  .fix-bar{max-width:1200px}
}
.hdr{padding:22px 16px 46px;position:relative;overflow:hidden}
.blob{position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.hdr-inner{position:relative;display:flex;align-items:center;gap:12px}
.card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:12px;margin-bottom:10px;contain:layout paint}
.btn-green{width:100%;background:#06C755;border:none;border-radius:14px;padding:15px;color:white;font-size:15px;font-weight:800;cursor:pointer}
.btn-outline{width:100%;background:transparent;border:1.5px solid #1e2d45;border-radius:14px;padding:13px;color:#64748b;font-size:14px;cursor:pointer;margin-top:10px}
.inp{width:100%;background:#0d1117;border:1.5px solid #1e2d45;border-radius:10px;padding:11px 12px;color:#e2e8f4;font-size:14px;outline:none}
.inp:focus{border-color:#06C755}
textarea.inp{resize:none;min-height:80px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#161b27;border:1px solid #1e2d45;color:#e2e8f4;padding:12px 22px;border-radius:100px;font-size:14px;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:999;max-width:90vw;overflow:hidden;text-overflow:ellipsis;display:none}
.fix-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#0d1117;border-top:1px solid #1e2d45;padding:10px 13px 28px;z-index:100}

.mode-btn.active{color:white}
.filter-bar{display:flex;gap:8px;margin-bottom:12px}

.timeline-dot{width:10px;height:10px;border-radius:50%;border:2px solid #0f172a;flex-shrink:0}

.status-btn.sel-normal{background:rgba(6,199,85,.11);border-color:#06C755;color:#06C755;font-weight:700}

.tab-btn{flex:1;padding:9px 6px;border-radius:10px;border:1.5px solid #1e2d45;background:#1a2540;color:#64748b;font-size:13px;font-weight:700;cursor:pointer}
.tab-btn.active-normal{background:rgba(6,199,85,.11);border-color:#06C755;color:#06C755}
.tab-btn.active-delay{background:rgba(245,158,11,.1);border-color:#f59e0b;color:#f59e0b}

.fl-drop{position:fixed;background:#161b27;border:1.5px solid #06C755;border-radius:12px;max-height:240px;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:9999;display:none}
.fl-drop .fl-item{padding:11px 14px;cursor:pointer;font-size:13px;color:#e2e8f4;border-bottom:1px solid #1e2d45;display:flex;align-items:center;justify-content:space-between}
.fl-drop .fl-item:hover{background:rgba(255,255,255,.05)}
.fl-drop .fl-add{padding:8px 10px;border-top:1.5px solid #2a3a54;background:#0d1117;display:flex;gap:8px;align-items:center}
/* ========== SIDEBAR LAYOUT (V.4 DECORATION) ========== */
.app-shell{display:flex;min-height:100vh;position:relative}
.sidebar{width:248px;background:#0d1117;border-right:1px solid #1e2d45;flex-shrink:0;overflow-y:auto;padding:0}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:3px}
.main-content{flex:1;min-width:0;overflow-x:hidden;padding-bottom:40px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;backdrop-filter:blur(3px)}
.mobile-topbar{display:none}

  .sidebar{position:fixed;top:0;left:-320px;height:100vh;z-index:500;transition:left .25s ease;box-shadow:4px 0 30px rgba(0,0,0,.5);width:285px;will-change:transform;-webkit-overflow-scrolling:touch}
  .sidebar.open{left:0}
  .sb-overlay{will-change:opacity}
  .sb-overlay.show{display:block}
  .mobile-topbar{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#0d1117;border-bottom:1px solid #1e2d45;position:sticky;top:0;z-index:100}
  body{padding:0;-webkit-overflow-scrolling:touch}
  .wrap{max-width:100%}
  /* Mobile: scroll smoothing for main content */
  .main-content{-webkit-overflow-scrolling:touch}
}
@media(min-width:901px){
  /* Grid shell: sidebar + content 1fr (no empty right-space) */

  .wrap{max-width:100%!important;width:100%!important}
  .app-shell{display:grid;grid-template-columns:228px 1fr;min-height:100vh}
  .sidebar{width:228px;position:static;left:auto}
  .sidebar .sb-header{padding:18px 16px 16px}
  .sidebar .sb-user{padding:14px 16px}
  .main-content{max-width:100%;min-width:0}
  .main-content>.inner{max-width:1320px;margin:0 auto;width:100%}
  /* Aligned padding (header ≡ body) */
  .main-content .ds-hdr,.ds-hdr{padding:8px 24px}

  .ds-search-wrap{max-width:420px;flex:1 1 auto;margin-bottom:0}
  /* Empty state centered in content (not viewport) */
  .ds-empty{max-width:500px;margin:80px auto}
  /* Section spacing */
  .ds-chip-row{margin-bottom:14px}
}

// PERF: Smart setState - use renderListOnly when only list-relevant keys change
const LIST_ONLY_KEYS=new Set(['jobs','filter','search','loading']);
function setState(obj){
  Object.assign(STATE,obj);
  const keys=Object.keys(obj);
  const isListOnly=STATE.page==='list'&&keys.every(k=>LIST_ONLY_KEYS.has(k))&&document.getElementById('jobListArea');
  if(isListOnly){renderListOnly();}else{render();}
}
// PERF: switchMode uses per-mode cache — show cached jobs instantly, refetch silently (no blank flash)
function switchMode(mk){
  STATE.mode=mk;
  STATE.filter="today";
  STATE.search="";
  STATE.page="list";
  STATE.aid=null;
  // PERF: Show cached jobs for this mode instantly instead of blank
  if(!window._modeJobCache)window._modeJobCache={};
  STATE.jobs=window._modeJobCache[mk]||[];
  STATE._listFp=""; // reset fingerprint so silentRefresh will revalidate
  loadJobsFromDB(); // fetches fresh data, renders when ready
}

async function loadJobsFromDB(){
  if(!CURRENT_USER)return;
  // PERF: Skip loading flash if we already have data (cached from previous visit)
  const hasCached=STATE.jobs&&STATE.jobs.length>0;
  STATE.loading=!hasCached;render();
  const role=CURRENT_USER.role;
  const canSeeAll=(role==="admin"||role==="superadmin");
  // PERF: Load jobs first (no entries), limit 50 for fast render
  const qBase=canSeeAll
    ?"mode=eq."+STATE.mode+"&order=created_at.desc&limit=50&select=*"
    :"mode=eq."+STATE.mode+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&limit=50&select=*";
  const rawJobs=await sbGet("nj_jobs",qBase);
  // Load entries in background after list renders
  const jobs=(rawJobs||[]).map(j=>({...j,entries:j.entries||[]}));
  STATE.jobs=jobs;STATE.loading=false;render();
  // PERF: Cache this mode's jobs for instant display on revisit
  if(!window._modeJobCache)window._modeJobCache={};
  window._modeJobCache[STATE.mode]=jobs;
  // PERF: Lazy load entries in background
  const ids=(rawJobs||[]).map(j=>j.id);
  if(ids.length){
    const entQ="job_id=in.("+ids.join(",")+")&order=time.asc&select=*";
    const ents=await sbGet("nj_entries",entQ);
    if(ents&&ents.length){
      const entMap={};
      ents.forEach(e=>{if(!entMap[e.job_id])entMap[e.job_id]=[];entMap[e.job_id].push(e);});
      STATE.jobs=STATE.jobs.map(j=>({...j,entries:entMap[j.id]||[]}));
      // PERF: Update cache with entries too
      window._modeJobCache[STATE.mode]=STATE.jobs;
      renderListOnly();return;
    }
  }
  const dummy=0;//dummy
  // PERF: Auto-switch tab logic runs after lazy load completes
  if(STATE.filter==="today"){
    const hasToday=(STATE.jobs||[]).filter(j=>!j.done&&getDaysDiff(j.date)===0).length>0;
    const hasPending=(STATE.jobs||[]).filter(j=>!j.done&&getDaysDiff(j.date)>0).length>0;
    if(!hasToday&&hasPending)STATE.filter="older";
    else if(!hasToday&&!hasPending)STATE.filter="today";
  }
}

  const m=MODES[mode];
  const G=m.color;const GL=m.gl;
  const modeJobs=jobs.filter(j=>j.mode===mode);
  const filtered=modeJobs.filter(j=>{
    let ok=true;
    if(filter==="done")ok=j.done;
    else if(filter==="today")ok=!j.done&&getDaysDiff(j.date)===0;
    else if(filter==="yesterday")ok=!j.done&&getDaysDiff(j.date)===1;
    else if(filter==="older")ok=!j.done&&getDaysDiff(j.date)>=2;
    else ok=true;
    if(!ok)return false;
    if(!search.trim())return true;

      return `<div class="card" style="${job.done?"opacity:.82":""}">
        <div onclick="setState({page:'job',aid:'${job.id}',sel:null,custom:'',multiSel:[],eTime:'',eDate:todayStr(),eNote:'',tab:'normal',dupWarn:false,editEId:null})" style="cursor:pointer">

              <div style="font-weight:800;font-size:16px;color:${job.done?"#64748b":"#e2e8f4"};margin-bottom:4px;text-decoration:${job.done?"line-through":"none"}">${job.customer}</div>

              ${job.warehouse?`<div style="font-size:12px;color:#64748b">🏭 ${job.warehouse}</div>`:""}

  // PERF: Only fetch id+updated_at to check if data changed

    ?"mode=eq."+STATE.mode+"&order=created_at.desc&limit=50&select=id,done,updated_at"
    :"mode=eq."+STATE.mode+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&limit=50&select=id,done,updated_at";
  const snapshot=await sbGet("nj_jobs",qCheck);
  if(!snapshot)return;
  // PERF: Compare lightweight fingerprint instead of JSON.stringify(jobs)
  const newFp=snapshot.map(j=>j.id+"|"+j.done+"|"+j.updated_at).join(",");
  if(newFp===STATE._listFp)return; // No change - skip render
  STATE._listFp=newFp;
  // Data changed - do full reload quietly
  await loadJobsFromDB();
}

let _pollTimer=null;

function todayStr(){const d=new Date();return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function nowTime(){const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,"0");}
function uid(){
  // Generate proper UUID v4 format for Supabase
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    const r=Math.random()*16|0;
    return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function showToast(m){
  const t=document.getElementById("toast");
  t.textContent=m;t.style.display="block";
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",2800);
}

function buildMsg(job,mk){
  const m=MODES[mk];const L=[];
  const icon=mk==="air"?"✈️":mk==="exp"?"📤":mk==="sebkk"?"🚤":"📦";
  L.push(icon+" อัปเดตสถานะงาน : "+m.label);
  L.push("ลูกค้า : "+job.customer);
  const bls=job.bl.split("\n").map(h=>h.trim()).filter(h=>h);
  if(bls.length===1)L.push(m.bl+": "+bls[0]);
  else bls.forEach((h,i)=>L.push(m.bl+" "+(i+1)+": "+h));
  if(job.customs)L.push("เลขใบขน : "+job.customs);
  if(job.warehouse)L.push("โกดัง : "+job.warehouse);
  L.push("");
  // Group entries by date
  const entries=[...(job.entries||[])].sort((a,b)=>{
    const da=a.entry_date||job.date||"";const db=b.entry_date||job.date||"";
    if(da!==db){
      const pa=da.split("/");const pb=db.split("/");
      const ta=pa.length===3?pa[2]+pa[1]+pa[0]:"";
      const tb=pb.length===3?pb[2]+pb[1]+pb[0]:"";
      if(ta!==tb)return ta.localeCompare(tb);
    }
    return a.time.localeCompare(b.time);
  });
  const dateGroups={};
  entries.forEach(e=>{
    const d=e.entry_date||job.date||"";
    if(!dateGroups[d])dateGroups[d]=[];
    dateGroups[d].push(e);
  });
  Object.keys(dateGroups).forEach(d=>{
    L.push("⏱ Timeline การดำเนินงาน");
    L.push("วันที่ : "+d);
    L.push("");
    dateGroups[d].forEach(e=>{
      L.push("• ⏰ "+e.time.replace(":",".") +"  "+e.status+(e.note?" ("+e.note+")":""));
    });
    L.push("");
  });
  if(job.foot_note)L.push("📝 หมายเหตุ : "+job.foot_note);
  return L.join("\n");
}

function doCopy(text,type){
  const doIt=()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    showToast("📋 Copy "+type+" สำเร็จ!");
  };
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showToast("📋 Copy "+type+" สำเร็จ!")).catch(doIt);
  else doIt();
}

async function addEntry(){
  const ms=STATE.multiSel&&STATE.multiSel.length>0?[...STATE.multiSel]:null;
  let status=STATE.sel;
  if(!ms&&!status){showToast("⚠️ กรุณาเลือกสถานะก่อน");return;}
  if(!ms&&status==="__custom__"){if(!STATE.custom.trim()){showToast("⚠️ กรุณาพิมพ์สถานะ");return;}status=STATE.custom.trim();}
  showToast("⏳ กำลังบันทึก...");
  const time=STATE.eTime||nowTime();
  const finalStatus=ms?ms.join(" + "):status;
  const active=STATE.jobs.find(j=>j.id===STATE.aid);
  const isDup=active&&(active.entries||[]).some(e=>e.status===finalStatus);
  if(isDup&&!STATE.dupWarn){setState({dupWarn:true});showToast("⚠️ สถานะนี้เคยเพิ่มไปแล้ว!");return;}
  const entry={id:uid(),job_id:STATE.aid,time,status:finalStatus,note:STATE.eNote.trim(),type:STATE.tab,created_by:(CURRENT_USER&&CURRENT_USER.username)?CURRENT_USER.username:"Unknown",entry_date:STATE.eDate||todayStr()};
  const ok=await sbInsert("nj_entries",entry);
  if(!ok){showToast("❌ บันทึกไม่สำเร็จ! เช็ค Supabase");return;}
  const jobs=STATE.jobs.map(j=>{
    if(j.id===STATE.aid)return{...j,entries:[...(j.entries||[]),entry]};
    return j;
  });
  setState({jobs,sel:null,multiSel:[],custom:"",eTime:"",eDate:todayStr(),eNote:"",dupWarn:false,lastSaved:time});

function exportCSV(){
  const{expDate,mode}=STATE;const m=MODES[mode];
  const list=STATE.jobs.filter(j=>j.mode===mode&&j.date===expDate.trim());
  if(!list.length){showToast("⚠️ ไม่พบงานในวันที่ "+expDate);return;}
  const eq=v=>'"'+String(v).replace(/"/g,'""')+'"';
  const rows=[[" วันที่","ลูกค้า",m.bl,"เลขใบขน","โกดัง","สถานะงาน","เวลา","สถานะ","หมายเหตุ","หมายเหตุท้าย"].map(eq).join(",")];
  list.forEach(job=>{
    const s=job.done?"จบงาน":"กำลังดำเนินการ";
    const blD=job.bl.split("\n").filter(h=>h.trim()).map(h=>h.trim()).join(", ");
    const se=[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time));
    if(!se.length){rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,"","(ยังไม่มี)","",job.foot_note||""].map(eq).join(","));}
    else se.forEach((e,i)=>rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,e.time.replace(":","."),e.status,e.note||"",i===0?(job.foot_note||""):""].map(eq).join(",")));
  });
  const csv="\uFEFF"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=mode.toUpperCase()+"-"+expDate.replace(/\//g,"-")+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);

}

async function doLogin(){
  const u=STATE.loginUser.trim();
  const p=STATE.loginPass.trim();
  if(!u||!p){setState({loginErr:"กรุณากรอกให้ครบ"});return;}
  setState({loginErr:"⏳ กำลังตรวจสอบ..."});
  
  let found=null;
  try{
    // ดึงเฉพาะ user ที่ตรง username (เร็วกว่า fetch ทั้งตาราง)
    const res=await sbGet("users","username=eq."+encodeURIComponent(u)+"&select=*");
    if(res&&res.length>0){
      const match=res.find(x=>x.password===p);
      if(match)found={...match};
    }
  }catch(e){setState({loginErr:"เชื่อมต่อไม่ได้ กรุณาลองใหม่"});return;}
  
  if(found){
    if(found.status==="pending"){
      setState({loginErr:"⏳ รอ Admin อนุมัติบัญชีของคุณก่อนครับ"});return;
    }
    CURRENT_USER=found;
    localStorage.setItem("nj_cu",JSON.stringify(found));
    setState({loginErr:""});
    loadJobsFromDB();
  } else {
    setState({loginErr:"Username หรือ Password ไม่ถูกต้อง"});
  }
}

async function doRegister(){
  const{regUser,regPass,regPass2}=STATE;
  if(!regUser.trim()||!regPass.trim()){setState({regErr:"กรุณากรอกให้ครบ"});return;}
  if(regPass!==regPass2){setState({regErr:"Password ไม่ตรงกัน"});return;}
  if(regPass.length<4){setState({regErr:"Password ต้องมีอย่างน้อย 4 ตัว"});return;}
  setState({regErr:"⏳ กำลังสมัคร..."});
  const newU={id:uid(),username:regUser.trim(),password:regPass.trim(),role:"user",status:"pending"};
  try{
    const r=await fetch(API+"/users",{method:"POST",headers:SH,body:JSON.stringify(newU)});
    if(r.ok){setState({regOk:true,regErr:""});return;}
    const err=await r.json().catch(()=>({}));
    if(err.code==="23505"||String(err.message||err.details||err.hint||"").toLowerCase().includes("duplic")||String(err.message||"").toLowerCase().includes("unique")){
      setState({regErr:"Username นี้มีอยู่แล้ว กรุณาใช้ชื่ออื่น"});
    } else {
      setState({regErr:"เกิดข้อผิดพลาด: "+(err.message||err.details||"กรุณาลองใหม่")});
    }
  }catch(e){setState({regErr:"เชื่อมต่อไม่ได้ กรุณาลองใหม่"});}
}

async function doExportExcel(){
  const mode=document.getElementById("expMode")?.value||"all";
  const dateRaw=document.getElementById("expDate")?.value||"";
  const user=document.getElementById("expUser")?.value||"all";
  
  // Convert date from yyyy-mm-dd to dd/mm/yyyy
  let dateFilter="";
  if(dateRaw){const p=dateRaw.split("-");dateFilter=p[2]+"/"+p[1]+"/"+p[0];}
  
  showToast("⏳ กำลังโหลดข้อมูล...");
  
  // Load jobs from Supabase — PERF: parallel fetch all modes
  const modes=mode==="all"?Object.keys(MODES):[mode];
  const results=await Promise.all(modes.map(mk=>
    sbGet("nj_jobs","mode=eq."+mk+"&order=created_at.desc&select=*,nj_entries(*)")
  ));
  let all=[];
  results.forEach(res=>{
    if(res&&res.length)res.forEach(j=>all.push({...j,entries:j.nj_entries||j.entries||[]}));
  });
  
  // Filter by date
  if(dateFilter)all=all.filter(j=>j.date===dateFilter);
  // Filter by user
  if(user!=="all")all=all.filter(j=>(j.owner_name||"")===user);
  
  if(!all.length){showToast("⚠️ ไม่พบข้อมูลตามที่เลือก");return;}
  
  // Build CSV
  const eq=v=>'"'+String(v||"").replace(/"/g,'""')+'"';
  const rows=[["Mode","วันที่","ลูกค้า","B/L / HAWB","เลขใบขน","โกดัง","สถานะงาน","เวลา","วันที่สถานะ","สถานะ Timeline","หมายเหตุ","ผู้บันทึก"].map(eq).join(",")];
  
  all.forEach(job=>{
    const m=MODES[job.mode]||{bl:"B/L",label:job.mode};
    const status=job.done?"จบงาน":"กำลังดำเนินการ";
    const bls=job.bl.split("\n").filter(h=>h.trim()).map(h=>h.trim()).join(", ");
    const entries=[...(job.entries||[])].sort((a,b)=>{
      const da=a.entry_date||job.date||"";const db=b.entry_date||job.date||"";
      return da!==db?da.localeCompare(db):a.time.localeCompare(b.time);
    });
    if(!entries.length){
      rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",status,"","","(ยังไม่มี)","",job.owner_name||""].map(eq).join(","));
    } else {
      entries.forEach(e=>rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",status,e.time.replace(":","."),e.entry_date||job.date,e.status,e.note||"",e.created_by||""].map(eq).join(",")));
    }
  });
  
  const fn=["Timeline",(mode==="all"?"All":mode),(dateFilter||"AllDates"),(user==="all"?"AllUsers":user)].join("-");
  const csv="\uFEFF"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=fn+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("✅ Export สำเร็จ "+all.length+" งาน!");
}

// PERF: Memoized getDaysDiff — cache results per date string, invalidate on day change
const _ddCache={};
let _ddCacheKey="";
function getDaysDiff(dateStr){
  // dateStr format: DD/MM/YYYY
  if(!dateStr||typeof dateStr!=='string')return 0;
  // Invalidate cache when the calendar day changes
  const now=new Date();
  const todayKey=now.getFullYear()+"-"+now.getMonth()+"-"+now.getDate();
  if(todayKey!==_ddCacheKey){for(const k in _ddCache)delete _ddCache[k];_ddCacheKey=todayKey;}
  if(dateStr in _ddCache)return _ddCache[dateStr];
  try{
    const p=dateStr.split("/");
    if(p.length!==3)return _ddCache[dateStr]=0;
    const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    const today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);
    return _ddCache[dateStr]=Math.floor((today-d)/(1000*60*60*24));
  }catch(e){return _ddCache[dateStr]=0;}
}
function getDayLabel(job){
  if(job.done)return null;
  const diff=getDaysDiff(job.date);
  if(diff===0)return{label:"วันนี้",color:"#06C755",bg:"rgba(6,199,85,.15)"};
  if(diff===1)return{label:"ค้างจากเมื่อวาน",color:"#f59e0b",bg:"rgba(245,158,11,.15)"};
  if(diff>1)return{label:"ค้าง "+diff+" วัน",color:"#ef4444",bg:"rgba(239,68,68,.15)"};
  return{label:"วันนี้",color:"#06C755",bg:"rgba(6,199,85,.15)"};
}

  // Restore admin search input
  const asi=document.getElementById("adminSearchInp");
  if(asi){
    asi.value=STATE.adminSearch||"";
    if(STATE._adminSearchFocused){
      const l=asi.value.length;
      asi.focus();
      asi.setSelectionRange(l,l);
    }
  }
}

if(CURRENT_USER){
  loadJobsFromDB();
} else {
  render();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>ระบบสั่งงานแมส</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#0f172a;font-family:'Sarabun',sans-serif;color:#e2e8f4;min-height:100vh}
button,input,textarea,select{font-family:'Sarabun',sans-serif!important}
.wrap{width:100%;min-height:100vh;padding-bottom:90px}
@media(min-width:900px){
  body{padding:0}
  .wrap{width:100%;max-width:100%;display:grid;grid-template-columns:260px 1fr;grid-template-rows:auto 1fr;min-height:100vh;padding-bottom:0}
  .wrap.wrap-login{display:flex;max-width:100%;background:#0f172a}
  .hdr{grid-column:1/3;grid-row:1;position:sticky;top:0;z-index:50}
  .sidebar{grid-column:1;grid-row:2;display:flex!important;flex-direction:column;background:#111827;border-right:1px solid #1e2d44;padding:16px 0;position:sticky;top:72px;height:calc(100vh - 72px);overflow-y:auto}
  .main-col{grid-column:2;grid-row:2;display:flex;flex-direction:column;overflow-y:auto;height:calc(100vh - 72px)}
  .mode-bar{display:none!important}
  .stats{grid-template-columns:repeat(4,1fr);padding:24px 32px 0;gap:14px;margin-bottom:18px}
  .filter-bar{padding:0 32px;gap:10px;margin-bottom:16px}
  .task-list{padding:0 32px}
  .fix-bar{display:none!important}
  .mobile-only-bar{display:none!important}
  .hdr-create-btn{display:block!important}
  .stat{padding:20px 16px}.stat-num{font-size:34px}.stat-lbl{font-size:12px}
  .task-card{padding:18px 20px;margin-bottom:10px}.tc-title{font-size:15px}
  .modal-overlay{align-items:center}
  .modal-box{max-width:580px;margin:0 auto;border-radius:22px;margin-bottom:40px;max-height:88vh}
  .section-head{padding:14px 32px 10px}
  .admin-list{padding:0 32px}
  .create-wrap{padding:0 32px 32px;max-width:700px}
  .export-bar{padding:0 32px 10px}
}

/* ── Login ── */
.login-page{min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.login-icons{display:flex;gap:16px;justify-content:center;margin-bottom:18px;font-size:42px}
.login-brand{font-size:28px;font-weight:800;color:#fff;text-align:center}
.login-brand-sub{font-size:14px;color:#64748b;text-align:center;margin-top:4px;margin-bottom:28px}
.login-card{background:#1a2235;border:1px solid #2a3a54;border-radius:20px;padding:28px 24px;width:100%;max-width:440px}
.tab-row{display:flex;background:#0f172a;border-radius:12px;padding:4px;margin-bottom:20px;gap:4px}
.tab-btn{flex:1;padding:10px 8px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;color:#64748b;background:transparent}
.tab-btn.active{background:#06C755;color:#fff}
.inp-lbl{font-size:11px;color:#64748b;font-weight:700;letter-spacing:.5px;margin-bottom:6px;display:block}
.inp-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:18px}
.pending-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:16px;text-align:center;margin-top:8px}
.err-msg{font-size:13px;color:#ef4444;text-align:center;padding:6px 0;min-height:26px}
@media(min-width:900px){
  .login-page{grid-column:1/3;min-height:100vh}
  .login-card{max-width:480px;padding:36px}
  .login-brand{font-size:34px}
  .login-icons{font-size:48px;gap:20px}
  .tab-btn{font-size:16px;padding:12px}
  .btn-green{font-size:16px!important;padding:17px!important}
}

/* ── Header ── */
.hdr{padding:14px 24px;background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);overflow:hidden;position:relative}
.hdr-blob{position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(6,199,85,.06)}
.hdr-inner{position:relative;display:flex;align-items:center;gap:12px}
.hdr-logo{width:38px;height:38px;background:rgba(6,199,85,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(6,199,85,.3);flex-shrink:0}
.hdr-title{font-size:15px;font-weight:800;color:#fff}
.hdr-sub{font-size:11px;color:#64748b;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.hdr-user{font-size:12px;color:#06C755;font-weight:700}
.hdr-role{font-size:10px;color:#64748b}
.hdr-logout{background:none;border:1px solid #2a3a54;border-radius:6px;color:#64748b;font-size:11px;padding:4px 8px;cursor:pointer;transition:all .2s}
.hdr-logout:hover{border-color:#ef4444;color:#ef4444}
.hdr-create-btn{display:none;background:#06C755;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;padding:9px 18px;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.hdr-create-btn:hover{opacity:.85}

/* ── Mode bar ── */
.mode-bar{display:flex;margin:10px 16px;background:#1a2235;border-radius:12px;border:1px solid #2a3a54;overflow:hidden}
.mode-btn{flex:1;padding:9px;border:none;background:transparent;color:#64748b;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.mode-btn.active{background:rgba(6,199,85,.12);color:#06C755}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-bottom:12px}
.stat{background:#1a2235;border:1px solid #2a3a54;border-radius:12px;padding:10px 8px;text-align:center}
.stat-num{font-size:22px;font-weight:800;font-family:monospace}
.stat-lbl{font-size:10px;color:#64748b;margin-top:2px}
.sa .stat-num{color:#e2e8f4}.sw .stat-num{color:#f59e0b}.sg .stat-num{color:#3b82f6}.sd .stat-num{color:#06C755}

/* ── Filter ── */
.filter-bar{display:flex;gap:6px;padding:0 16px;margin-bottom:12px}
.fb{flex:1;min-width:0;padding:9px 6px;border-radius:10px;border:1.5px solid #2a3a54;background:#1a2235;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;color:#64748b;white-space:nowrap}
.fb-num{font-family:monospace;font-size:10px;background:#0f172a;padding:1px 5px;border-radius:10px}
.fb-a-all{background:rgba(226,232,240,.08);color:#e2e8f4;border-color:#475569}
.fb-a-wait{background:rgba(245,158,11,.12);color:#f59e0b;border-color:#f59e0b}
.fb-a-going{background:rgba(59,130,246,.12);color:#3b82f6;border-color:#3b82f6}
.fb-a-done{background:rgba(6,199,85,.12);color:#06C755;border-color:#06C755}

/* ── Task cards ── */
.task-list{padding:0 16px}
.task-card{background:#1a2235;border:1px solid #2a3a54;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.task-card:active{transform:scale(.98)}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.tc-wait::before{background:#f59e0b}.tc-going::before{background:#3b82f6}.tc-done::before{background:#06C755}
.tc-r1{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.tc-job{font-family:monospace;font-size:10px;color:#06C755;background:rgba(6,199,85,.08);padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px;border:1px solid rgba(6,199,85,.2)}
.tc-title{font-size:14px;font-weight:700;flex:1;line-height:1.4;color:#e2e8f4}
.tc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.bw{background:rgba(245,158,11,.12);color:#f59e0b}
.bg_{background:rgba(59,130,246,.12);color:#3b82f6}
.bd{background:rgba(6,199,85,.12);color:#06C755}
.tc-r2{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.tc-meta{font-size:11px;color:#64748b}
.tc-thumb{width:28px;height:28px;border-radius:6px;object-fit:cover;border:1px solid #2a3a54}
.tc-r3{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:7px;border-top:1px solid #1e2d44}
.tc-pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.p-sender{background:rgba(100,116,139,.1);color:#94a3b8}
.p-msg{background:rgba(59,130,246,.1);color:#60a5fa}
.p-recip{background:rgba(6,199,85,.1);color:#06C755}
.p-co{background:rgba(168,85,247,.1);color:#c084fc}

/* ── Fix bar ── */
.fix-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#0f172a;border-top:1px solid #2a3a54;padding:10px 16px 28px;z-index:100}
.btn-green{width:100%;background:#06C755;border:none;border-radius:14px;padding:15px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s}
.btn-green:disabled{background:#2a3a54;color:#64748b;cursor:not-allowed}
.btn-outline{width:100%;background:transparent;border:1.5px solid #2a3a54;border-radius:14px;padding:13px;color:#64748b;font-size:14px;cursor:pointer;margin-top:8px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;backdrop-filter:blur(6px)}
.modal-box{background:#1a2235;width:100%;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px 16px 44px;border-top:1px solid #2a3a54}
.modal-close{float:right;background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;line-height:1}
.detail-field{margin-bottom:13px}
.detail-lbl{font-size:10px;color:#64748b;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.detail-val{font-size:14px;color:#e2e8f4;line-height:1.5}
.detail-img{width:100%;border-radius:10px;border:1px solid #2a3a54;margin-top:4px}
.tl{display:flex;flex-direction:column;gap:8px}
.tl-row{display:flex;align-items:center;gap:8px}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-txt{font-size:13px}
.big-inp{width:100%;background:#0f172a;border:2px solid #06C755;border-radius:12px;color:#e2e8f4;font-size:16px;padding:14px;outline:none;font-family:'Sarabun',sans-serif}

/* ── Create form ── */
.create-wrap{padding:0 16px 160px}
.job-card{background:rgba(6,199,85,.06);border:1.5px solid rgba(6,199,85,.25);border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.job-num{font-size:24px;font-weight:800;color:#06C755;font-family:monospace;letter-spacing:2px}
.job-date-lbl{font-size:11px;color:#475569;margin-top:3px}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:#64748b;font-weight:700;letter-spacing:.5px;margin-bottom:6px;display:block}
.fl .req{color:#ef4444}
.inp{width:100%;background:#0f172a;border:1.5px solid #2a3a54;border-radius:10px;padding:11px 12px;color:#e2e8f4;font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:#06C755}
textarea.inp{resize:none;min-height:80px;line-height:1.5}
select.inp option{background:#1a2235}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.file-zone{border:1.5px dashed #2a3a54;border-radius:10px;padding:18px;text-align:center;color:#64748b;font-size:13px;cursor:pointer;transition:all .2s}
.file-zone:hover{border-color:#06C755;color:#06C755}
.file-zone input{display:none}
.file-prev{display:flex;align-items:center;gap:10px;background:#0f172a;border-radius:8px;padding:8px 12px}
.file-prev img{width:36px;height:36px;border-radius:6px;object-fit:cover}
/* place dropdown scrollbar */
#place-list::-webkit-scrollbar{width:4px}
#place-list::-webkit-scrollbar-thumb{background:#2a3a54;border-radius:2px}

/* ── Clock ── */
.clock-wrap{display:flex;align-items:center;gap:10px;background:#0f172a;border:1.5px solid #2a3a54;border-radius:10px;padding:11px 14px;cursor:pointer;transition:border-color .2s}
.clock-wrap:hover{border-color:#06C755}
.clock-lbl{flex:1;font-size:14px;color:#64748b}
.clock-lbl.set{color:#e2e8f4;font-weight:700}
.clock-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.clock-box{background:#1a2235;border-radius:22px;padding:22px 18px;width:300px;max-width:95vw;border:1px solid #2a3a54}
.clock-title{font-size:12px;color:#64748b;font-weight:700;letter-spacing:1px;text-align:center;margin-bottom:12px}
.clock-disp{font-size:44px;font-weight:800;color:#fff;text-align:center;font-family:monospace;letter-spacing:4px;margin:10px 0 6px}
.clock-hint{font-size:11px;color:#64748b;text-align:center;margin-bottom:14px}
.clock-face{position:relative;width:210px;height:210px;margin:0 auto;background:#0f172a;border-radius:50%;border:2px solid #2a3a54}
.clock-center-dot{position:absolute;top:50%;left:50%;width:8px;height:8px;background:#06C755;border-radius:50%;transform:translate(-50%,-50%);z-index:3}
.clock-hand{position:absolute;bottom:50%;left:calc(50% - 1px);width:2px;background:#06C755;transform-origin:bottom center;border-radius:2px;z-index:2}
.clock-hand::after{content:'';position:absolute;top:-5px;left:-4px;width:10px;height:10px;background:#06C755;border-radius:50%}
.cnum{position:absolute;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;color:#94a3b8;transform:translate(-50%,-50%);transition:all .15s}
.cnum:hover,.cnum.on{background:#06C755;color:#fff}
.clock-btns{display:flex;gap:8px;margin-top:14px}
.clock-cancel{flex:1;padding:11px;border-radius:10px;border:1.5px solid #2a3a54;background:none;color:#64748b;font-size:14px;cursor:pointer;font-family:inherit}
.clock-ok{flex:2;padding:11px;border-radius:10px;border:none;background:#06C755;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── Export ── */
.export-bar{display:flex;gap:8px;padding:0 16px 10px;flex-wrap:wrap}
.exp-btn{padding:8px 14px;border-radius:8px;border:1.5px solid #2a3a54;background:#1a2235;color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.exp-btn:hover{border-color:#06C755;color:#06C755}
.exp-pdf{border-color:rgba(239,68,68,.3);color:#f87171}
.exp-pdf:hover{border-color:#ef4444;background:rgba(239,68,68,.05)}
.exp-xl{border-color:rgba(74,222,128,.3);color:#4ade80}
.exp-xl:hover{border-color:#22c55e;background:rgba(34,197,94,.05)}
.exp-csv:hover{border-color:#06C755;color:#06C755}

/* ── Admin ── */
.admin-card{background:#1a2235;border:1px solid #2a3a54;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.admin-av{width:38px;height:38px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#06C755;flex-shrink:0}
.act-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.act-approve{background:rgba(6,199,85,.12);color:#06C755;border:1px solid rgba(6,199,85,.3)}
.act-approve:hover{background:#06C755;color:#fff}
.act-reject{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.act-reject:hover{background:#ef4444;color:#fff}
.act-del{background:rgba(100,116,139,.1);color:#64748b;border:1px solid #2a3a54}

/* ── Sidebar ── */
.sidebar{display:none}
.sb-lbl{font-size:9px;letter-spacing:2px;color:#475569;font-weight:700;padding:8px 18px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:10px 18px;cursor:pointer;color:#64748b;font-size:13px;font-weight:600;border-left:3px solid transparent;transition:all .15s}
.sb-item:hover{color:#e2e8f4;background:#1a2235}
.sb-item.on{color:#06C755;border-left-color:#06C755;background:rgba(6,199,85,.06)}
.sb-badge{margin-left:auto;background:#06C755;color:#000;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;font-family:monospace}
.sb-warn{background:#f59e0b}
.sb-role{margin:12px 14px 0;background:#1a2235;border-radius:10px;border:1px solid #2a3a54;overflow:hidden;display:flex}
.sb-role-btn{flex:1;padding:8px 4px;border:none;background:transparent;color:#64748b;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.sb-role-btn.on{background:rgba(6,199,85,.12);color:#06C755}
.sb-user{padding:14px 18px;border-top:1px solid #1e2d44;margin-top:auto}

/* ── Misc ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;border:1px solid #2a3a54;color:#e2e8f4;padding:11px 20px;border-radius:100px;font-size:13px;white-space:nowrap;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:#06C755}.toast.warn{border-color:#f59e0b}
.empty{text-align:center;padding:48px 20px;color:#64748b}
.loading{text-align:center;padding:40px;color:#64748b;font-size:13px}
.sec-head{font-size:11px;color:#64748b;font-weight:700;letter-spacing:1px;padding:12px 16px 8px;border-bottom:1px solid #1e2d44;margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<div class="clock-modal-bg" id="clock-bg" onclick="if(event.target===this)closeClock()">
  <div class="clock-box">
    <div class="clock-title" id="clock-title">เลือกเวลา</div>
    <div class="clock-disp" id="clock-disp">--:--</div>
    <div class="clock-hint" id="clock-hint">เลือก ชั่วโมง</div>
    <div class="clock-face" id="clock-face">
      <div class="clock-center-dot"></div>
    </div>
    <div class="clock-btns">
      <button class="clock-cancel" onclick="closeClock()">ยกเลิก</button>
      <button class="clock-ok" onclick="confirmClock()">✓ ตกลง</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL="https://sytgqjglcnsabcszbngg.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dGdxamdsY25zYWJjc3pibmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjYwNDgsImV4cCI6MjA4OTc0MjA0OH0.mBXShyx6YSKxwWgFfwprg_tbAg-LZ3ODZtQ3V2qIF3g";
const SH={"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Prefer":"return=representation"};
const API=SUPA_URL+"/rest/v1";
const DEMO=false;

async function sbGet(t,q=""){try{const r=await fetch(API+"/"+t+(q?"?"+q:""),{headers:SH});return r.ok?r.json():[]}catch{return[]}}
async function sbInsert(t,d){try{const r=await fetch(API+"/"+t,{method:"POST",headers:SH,body:JSON.stringify(d)});return r.ok}catch{return false}}
async function sbUpdate(t,id,d){try{const r=await fetch(API+"/"+t+"?id=eq."+id,{method:"PATCH",headers:SH,body:JSON.stringify(d)});return r.ok}catch{return false}}
async function sbDelete(t,id){try{const r=await fetch(API+"/"+t+"?id=eq."+id,{method:"DELETE",headers:SH});return r.ok}catch{return false}}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function nowTime(){const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes())}
function pad(n){return String(n).padStart(2,"0")}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function thDate(s){try{const d=new Date(s);return d.toLocaleDateString("th-TH",{weekday:"short",year:"numeric",month:"short",day:"numeric"})}catch{return s}}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function showToast(msg,type=""){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show "+type;clearTimeout(window._tt);window._tt=setTimeout(()=>t.className="toast",3000)}

const UK="msg_users_v2";
function getLocalUsers(){
  try{
    let arr=JSON.parse(localStorage.getItem(UK)||"[]");
    if(!arr.find(u=>u.username==="Jamrat"))arr.unshift(SUPER_ADMIN);
    else arr=arr.map(u=>u.username==="Jamrat"?{...u,...SUPER_ADMIN}:u);
    DEF_MESSENGERS.forEach(dm=>{if(!arr.find(u=>u.username===dm.username))arr.push(dm);});
    localStorage.setItem(UK,JSON.stringify(arr));return arr;
  }catch{return[SUPER_ADMIN,...DEF_MESSENGERS]}
}
function saveLocalUsers(u){localStorage.setItem(UK,JSON.stringify(u))}
async function getUsers(){
  const local=getLocalUsers();if(DEMO)return local;
  try{
    const su=await sbGet("msg_users","order=created_at.asc");
    const merged=[...su];
    for(const dm of [SUPER_ADMIN,...DEF_MESSENGERS]){if(!merged.find(u=>u.username===dm.username)){await sbInsert("msg_users",dm);merged.push(dm);}}
    return merged.map(u=>u.username==="Jamrat"?{...u,...SUPER_ADMIN}:u);
  }catch{return local}
}
async function findUser(un,pw){const users=await getUsers();return users.find(u=>u.username===un&&u.password===pw)||null}
async function registerUser(un,pw){
  const users=await getUsers();
  if(users.find(u=>u.username===un))return{ok:false,msg:"Username นี้ถูกใช้แล้ว"};
  const nu={id:uid(),username:un,password:pw,role:"staff",status:"pending",created_at:new Date().toISOString()};
  saveLocalUsers([...users,nu]);if(!DEMO)await sbInsert("msg_users",nu);return{ok:true};
}
async function updateUserStatus(id,status){
  saveLocalUsers(getLocalUsers().map(u=>u.id===id?{...u,status}:u));
  if(!DEMO)await sbUpdate("msg_users",id,{status});
}
async function updateUserRole(id,role){
  saveLocalUsers(getLocalUsers().map(u=>u.id===id?{...u,role}:u));
  if(!DEMO)await sbUpdate("msg_users",id,{role});
  // update current session if self
  if(S.currentUser?.id===id){S.currentUser={...S.currentUser,role};localStorage.setItem("msg_cu",JSON.stringify(S.currentUser));}
}
async function deleteUser(id){
  saveLocalUsers(getLocalUsers().filter(u=>u.id!==id));
  if(!DEMO)await sbDelete("msg_users",id);
}

function getJobNo(date,tasks){
  const same=tasks.filter(t=>t.date===date);
  return date.replace(/-/g,"")+"-"+pad(same.length+1);
}

async function createTask(){
  // read tags from state + check if user typed without pressing Enter
  const coInp=(document.getElementById("co-search-inp")?.value||"").trim();
  if(coInp){S.fCompany=S.fCompany?(S.fCompany+","+coInp):coInp;}
  const detail=detailSearch+(detailExtra&&detailSearch?" — "+detailExtra:detailExtra);
  const place=(document.getElementById("f-place")?.value||"").trim();
  const date=document.getElementById("f-date")?.value||S.fDate;
  const type=document.getElementById("f-type")?.value||S.fType;
  const njInp=(document.getElementById("nj-inp")?.value||"").trim();
  if(njInp){S.fJobNJ=S.fJobNJ?(S.fJobNJ+","+njInp):njInp;}
  const company=(S.fCompany||"").split(",").filter(v=>v.trim()).map(v=>v.trim()).join(", ");
  const jobnj=(S.fJobNJ||"").split(",").filter(v=>v.trim()).map(v=>v.trim()).join(", ");
  if(!company){showToast("⚠️ กรอกชื่อบริษัท","warn");return}
  if(!detail){showToast("⚠️ กรอกรายละเอียด","warn");return}
  if(!place){showToast("⚠️ กรอกสถานที่","warn");return}
  if(!S.fPickup){showToast("⚠️ เลือกเวลาไปรับงาน","warn");return}
  setState({saving:true});
  const jobNo=getJobNo(date,S.tasks);
  const task={id:uid(),job_number:jobNo,job_nj:jobnj,company,type,detail,place,date,
    pickup_time:S.fPickup,deliver_time:S.fDeliver||"–",status:"wait",
    created_by:S.currentUser?.username||"ผู้ใช้",
    image_url:null,messenger_name:null,start_time:null,end_time:null,recipient:null};
  if(!DEMO){await sbInsert("msg_tasks",task);await loadTasks();}
  else S.tasks=[task,...S.tasks];
  setState({saving:false,page:"list",fCompany:"",fJobNJ:"",fDetail:"",fPlace:"",fPickup:"",fDeliver:"",fFile:null,fPreview:null,fDate:todayStr()});
  showToast("✅ สร้าง JOB "+jobNo+" แล้ว","ok");
}
async function acceptTask(id){
  const t=nowTime(),m=S.currentUser?.username||"";
  if(!DEMO)await sbUpdate("msg_tasks",id,{status:"going",start_time:t,messenger_name:m});
  S.tasks=S.tasks.map(x=>x.id===id?{...x,status:"going",start_time:t,messenger_name:m}:x);
  render();showToast("🏃 "+m+" รับงาน "+t,"warn");
}
async function finishTask(id,imgUrl,customTime){
  const t=customTime||nowTime();
  const updates={status:"done",end_time:t};
  if(imgUrl)updates.image_url=imgUrl;
  if(!DEMO)await sbUpdate("msg_tasks",id,updates);
  S.tasks=S.tasks.map(x=>x.id===id?{...x,...updates}:x);
  setState({showRecip:false,recipName:"",finishPreview:null,finishFile:null,finishTime:"",selId:null});
  showToast("✅ ส่งเสร็จแล้ว! "+t,"ok");
}

function render(){
  const app=document.getElementById("app");
  if(!S.currentUser){app.className="wrap wrap-login";app.innerHTML=renderLogin();return}
  app.className="wrap";
  const cnt={all:S.tasks.length,wait:S.tasks.filter(t=>t.status==="wait").length,going:S.tasks.filter(t=>t.status==="going").length,done:S.tasks.filter(t=>t.status==="done").length};
  const pending=S.users.filter(u=>u.status==="pending").length;
  const isSA=canManageUsers(S.currentUser);
  const isAdmin=canViewAll(S.currentUser);
  const hdr=renderHdr(cnt,pending,isSA,isAdmin);
  const sb=renderSidebar(cnt,pending,isSA,isAdmin);
  if(S.page==="create"&&!canCreate(S.currentUser)){setState({page:"list"});return}
  if(S.page==="create"){app.innerHTML=hdr+sb+'<div class="main-col">'+renderCreate()+"</div>";return}
  if(S.page==="admin"&&!isSA){setState({page:"list"});return}
  if(S.page==="admin"){app.innerHTML=hdr+sb+'<div class="main-col">'+renderAdmin()+"</div>";return}
  if(S.page==="dashboard"){app.innerHTML=hdr+sb+'<div class="main-col">'+renderDashboard()+"</div>";renderCharts();return}
  if(S.page==="places"){app.innerHTML=hdr+sb+'<div class="main-col">'+renderPlacePage()+"</div>";return}
  app.innerHTML=hdr+sb+'<div class="main-col">'+renderList(cnt,pending,isSA,isAdmin)+"</div>"+(S.selId?renderDetail():"");
}

    +'<div class="tl-txt" style="color:'+(t.start_time?"#3b82f6":"#64748b")+'">'+(t.start_time?"🏃 เริ่มวิ่ง "+esc(t.start_time):"⏳ ยังไม่รับงาน")+'</div></div>'
    +(t.messenger_name?'<div class="tl-row"><div class="tl-dot" style="background:#60a5fa"></div><div class="tl-txt" style="color:#60a5fa">👤 แมส: <strong>'+esc(t.messenger_name)+'</strong></div></div>':"")

    +'<div class="tl-txt" style="color:'+(t.end_time?"#06C755":"#64748b")+'">'+(t.end_time?"✅ ส่งเสร็จ "+esc(t.end_time):"— ยังไม่เสร็จ")+'</div></div>'

      if(S.showRecip){

          +'<div style="font-size:12px;color:#06C755;font-weight:700;margin-bottom:12px">✅ ยืนยันส่งเสร็จ</div>'

          +'<span class="clock-lbl'+(S.finishTime?" set":"")+'" id="finish-time-disp" style="'+(S.finishTime?"color:#06C755;font-weight:800":"")+'">'+( S.finishTime||nowTime())+'</span>'

          // photo
          +'<div style="font-size:11px;color:#64748b;font-weight:700;margin-bottom:8px">📸 แนบภาพหลักฐาน (ถ้ามี)</div>'
          +(S.finishPreview
            ?'<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><img src="'+S.finishPreview+'" style="width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid #2a3a54"><button onclick="setState({finishPreview:null,finishFile:null})" style="background:none;border:none;color:#64748b;font-size:18px;cursor:pointer">×</button></div>'
            :'<label style="display:block;border:1.5px dashed #2a3a54;border-radius:10px;padding:12px;text-align:center;color:#475569;font-size:13px;cursor:pointer;margin-bottom:4px"><input type="file" accept="image/*" style="display:none" onchange="handleFinishFile(this)">📷 แตะเพื่อแนบภาพ</label>'
          )
          +'</div>'
          +'<button class="btn-green" onclick="confirmFinish()">✅ ยืนยันส่งเสร็จ</button>';
      }else{
        action+='<button class="btn-green" onclick="setState({showRecip:true,finishPreview:null,finishFile:null})">✅ ส่งเสร็จแล้ว — กดยืนยัน</button>';
      }
    }
    else action='<button class="btn-green" disabled style="opacity:.5">✅ งานนี้เสร็จแล้ว</button>';
  }else action='<div style="font-size:12px;color:#64748b;text-align:center;padding:6px 0">เปลี่ยนเป็นโหมด "แมส" เพื่ออัปเดต</div>';
  return '<div class="modal-overlay" onclick="if(event.target===this)setState({selId:null})">'
    +'<div class="modal-box">'
    +'<button class="modal-close" onclick="setState({selId:null})">×</button>'
    +'<div style="font-family:monospace;font-size:11px;color:#06C755;letter-spacing:1px;margin-bottom:4px">JOB '+esc(t.job_number||t.id.slice(0,8))+'</div>'
    +(t.job_nj?'<div style="font-family:monospace;font-size:12px;color:#f59e0b;margin-bottom:4px">NJ: '+esc(t.job_nj)+'</div>':"")
    +'<div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:4px">'+esc(t.type)+'</div>'
    +(t.company?'<div style="font-size:13px;color:#c084fc;margin-bottom:8px">🏢 '+esc(t.company)+'</div>':"")
    +'<span class="tc-badge '+BC[t.status]+'" style="margin-bottom:14px;display:inline-block">'+SL[t.status]+'</span>'
    +'<div class="detail-field"><div class="detail-lbl">รายละเอียด</div><div class="detail-val">'+esc(t.detail)+'</div></div>'
    +'<div class="detail-field"><div class="detail-lbl">สถานที่</div><div class="detail-val">📍 '+esc(t.place)+'</div></div>'
    +'<div class="detail-field"><div class="detail-lbl">วันที่ / เวลา</div><div class="detail-val" style="font-family:monospace;font-size:13px">📅 '+esc(t.date)+' ⏰ รับ '+esc(t.pickup_time||"–")+' → ส่ง '+esc(t.deliver_time||"–")+'</div></div>'
    +'<div class="detail-field"><div class="detail-lbl">สถานะ</div>'+tl+'</div>'
    +'<div class="detail-field"><div class="detail-lbl">ผู้สั่งงาน</div><div class="detail-val">👤 '+esc(t.created_by)+'</div></div>'
    +'<div class="detail-field"><div class="detail-lbl">ภาพแนบ</div>'+img+'</div>'

function refreshJobPreview(){

function renderAdmin(){
  const pending=S.users.filter(u=>u.status==="pending");
  const approved=S.users.filter(u=>u.status==="approved"&&u.role!=="superadmin");
  const suspended=S.users.filter(u=>u.status==="rejected");

  const card=(u)=>'<div class="admin-card" style="flex-wrap:wrap;gap:10px">'
    +'<div class="admin-av" style="background:'+ROLE_COLOR[u.role]+'22;color:'+ROLE_COLOR[u.role]+'">'+u.username[0].toUpperCase()+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
    +'<span style="font-size:14px;font-weight:700;color:#e2e8f4">'+esc(u.username)+'</span>'
    +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+ROLE_COLOR[u.role]+'22;color:'+ROLE_COLOR[u.role]+'">'+( ROLE_LABEL[u.role]||u.role)+'</span>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:6px;margin-top:5px">'
    +'<span style="font-size:11px;color:#475569">🔑</span>'
    +'<span id="pw-'+u.id+'" style="font-family:monospace;font-size:12px;color:#64748b;letter-spacing:1px">••••••••</span>'
    +'<button onclick="togglePw(\''+u.id+'\',\''+esc(u.password)+'\')" style="background:none;border:1px solid #2a3a54;border-radius:4px;color:#475569;font-size:10px;padding:1px 6px;cursor:pointer">แสดง</button>'
    +'</div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
    +(u.status==="pending"
      ?'<button class="act-btn act-approve" onclick="approveUser(\''+u.id+'\')">✓ อนุมัติ</button>'
       +'<button class="act-btn act-reject" onclick="rejectUser(\''+u.id+'\')">✗ ปฏิเสธ</button>'
      :u.status==="approved"
        ?'<select onchange="changeRole(\''+u.id+'\',this.value)" style="background:#0f172a;border:1px solid #2a3a54;border-radius:6px;color:#e2e8f4;font-size:11px;padding:4px 8px;cursor:pointer">'
         +["staff","messenger","admin"].map(r=>'<option value="'+r+'"'+(u.role===r?' selected':'')+'>'+ROLE_LABEL[r]+'</option>').join("")
         +'</select>'
         +'<button onclick="suspendUser(\''+u.id+'\')" style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#f59e0b;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">⏸ ระงับ</button>'
         +'<button class="act-btn act-del" onclick="removeUser(\''+u.id+'\')">ลบ</button>'
        :'<span style="font-size:11px;color:#ef4444;padding:2px 8px;background:rgba(239,68,68,.08);border-radius:6px">⛔ ถูกระงับ</span>'
         +'<button onclick="approveUser(\''+u.id+'\')" style="background:rgba(6,199,85,.1);border:1px solid rgba(6,199,85,.3);color:#06C755;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">▶ เปิดใช้งาน</button>'
         +'<button class="act-btn act-del" onclick="removeUser(\''+u.id+'\')">ลบ</button>'
    )
    +'</div></div>';

  const guide='<div style="background:#111827;border:1px solid #1e2d44;border-radius:12px;padding:14px 18px;margin-bottom:16px">'
    +'<div style="font-size:11px;color:#475569;font-weight:700;letter-spacing:1px;margin-bottom:10px">📋 สิทธิ์การใช้งาน</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'
    +[
      ["staff","🖥 ผู้สั่งงาน","สั่งงานได้อย่างเดียว"],
      ["messenger","🏃 แมสเซ็นเจอร์","รับงาน วิ่งงาน ปิดงาน"],
      ["admin","🛡 Admin","สั่งงาน + ดูสถานะทั้งหมด + กราฟ"],
      ["superadmin","👑 Super Admin","ทำได้ทุกอย่าง (Full Access)"],
    ].map(([r,l,d])=>'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+ROLE_COLOR[r]+'22;color:'+ROLE_COLOR[r]+';white-space:nowrap">'+l+'</span>'
      +'<span style="font-size:11px;color:#64748b">'+d+'</span>'+'</div>'
    ).join("")+'</div></div>';

  const allUsers=[...pending,...approved,...suspended];
  return '<div><div class="sec-head">👥 จัดการผู้ใช้</div>'
    +'<div class="admin-list">'+guide
    +(pending.length?'<div style="font-size:11px;color:#f59e0b;font-weight:700;padding:4px 0 8px">⏳ รออนุมัติ ('+pending.length+')</div>'+pending.map(u=>card(u)).join(""):"")
    +(approved.length?'<div style="font-size:11px;color:#06C755;font-weight:700;padding:10px 0 8px">✅ ใช้งานอยู่ ('+approved.length+')</div>'+approved.map(u=>card(u)).join(""):"")
    +(suspended.length?'<div style="font-size:11px;color:#ef4444;font-weight:700;padding:10px 0 8px">⛔ ถูกระงับ ('+suspended.length+')</div>'+suspended.map(u=>card(u)).join(""):"")
    +(!allUsers.length?'<div class="empty"><div style="font-size:28px;opacity:.4;margin-bottom:8px">👥</div><div>ยังไม่มีผู้ใช้</div></div>':"")
    +'</div><div style="height:90px"></div></div>'
    +'<div class="fix-bar"><button class="btn-green" onclick="setState({page:\'list\'})">‹ กลับหน้าหลัก</button></div>';
}

async function doLogin(){
  const user=(document.getElementById("l-user")?.value||"").trim();
  const pass=(document.getElementById("l-pass")?.value||"").trim();
  if(!user||!pass){setState({lErr:"กรุณากรอก Username และ Password"});return}
  const found=await findUser(user,pass);
  if(!found){setState({lErr:"Username หรือ Password ไม่ถูกต้อง"});return}
  if(found.status==="pending"){setState({lErr:"บัญชีของคุณยังรอการอนุมัติ"});return}
  if(found.status==="rejected"){setState({lErr:"บัญชีของคุณถูกปฏิเสธ"});return}
  localStorage.setItem("msg_cu",JSON.stringify(found));
  S.currentUser=found;
  // set display role based on user's actual role
  S.role=found.role==="messenger"?"messenger":"staff";
  setState({page:"list",lErr:""});loadTasks();showToast("ยินดีต้อนรับ "+found.username+" 👋","ok");
}
async function doRegister(){
  const user=(document.getElementById("r-user")?.value||"").trim();
  const pass=(document.getElementById("r-pass")?.value||"").trim();
  const pass2=(document.getElementById("r-pass2")?.value||"").trim();
  if(!user||!pass){setState({rErr:"กรุณากรอกข้อมูลให้ครบ"});return}
  if(pass.length<6){setState({rErr:"Password ต้องมีอย่างน้อย 6 ตัว"});return}
  if(pass!==pass2){setState({rErr:"Password ไม่ตรงกัน"});return}
  const res=await registerUser(user,pass);
  if(!res.ok){setState({rErr:res.msg});return}
  setState({rOk:true,rErr:""});
}

// ── Clock ──
let _cTarget="",_cH=null,_cM=null,_cStep="hour";
function openClock(target){
  _cTarget=target;_cStep="hour";
  let cur="";
  if(target==="pickup")cur=S.fPickup;
  else if(target==="deliver")cur=S.fDeliver;
  else if(target==="finish")cur=S.finishTime||nowTime();
  if(cur&&cur!=="–"){const p=cur.split(":");_cH=+p[0];_cM=+p[1];}
  else{const n=new Date();_cH=n.getHours();_cM=Math.round(n.getMinutes()/5)*5%60;}
  const titles={pickup:"🕐 เวลาไปรับงาน",deliver:"🕑 เวลาส่งถึง",finish:"⏰ เวลาส่งเสร็จ"};
  document.getElementById("clock-title").textContent=titles[target]||"เลือกเวลา";
  document.getElementById("clock-bg").style.display="flex";
  buildClock();
}
function buildClock(){
  const face=document.getElementById("clock-face");if(!face)return;
  document.getElementById("clock-disp").textContent=(_cH!==null?pad(_cH):"--")+":"+(_cM!==null?pad(_cM):"--");
  document.getElementById("clock-hint").textContent=_cStep==="hour"?"แตะเลือก ชั่วโมง (0–23)":"แตะเลือก นาที";
  const R=96,cx=105,cy=105;let html='<div class="clock-center-dot"></div>';
  if(_cStep==="hour"){
    for(let i=0;i<24;i++){
      const a=(i<12?i:i-12)/12*Math.PI*2-Math.PI/2;
      const rd=i<12?R*0.78:R*0.5;
      const x=cx+rd*Math.cos(a),y=cy+rd*Math.sin(a);
      html+='<div class="cnum'+(_cH===i?" on":"")+'" style="left:'+x+'px;top:'+y+'px" onclick="pickH('+i+')">'+i+'</div>';
    }
    if(_cH!==null){const a=(_cH%12)/12*Math.PI*2-Math.PI/2;const rd=_cH<12?R*0.78-15:R*0.5-15;html+='<div class="clock-hand" style="height:'+rd+'px;transform:rotate('+(_cH%12/12*360-90)+'deg)"></div>';}
  }else{
    const ms=[0,5,10,15,20,25,30,35,40,45,50,55];
    ms.forEach((m,i)=>{const a=i/12*Math.PI*2-Math.PI/2;const x=cx+R*0.78*Math.cos(a),y=cy+R*0.78*Math.sin(a);html+='<div class="cnum'+(_cM===m?" on":"")+'" style="left:'+x+'px;top:'+y+'px" onclick="pickM('+m+')">'+pad(m)+'</div>';});
    if(_cM!==null){const a=_cM/60*Math.PI*2-Math.PI/2;html+='<div class="clock-hand" style="height:'+(R*0.78-15)+'px;transform:rotate('+(_cM/60*360-90)+'deg)"></div>';}
  }
  face.innerHTML=html;
}
function pickH(h){_cH=h;_cStep="minute";buildClock()}
function pickM(m){_cM=m;buildClock()}
function closeClock(){document.getElementById("clock-bg").style.display="none"}
function confirmClock(){
  if(_cH===null){showToast("⚠️ เลือกชั่วโมงก่อน","warn");return}
  if(_cM===null)_cM=0;
  const val=pad(_cH)+":"+pad(_cM);
  if(_cTarget==="pickup"){S.fPickup=val;closeClock();const el=document.getElementById("pickup-disp");if(el){el.textContent=val;el.classList.add("set");}}
  else if(_cTarget==="deliver"){S.fDeliver=val;closeClock();const el=document.getElementById("deliver-disp");if(el){el.textContent=val;el.classList.add("set");}}
  else if(_cTarget==="finish"){
    S.finishTime=val;closeClock();
    const el=document.getElementById("finish-time-disp");
    if(el){el.textContent=val;el.style.color="#06C755";el.style.fontWeight="800";}
  }
}

function buildPlaceHTML(filter){
  const places=getPlaces();let html="";
  const q=(filter||"").toLowerCase().trim();
  places.forEach(({g,items})=>{
    const matched=q?items.filter(it=>it.toLowerCase().includes(q)||g.toLowerCase().includes(q)):items;
    if(!matched.length)return;
    html+='<div style="padding:5px 12px 2px;font-size:10px;color:#475569;font-weight:700;letter-spacing:1px;background:#111827;position:sticky;top:0;z-index:1">'+esc(g)+'</div>';
    matched.forEach(it=>{
      const full=g+" : "+it;
      html+='<div onclick="selectPlace(\''+full.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')" style="padding:9px 16px;font-size:13px;color:#e2e8f4;cursor:pointer;border-bottom:1px solid #1e2d44" onmouseenter="this.style.background=\'rgba(6,199,85,.1)\'" onmouseleave="this.style.background=\'\'">'+esc(full)+'</div>';

  let html="";
  places.forEach((pg,gi)=>{

    if(!matched.length&&sq)return;
    html+='<div style="background:#1a2235;border:1px solid #2a3a54;border-radius:12px;margin-bottom:10px;overflow:hidden">'
      +'<div style="display:flex;align-items:center;padding:10px 14px;background:#111827;gap:8px">'

      +'</div>';

      const ri=pg.items.indexOf(it);
      html+='<div id="pr-'+gi+'-'+ri+'" style="display:flex;align-items:center;padding:8px 14px;border-top:1px solid #1e2d44;gap:8px">'

function addPlace(){
  const name=(document.getElementById("pmgr-name")?.value||"").trim();
  if(!name){showToast("⚠️ กรอกชื่อสถานที่","warn");return}
  const places=getPlaces();
  // check duplicate across all groups
  for(const pg of places){
    if(pg.items.includes(name)){showToast("⚠️ มีรายการนี้แล้ว ใน "+pg.g,"warn");return}
  }
  // add to "อื่นๆ" group, create if not exists
  const gi=places.findIndex(p=>p.g==="อื่นๆ");
  if(gi>=0){places[gi].items.push(name);}
  else{places.push({g:"อื่นๆ",items:[name]});}
  savePlaces(places);
  if(document.getElementById("pmgr-name"))document.getElementById("pmgr-name").value="";
  renderPlaceList(document.getElementById("pmgr-search")?.value||"");
  showToast("✅ เพิ่ม "+name+" แล้ว","ok");
}

function editItem(gi,ri){
  const places=getPlaces();if(!places[gi])return;
  const row=document.getElementById("pr-"+gi+"-"+ri);if(!row)return;
  const oldName=places[gi].items[ri];
  const groups=places.map(p=>p.g);
  row.innerHTML='<select id="ei-g" style="background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#e2e8f4;font-size:12px;padding:5px 8px">'
    +groups.map(g=>'<option value="'+esc(g)+'"'+(g===places[gi].g?' selected':'')+'>'+esc(g)+'</option>').join("")+'</select>'
    +'<input id="ei-n" value="'+esc(oldName)+'" style="flex:1;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#e2e8f4;font-size:13px;padding:5px 10px;outline:none;min-width:0" onkeydown="if(event.key===\'Enter\')saveItem('+gi+','+ri+')">'
    +'<button onclick="saveItem('+gi+','+ri+')" style="background:#3b82f6;border:none;color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">บันทึก</button>'
    +'<button onclick="renderPlaceList(document.getElementById(\'pmgr-search\')?.value||\'\')" style="background:#222228;border:1px solid #2a3a54;color:#94a3b8;border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer">ยกเลิก</button>';
  setTimeout(()=>document.getElementById("ei-n")?.focus(),50);
}

function saveItem(gi,ri){
  const places=getPlaces();
  const newG=document.getElementById("ei-g")?.value;
  const newN=(document.getElementById("ei-n")?.value||"").trim();
  if(!newN){showToast("⚠️ กรอกชื่อ","warn");return}
  places[gi].items.splice(ri,1);
  if(!places[gi].items.length)places.splice(gi,1);
  const tgi=places.findIndex(p=>p.g===newG);
  if(tgi>=0){if(!places[tgi].items.includes(newN))places[tgi].items.push(newN);}
  else places.push({g:newG,items:[newN]});
  savePlaces(places);
  renderPlaceList(document.getElementById("pmgr-search")?.value||"");
  showToast("✅ แก้ไขแล้ว","ok");
}

function deleteItem(gi,ri){
  const places=getPlaces();if(!places[gi])return;
  const name=places[gi].items[ri];
  if(!confirm("ลบ '"+name+"'?"))return;
  places[gi].items.splice(ri,1);
  if(!places[gi].items.length)places.splice(gi,1);
  savePlaces(places);
  renderPlaceList(document.getElementById("pmgr-search")?.value||"");
  showToast("🗑 ลบแล้ว");
}

function renameGroup(gi){
  const places=getPlaces();if(!places[gi])return;
  const newName=prompt("แก้ไขชื่อกลุ่ม:",places[gi].g);
  if(!newName||!newName.trim())return;
  if(places.find((p,i)=>p.g===newName.trim()&&i!==gi)){showToast("⚠️ ชื่อกลุ่มซ้ำ","warn");return}
  places[gi].g=newName.trim();savePlaces(places);
  renderPlaceList(document.getElementById("pmgr-search")?.value||"");
  showToast("✅ แก้ชื่อกลุ่มแล้ว","ok");
}

function deleteGroup(gi){
  const places=getPlaces();if(!places[gi])return;
  if(!confirm("ลบกลุ่ม '"+places[gi].g+"' ทั้งหมด "+places[gi].items.length+" รายการ?"))return;
  places.splice(gi,1);savePlaces(places);
  renderPlaceList(document.getElementById("pmgr-search")?.value||"");
  showToast("🗑 ลบกลุ่มแล้ว");
}

function renderDashboard(){
  const done=S.tasks.filter(t=>t.status==="done");

  const wait=S.tasks.filter(t=>t.status==="wait").length;
  const byMsg={};
  done.forEach(t=>{
    const m=t.messenger_name||"ไม่ระบุ";

    byMsg[m].done++;
    const r=t.recipient||"ไม่ระบุผู้รับ";
    byMsg[m].recipients[r]=(byMsg[m].recipients[r]||0)+1;

  const days={};

  done.forEach(t=>{if(t.date&&days[t.date]!==undefined)days[t.date]++;});

    +'</div>'
    +'<div style="display:grid;grid-template-columns:280px 1fr;gap:16px;margin-bottom:24px">'
    +'<div style="background:#1a2235;border:1px solid #2a3a54;border-radius:14px;padding:16px"><div style="font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:1px;margin-bottom:12px">🍩 สัดส่วนสถานะ</div><div style="position:relative;height:200px"><canvas id="chart-status"></canvas></div></div>'
    +'<div style="background:#1a2235;border:1px solid #2a3a54;border-radius:14px;padding:16px;overflow:auto"><div style="font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:1px;margin-bottom:12px">🏆 แมสแยกผู้รับ</div>'
    +(msgRows?'<table style="width:100%;border-collapse:collapse"><tr style="border-bottom:1px solid #2a3a54"><th style="padding:8px 12px;text-align:left;font-size:11px;color:#64748b;font-weight:700">แมส</th><th style="padding:8px 12px;text-align:center;font-size:11px;color:#64748b;font-weight:700">งานเสร็จ</th><th style="padding:8px 12px;text-align:left;font-size:11px;color:#64748b;font-weight:700">ผู้รับที่พบ</th></tr>'+msgRows+'</table>'
      :'<div style="text-align:center;color:#475569;padding:32px 0;font-size:13px">ยังไม่มีงานเสร็จ</div>')
    +'</div></div>'
    +'<script id="chart-data" type="application/json">'+JSON.stringify({byMsg,days})+'<\/script>'
    +'</div>';
}
function renderCharts(){
  setTimeout(()=>{
    try{
      const raw=document.getElementById("chart-data");if(!raw)return;
      const {byMsg,days}=JSON.parse(raw.textContent);
      const msgs=Object.keys(byMsg);
      const msgVals=msgs.map(m=>byMsg[m].done);
      const colors=["#06C755","#3b82f6","#f59e0b","#a855f7","#ec4899","#14b8a6","#f97316"];
      const c1=document.getElementById("chart-msg");
      if(c1)new Chart(c1,{type:"bar",data:{labels:msgs,datasets:[{data:msgVals,backgroundColor:msgs.map((_,i)=>colors[i%colors.length]),borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#94a3b8",font:{family:"Sarabun",size:12}},grid:{display:false}},y:{ticks:{color:"#94a3b8"},grid:{color:"rgba(255,255,255,.05)"},beginAtZero:true}}}});
      const c2=document.getElementById("chart-daily");
      if(c2){
        const dKeys=Object.keys(days);
        const dLabels=dKeys.map(k=>{const d=new Date(k);return pad(d.getDate())+"/"+pad(d.getMonth()+1);});
        new Chart(c2,{type:"line",data:{labels:dLabels,datasets:[{data:Object.values(days),borderColor:"#06C755",backgroundColor:"rgba(6,199,85,.08)",tension:.4,fill:true,pointBackgroundColor:"#06C755",pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#94a3b8",font:{family:"Sarabun",size:11}},grid:{display:false}},y:{ticks:{color:"#94a3b8"},grid:{color:"rgba(255,255,255,.05)"},beginAtZero:true}}}});
      }
      const c3=document.getElementById("chart-status");
      if(c3){
        const wait=S.tasks.filter(t=>t.status==="wait").length;
        const going=S.tasks.filter(t=>t.status==="going").length;
        const done=S.tasks.filter(t=>t.status==="done").length;
        new Chart(c3,{type:"doughnut",data:{labels:["รอรับงาน","กำลังวิ่ง","เสร็จแล้ว"],datasets:[{data:[wait,going,done],backgroundColor:["#f59e0b","#3b82f6","#06C755"],borderColor:"#1a2235",borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",font:{family:"Sarabun",size:11},padding:12}}},cutout:"65%"}});
      }
    }catch(e){console.error("chart error",e)}
  },100);
}

// ── Start ──
if(S.currentUser){setState({page:"list"});loadTasks();}
else render();
</script>
</body>
</html>

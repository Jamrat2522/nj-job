// ── XLSX Guard ──────────────────────────────

function requireXLSX(){
  if(!xlsxReady()){
    toast('❌ XLSX Library ยังไม่โหลด — กรุณารีโหลดหน้า หรือเปิดผ่าน Web Server','error');
    return false;
  }
  return true;
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function toast(msg, type='info'){
  const t = document.createElement('div');
  t.className = 'toast';
  const icon = type==='success'?'✅':type==='error'?'❌':'ℹ️';
  t.textContent = icon+' '+msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ════════════════════════════════════════════
//  EXCEL UTILS
// ════════════════════════════════════════════
function nt(v){return String(v??'').replace(/\u00A0/g,' ').replace(/\r?\n/g,' ').replace(/\s+/g,' ').trim()}
function nk(v){return nt(v).toUpperCase()}
function normVinKey(v){return nk(v).replace(/[^A-Z0-9]/g,'');}
function toN(v){if(v===null||v===undefined||v==='')return null;if(typeof v==='number')return v;const n=Number(String(v).replace(/,/g,'').trim());return Number.isFinite(n)?n:null}
function pick(o,ks){for(const k of ks)if(o?.[k]!==undefined&&o?.[k]!==null&&o?.[k]!=='')return o[k];return''}
function safeSheet(n,used){let b=String(n||'Sheet').replace(/[\\/*?:\[\]]/g,'_').slice(0,31)||'Sheet';let c=b;let i=1;while(used.has(c)){const s=`_${i}`;c=`${b.slice(0,31-s.length)}${s}`;i++;}used.add(c);return c}
async function readWB(file){return XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true})}

// Smart sheet parser — auto-detects header row by scanning for known column keywords
const HEADER_KEYWORDS = [
  // Spreadsheet / ใบขน / สูตร
  'VIN','BOL NUMBER','BOL','VISTA ENTITY','QAD DESCRIPTION','HTS CODE',
  'INVOICE','AMOUNT TH','FOB BAHT','PRODUCT ATT',
  // Master file columns
  'MARKET','MPV CODE','COST STRUCTURE','EXPIRED','DATE APPROVAL',
  'DESCRIPTION (FORM)','PRODUCT ENG','PRODUCT THAI','RVC','TARIFF',
];
function smartSheetToRows(ws, sheetName){
  const aoa = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
  // Find first row that contains at least 2 known header keywords
  let hdrIdx = 0;
  for(let i=0; i<Math.min(aoa.length,20); i++){
    const rowStr = aoa[i].map(v=>String(v??'').toUpperCase()).join('|');
    const matches = HEADER_KEYWORDS.filter(k=>rowStr.includes(k)).length;
    if(matches>=2){hdrIdx=i;break;}
  }
  const headers = aoa[hdrIdx].map(v=>String(v??'').trim());
  const rows=[];
  for(let i=hdrIdx+1; i<aoa.length; i++){
    const rowArr=aoa[i];
    if(!rowArr||rowArr.every(v=>v===''||v===null||v===undefined))continue;
    const obj={__sheet:sheetName};
    headers.forEach((h,ci)=>{if(h)obj[h]=rowArr[ci]??'';});
    rows.push(obj);
  }
  return rows;
}
function wbToRows(wb){
  const rows=[];
  wb.SheetNames.forEach(s=>smartSheetToRows(wb.Sheets[s],s).forEach(r=>rows.push(r)));
  return rows;
}

function extractSS(rows){
  return rows.map(r=>({
    vin:             normVinKey(pick(r,['VIN','VIN 3RD'])),
    bolNumber:       pick(r,['BoL Number','BOL Number','Bol Number']),
    portCode:        pick(r,['Port of Discharge Code']),
    vistaEntityCode: pick(r,['VISTA Entity Code']),
    qad1:            pick(r,['QAD Description1']),
    htsCode:         toHtsNum(pick(r,['HTS code','HTS cod'])),
    engineSN:        pick(r,['Engine Serial Number']),
    colorDesc:       pick(r,['Color Description']),
    weightKg:        toN(pick(r,['Weight in KGs'])),
    lenM:            toN(pick(r,['Length in Meters'])),
    widM:            toN(pick(r,['Width in Meters'])),
    htM:             toN(pick(r,['Height in Meters'])),
    volM3:           toN(pick(r,['Volume in Cubic Meters'])),
    amt3AUD:         toN(pick(r,['Total - Vehicle Invoice','Amount 3RD(AUD)','Amount 3RD ( AUD )'])),
    drive:           pick(r,['Drive']),
    driveDesc:       pick(r,['Drive Description']),
    proforma:        pick(r,['FTC Invoice Number','Proforma Invoice','Proforma Invoice Number']),
  })).filter(r=>r.vin)
}

// ── extractThai: รองรับ ใบขน (Product Att1.) และ สูตร VIN 3RD ──
function extractThai(rows){
  return rows.map(r=>{
    const vin = normVinKey(pick(r,[
      'VIN 3RD',         // สูตร VIN 3RD sheet (main)
      'VIN TH',          // VIN TH sheet
      'Product Att1.','Product Att1',  // ใบขน files
      'VIN','VIN NO','Chassis No','Chassis Number',
    ]));
    // Amount TH: FOB BAHT (ใบขน) or Amount TH (สูตร) — skip #N/A
    const rawAmt = pick(r,['Amount TH','FOB BAHT','FOB TH','Amount TH ( THB )','Amount THB']);
    const amtTh = (rawAmt && String(rawAmt)!=='#N/A') ? toN(rawAmt) : null;
    const rawInv = pick(r,['INVOICE NO TH','INVOICE NO.','Invoice No.','Invoice No','INVOICE NO','เลขที่ Invoice','Invoice Number']);
    const invNo = (rawInv && String(rawInv)!=='#N/A') ? String(rawInv) : '';
    const rawDate = pick(r,['Invoice Date','Invoice_Date','Invoice Date.','Date','วันที่ Invoice','Inv Date']);
    const invDate = (rawDate && String(rawDate)!=='#N/A') ? String(rawDate) : '';
    return {vinTh:vin, amtTh, invNo, invDate};
  }).filter(r=>r.vinTh)
}

function buildThaiIdx(rows){
  const m = new Map();
  rows.forEach(r=>{
    if(!r.vinTh) return;
    const cur = m.get(r.vinTh);
    const score = x => ((x?.amtTh??0)>0?3:0) + (x?.invNo?2:0) + (x?.invDate?1:0);
    if(!cur || score(r)>score(cur)) m.set(r.vinTh, r);
  });
  return m;
}

function extractCost(rows){
  return rows.map(r=>({
    vin:     normVinKey(pick(r,['VIN','VIN TH','VIN 3RD'])),
    mkt:     pick(r,['Market / Privilege']),
    tariff:  pick(r,['Tariff on C/O','Tariff on \nC/O']),
    rvc:     pick(r,['RVC (%)']),
    csn:     pick(r,['Cost Structure No.']),
    dateApp: pick(r,['Date Approval']),
    descForm:pick(r,['Description (FORM)']),
    prodEng: pick(r,['Product Eng Name']),
  })).filter(r=>r.vin)
}
function buildCostIdx(rows){const m=new Map();rows.forEach(r=>m.set(r.vin,r));return m}

// ── Flexible VIN lookup: exact → contains → last-17 ──
function findThaiByVin(thIdx, vin){
  if(!vin) return null;
  const key = normVinKey(vin);
  if(thIdx.has(key)) return thIdx.get(key);
  for(const [k,v] of thIdx.entries()){
    if(k.includes(key)||key.includes(k)) return v;
  }
  const last17 = key.slice(-17);
  if(last17.length >= 8){
    for(const [k,v] of thIdx.entries()){
      if(k.endsWith(last17)||last17.endsWith(k.slice(-17))) return v;
    }
  }
  return null;
}

function makeReport(ss, thIdx, usd, aud, thb){
  return ss
    .filter(r => r.vin && r.bolNumber)
    .map(r => {
      const th = findThaiByVin(thIdx, r.vin);
      const amtTh  = (th?.amtTh ?? 0);          // Amount TH (THB) จาก ใบขน/ส่ตร
      const amt3rd = r.amt3AUD || 0;             // Total Vehicle Invoice (AUD) จาก SS
      // FOB TH (USD) = AmtTH / USD rate
      const fobTh  = (usd>0 && amtTh>0) ? amtTh/usd : 0;
      // FOB 3RD (USD) = (Total3RD AUD × AUD rate) / USD rate
      const fob3rd = (usd>0 && aud>0) ? (amt3rd*aud)/usd : 0;
      return {
        VIN:                      r.vin,
        'BoL Number':             r.bolNumber,
        'Proforma Invoice':       r.proforma,
        'Port of Discharge Code': r.portCode,
        'VISTA Entity Code':      r.vistaEntityCode,
        'QAD Description1':       r.qad1,
        'HTS code':               r.htsCode,
        'Engine Serial Number':   r.engineSN,
        'Color Description':      r.colorDesc,
        'Weight in KGs':          r.weightKg,
        'Length in Meters':       r.lenM,
        'Width in Meters':        r.widM,
        'Height in Meters':       r.htM,
        'Volume in Cubic Meters': r.volM3,
        'Total - Vehicle Invoice':amt3rd,          // AUD
        Drive:                    r.drive,
        'Drive Description':      r.driveDesc,
        'FTC Invoice Number':     r.proforma,
        'Amount TH ( THB )':      amtTh,
        'Amount 3RD ( AUD )':     amt3rd,
        'AUD อัตราแลกเปลี่ยน':   aud,
        'USD อัตราแลกเปลี่ยน':   usd,
        'FOB TH':                 fobTh,
        'FOB 3RD':                fob3rd,
        QTY:                      1,
        'INVOICE NO TH':          th?.invNo  || '',
        'Invoice Date':           th?.invDate || '',
      };
    });
}
function isValidMaster(row){
  if(!row.expDate)return true;
  try{return new Date(row.expDate)>=new Date()}catch{return true}
}


function fmtRVC(v){
  if(v===''||v===null||v===undefined)return '';
  const n=Number(v);
  if(!Number.isFinite(n))return String(v);
  return(n*100).toFixed(2)+'%';
}
function fmtDate(v){
  if(!v)return '';
  let d;
  if(v instanceof Date)d=v;
  else{d=new Date(v);if(isNaN(d))return String(v);}
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dd=String(d.getDate()).padStart(2,'0');
  const mon=MON[d.getMonth()];
  const yy=String(d.getFullYear()).slice(-2);
  return `${dd}-${mon}-${yy}`;
}
// แปลง HTS: '8704.21.26.00' → 870421 (6-digit number)
// หรือ '870421' → 870421 | หรือ 8703320000 → 870332 (6-digit)
function toHtsNum(v){
  if(!v&&v!==0)return '';
  const s=String(v).replace(/\./g,'').replace(/\D/g,'');
  if(!s)return '';
  // take first 6 digits = HS chapter+heading+subheading
  const n=parseInt(s.slice(0,6),10);
  return Number.isFinite(n)?n:'';
}

function makeBOL(rep,cIdx,masterCsnIdx){
  const byB=new Map();
  rep.filter(r=>r['BoL Number']&&r['BoL Number']!=='NO_BOL')
    .forEach(r=>{const b=r['BoL Number'];if(!byB.has(b))byB.set(b,[]);byB.get(b).push(r)});
  const sheets={};
  byB.forEach((rows,bol)=>{
    const gm=new Map();
    rows.forEach(r=>{
      // ── Master lookup: VISTA Entity Code ──
      const vista = String(r['VISTA Entity Code']||'').trim().toUpperCase();
      const cr=lookupCost(cIdx, vista);

      const mkt      = cr?.mkt      || '';
      const rvc      = cr?.rvc      ?? '';
      const csn      = cr?.csn      || '';
      const dateApp  = cr?.dateApp  || '';
      const tariffCO = cr?.tariff   || '';          // 10-digit HTS e.g. 8703320000
      const descForm = cr?.descForm || r['QAD Description1'] || '';
      const prodEng  = cr?.prodEng  || r['QAD Description1'] || '';
      // HTS cod = 6-digit numeric from SS, fallback from Master tariff
      const hts = r['HTS code'] || toHtsNum(tariffCO) || '';

      const gk=[vista,r['QAD Description1'],hts,r['INVOICE NO TH'],r['Invoice Date']].join('||');
      if(!gm.has(gk)){gm.set(gk,{
        'BoL Number':bol,'VISTA Entity Code':r['VISTA Entity Code'],ITEM:0,
        'QAD Description1':r['QAD Description1'],'HTS cod':hts,
        'INVOICE NO TH':r['INVOICE NO TH'],'Invoice Date':r['Invoice Date'],
        'ผลรวม ของ QTY':0,'ผลรวม ของ Weight in KGs':0,
        'ผลรวม ของ Amount 3RD ( AUD )':0,'ผลรวม ของ Amount TH ( THB )':0,
        'ผลรวม ของ FOB TH':0,'ผลรวม ของ FOB 3RD':0,
        'Market / Privilege':mkt,'Tariff on \nC/O':tariffCO,'RVC (%)':rvc,
        'Cost Structure No.':csn,'Date Approval':dateApp,
        'Description (FORM)':descForm,'Product Eng Name':prodEng,
      })}
      const b2=gm.get(gk);
      b2['ผลรวม ของ QTY']                +=toN(r.QTY)||0;
      b2['ผลรวม ของ Weight in KGs']       +=toN(r['Weight in KGs'])||0;
      b2['ผลรวม ของ Amount 3RD ( AUD )']  +=toN(r['Amount 3RD ( AUD )'])||0;
      b2['ผลรวม ของ Amount TH ( THB )']   +=toN(r['Amount TH ( THB )'])||0;
      b2['ผลรวม ของ FOB TH']              +=toN(r['FOB TH'])||0;
      b2['ผลรวม ของ FOB 3RD']             +=toN(r['FOB 3RD'])||0;
    });
    let bolRows=Array.from(gm.values());
    const VISTA_ORDER=['TEK531F85C','TEK47C2CDC1','TEK44AFED6E','TEK49AE2868','NEW99999999','TRA47070748','TRA40400FE4','TRA7EECCBEC'];
    bolRows.sort((a,b)=>{
      const ca=String(a['VISTA Entity Code']||'').trim().toUpperCase();
      const cb=String(b['VISTA Entity Code']||'').trim().toUpperCase();
      const ia=VISTA_ORDER.indexOf(ca),ib=VISTA_ORDER.indexOf(cb);
      if(ia!==-1||ib!==-1)return(ia===-1?999:ia)-(ib===-1?999:ib);
      return ca.localeCompare(cb);
    });
    bolRows=bolRows.map((x,i)=>({...x,ITEM:i+1}));
    if(bolRows.length)sheets[bol]=bolRows;
  });
  return sheets;
}
// ── makeTotalRow: สร้าง TOTAL row สำหรับ BOL sheet ──────────────
function makeBolTotalRow(bolCols, rows){
  const NUM_COLS=[
    'ผลรวม ของ QTY','ผลรวม ของ Weight in KGs',
    'ผลรวม ของ Amount TH ( THB )','ผลรวม ของ Amount 3RD ( AUD )',
    'ผลรวม ของ FOB TH','ผลรวม ของ FOB 3RD',
  ];
  const totals={};
  NUM_COLS.forEach(c=>{totals[c]=rows.reduce((s,r)=>s+(Number(r[c])||0),0);});
  return bolCols.map((c,i)=>{
    if(i===0)return 'ผลรวมทั้งหมด';
    if(NUM_COLS.includes(c))return totals[c];
    return '';
  });
}

function doExportXLSX(rep,bols,usd,aud){
  if(!Number(usd)||!Number(aud)){
    toast('กรุณากรอก USD / AUD Rate ก่อน Export','error');return;
  }
  const wb=XLSX.utils.book_new();const used=new Set();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Control','Value'],['USD Rate',usd],['AUD Rate',aud],['Generated At',new Date().toISOString()]]),safeSheet('CONTROL',used));

  // Report 1 — exact 27 columns
  const r1Cols=['VIN','BoL Number','Proforma Invoice','Port of Discharge Code','VISTA Entity Code','QAD Description1','HTS cod','Engine Serial Number','Color Description','Weight in KGs','Length in Meters','Width in Meters','Height in Meters','Volume in Cubic Meters','Total - Vehicle Invoice','Drive','Drive Description','FTC Invoice Number','Amount TH ( THB )','Amount 3RD ( AUD )','AUD อัตราแลกเปลี่ยน','USD อัตราแลกเปลี่ยน','FOB TH','FOB 3RD','QTY','INVOICE NO TH','Invoice Date'];
  const r1Aoa=[
    new Array(28).fill(''),
    ['','','','Report 1',...new Array(24).fill('')],
    new Array(28).fill(''),
    ['',...r1Cols],
    ...rep.map(r=>['',
      r.VIN,r['BoL Number'],r['Proforma Invoice'],r['Port of Discharge Code'],
      r['VISTA Entity Code'],r['QAD Description1'],r['HTS code'],
      r['Engine Serial Number'],r['Color Description'],
      r['Weight in KGs'],r['Length in Meters'],r['Width in Meters'],
      r['Height in Meters'],r['Volume in Cubic Meters'],
      r['Total - Vehicle Invoice'],r.Drive,r['Drive Description'],
      r['FTC Invoice Number'],
      r['Amount TH ( THB )'],r['Amount 3RD ( AUD )'],
      r['AUD อัตราแลกเปลี่ยน'],r['USD อัตราแลกเปลี่ยน'],
      r['FOB TH'],r['FOB 3RD'],
      r.QTY,r['INVOICE NO TH'],r['Invoice Date'],
    ]),
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(r1Aoa),safeSheet('Report 1',used));

  // BOL sheets — 20 columns
  const bolCols=['BoL Number','INVOICE NO TH','Invoice Date','VISTA Entity Code','ITEM',
    'QAD Description1','HTS cod','ผลรวม ของ QTY','ผลรวม ของ Weight in KGs',
    'ผลรวม ของ Amount TH ( THB )','ผลรวม ของ Amount 3RD ( AUD )',
    'ผลรวม ของ FOB TH','ผลรวม ของ FOB 3RD','Market / Privilege',
    'Tariff on \nC/O','RVC (%)','Cost Structure No.','Date Approval',
    'Description (FORM)','Product Eng Name'];
  Object.entries(bols).forEach(([b,rows])=>{
    const dataRows=rows.map(r=>bolCols.map(c=>r[c]??''));
    const totalRow=makeBolTotalRow(bolCols,rows);
    const aoa=[bolCols,...dataRows,totalRow];
    const ws2=XLSX.utils.aoa_to_sheet(aoa);
    // Style total row: bold + yellow background
    const totalRowIdx=dataRows.length+1; // 0-based header + data rows
    bolCols.forEach((_,ci)=>{
      const cellRef=XLSX.utils.encode_cell({r:totalRowIdx,c:ci});
      if(!ws2[cellRef])ws2[cellRef]={v:'',t:'s'};
      ws2[cellRef].s={font:{bold:true},fill:{fgColor:{rgb:'FFF9C4'}},border:{top:{style:'thin',color:{rgb:'F97316'}}}};
    });
    XLSX.utils.book_append_sheet(wb,ws2,safeSheet(b,used));
  });

  try{
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='From_Mapping_BOL_Output.xlsx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    toast('Export BOL สำเร็จ! 📥','success');
  }catch(err){toast('Export ผิดพลาด: '+err.message,'error');}
}

function makeFormAU(bolSheets, report1){
  const proformaMap = new Map();
  report1.forEach(r => {
    const k = [r['INVOICE NO TH'], r['HTS code'], r['QAD Description1']].join('||');
    if(r['Proforma Invoice Number']) proformaMap.set(k, r['Proforma Invoice Number']);
  });

  const rows = [];
  Object.values(bolSheets).forEach(bolRows => {
    bolRows.forEach(r => {
      // skip rows with no invoice or no qty
      if(!r['INVOICE NO TH']&&!r['BoL Number'])return;

      const proformaKey = [r['INVOICE NO TH'], r['HTS code'], r['QAD Description1']].join('||');
      const proforma = proformaMap.get(proformaKey) || '';
      const fobTH   = Number(r['ผลรวม ของ FOB TH']) || 0;
      const fob3RD  = Number(r['ผลรวม ของ FOB 3RD']) || 0;
      const fobMain = fobTH > 0 ? fobTH : fob3RD;   // rule 23: FOB TH ก่อน
      const qty     = Number(r['ผลรวม ของ QTY']) || 0;
      const wt      = Number(r['ผลรวม ของ Weight in KGs']) || 0;

      // priority: Master descForm → BOL descForm → QAD
      const descForm = r['Description (FORM)'] || r['QAD Description1'] || '';
      // priority: Master prodEng → BOL prodEng
      const prodEng  = r['Product Eng Name'] || '';

      rows.push([
        r['INVOICE NO TH']      || '',  // 1  เลขที่ INVOICE
        r['Invoice Date']       || '',  // 2  วันที่
        r.ITEM                  || '',  // 3  ลำดับรายการตาม INVOICE
        proforma                || '',  // 4  เลขที่ INVOICE ต่างประเทศ
        r['Invoice Date']       || '',  // 5  วันที่ (ต่างประเทศ)
        r.ITEM                  || '',  // 6  ลำดับรายการตาม INVOICE ต่างประเทศ
        '',                             // 7  Shipping Mark — ว่างตามตัวอย่าง
        '',                             // 8  B2B - ประเทศต้นทาง
        '',                             // 9  B2B - เลขที่เอกสารต้นทาง
        '',                             // 10 B2B - พิกัดสินค้า
        r['HTS code']           || '',  // 11 พิกัดสินค้า
        '',                             // 12 ตัวเลือกเพื่อแสดง
        '',                             // 13 กรณีการใช้ต้นทุน
        r['Cost Structure No.'] || '',  // 14 เลขที่ต้นทุน
        '',                             // 15 เลขประจำตัวผู้เสียภาษี
        '',                             // 16 บริษัทผู้ยินยอมให้ใช้ต้นทุนร่วม
        fmtDate(r['Date Approval'])||'',// 17 วันที่ออกต้นทุน
        r['Market / Privilege'] || '',  // 18 ความตกลง
        r['QAD Description1']   || '',  // 19 Model
        '',                             // 20 โรงงานผู้ผลิต
        '',                             // 21 แสดงชื่อโรงงานผู้ผลิต
        descForm,                       // 22 ชื่อสินค้าที่แสดงในคำขอ ← Description (FORM) จาก Master
        prodEng,                        // 23 ชื่อสินค้าภาษาอังกฤษ ← Product Eng Name จาก Master
        '',                             // 24 รายละเอียดสินค้าที่แสดงในแบบฟอร์ม
        '',                             // 25 เลือกแสดง NET WEIGHT
        '',                             // 26 เลือกแสดง GROSS WEIGHT
        '',                             // 27 เลือกแสดง OTHER QUANTITY
        qty,                            // 28 QTY Package
        'C62',                          // 29 หน่วย QTY
        wt,                             // 30 Net Weight
        'KGM',                          // 31 หน่วย Net
        wt,                             // 32 Gross Weight
        'KGM',                          // 33 หน่วย Gross
        qty,                            // 34 Other Quantity
        'C62',                          // 35 หน่วย Other
        fobMain,                        // 36 มูลค่า FOB (TH ก่อน)
        '',                             // 37 มูลค่า FOB สกุลเงินอื่น
        fob3RD,                         // 38 มูลค่า FOB Invoice ต่างประเทศ
        fobTH,                          // 39 มูลค่า FOB Invoice นายหน้าไทย
        r['Tariff on \nC/O']    || '',  // 40 กฏว่าด้วยถิ่นกำเนิดสินค้า
        fmtRVC(r['RVC (%)'])    || '',  // 41 % ของกฏ
        '',                             // 42 กฏพิกัดที่จะไปแสดงใน Output
        '',                             // 43 ค่าอื่นๆ ของกฏ

        '',                             // 46 RCEP Country of Origin Marks
        '',                             // 47 JTEPA Accumulation
        '',                             // 48 JTEPA De Minimis
      ]);
    });
  });
  return rows;
}

// ── Extract existing FORM AU rows from uploaded files ──
function extractFormAuExisting(wb){
  const rows=[];
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
    if(!aoa.length)return;
    // check if first row matches our headers (col 0 = เลขที่ INVOICE)
    const hdr0=String(aoa[0][0]||'').trim();
    const startRow = hdr0==='เลขที่ INVOICE'?1:0;
    for(let i=startRow;i<aoa.length;i++){
      const r=aoa[i];
      if(!r||r.every(v=>v===''||v===null||v===undefined))continue;
      rows.push(r.map(v=>(v===null||v===undefined)?'':v));
    }
  });
  return rows;
}

// ── Merge key: col0 (invoice) + col2 (item seq) + col6 (shipping mark/BOL) ──
function makeRowKey(row){
  return [String(row[0]||''),String(row[2]||''),String(row[6]||''),String(row[10]||''),String(row[13]||'')].join('||');
}

    })];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(bolAoa), safeSheet(bol, used));
  });

  try{
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});

    setTimeout(()=>URL.revokeObjectURL(url),3000);
    toast(`Export Form AU สำเร็จ! ${newRows.length} rows 📥`,'success');
  }catch(err){toast('Export ผิดพลาด: '+err.message,'error');}
}

// ── Extract VISTA code from MPV Code (Representative) ──
// e.g. "AJ_TEK531F85C" → "TEK531F85C", "VB_TEK531F85C" → "TEK531F85C"
function mpvToVista(mpv){
  if(!mpv)return '';
  const s=String(mpv).trim();
  return s.includes('_')?s.split('_').slice(1).join('_').toUpperCase():s.toUpperCase();
}

// ── Build master index keyed by VISTA Entity Code (UPPERCASE) ──
// Priority: Update COO Q1 → Previous MASTER COO (already ordered in S.masterRows)
// For same VISTA: newest Expired Date wins
// ── Build VISTA index — masterRows already filtered by expiry ──
// Priority preserved: Update COO Q1 rows come first in the array
function buildCostIdxFull(costRows, masterRows){
  const m=new Map();
  masterRows.forEach(r=>{
    const vista=mpvToVista(r.mpvRep);
    if(!vista)return;
    if(!m.has(vista)){  // first (Update COO Q1) wins
      m.set(vista,{
        mkt:r.mkt, tariff:r.tariff, rvc:r.rvc, csn:r.csn,
        dateApp:r.dateApp, descForm:r.descForm, prodEng:r.prodEng,
        _src:'master',
      });
    }
  });
  return m;
}

// ── Lookup by VISTA Entity Code (UPPERCASE key) ──
function lookupCost(cIdx, vista){
  if(!vista)return null;
  return cIdx.get(vista.trim().toUpperCase())||null;
}

// Port of Discharge Code → BOL Sheet name (Vietnam)
const VN_PORT_MAP = {
  'VNHPH':'HAIPHONG',
  'VNSGN':'HO CHI MINH',
  'VNDAD':'DA NANG',
  'VNVUT':'VUNG TAU',
  'VNQNN':'QUY NHON',
};
function vnPortToBol(portCode, portName){
  if(!portCode&&!portName)return 'NO_BOL';
  const mapped = VN_PORT_MAP[String(portCode).trim().toUpperCase()];
  if(mapped)return mapped;
  // fallback: strip leading digits from port name e.g. "55224 HO CHI MINH C" → "HO CHI MINH"
  if(portName){
    const clean = String(portName).replace(/^\d+\s*/,'').replace(/\s+C\s*$/,'').trim().toUpperCase();
    if(clean)return clean;
  }
  return String(portCode||'NO_BOL').toUpperCase();
}

// ── VN procFiles ─────────────────────────────
async function procFiles_VN(files, type){
  if(!files||!files.length)return;
  SVN.mapLoading=true;SVN.mapErr='';R();
  try{
    const books=await Promise.all(files.map(readWB));
    const rows=books.flatMap(wbToRows);
    if(type==='baikhon'){
      const existingNames=new Set(SVN.baikhonFiles.map(f=>f.name));
      const newFiles=files.filter(f=>!existingNames.has(f.name));
      if(!newFiles.length){toast('ไฟล์นี้อัปโหลดแล้ว','error');SVN.mapLoading=false;R();return}
      SVN.baikhonFiles=[...SVN.baikhonFiles,...newFiles];
      const allBooks=await Promise.all(SVN.baikhonFiles.map(readWB));
      SVN.baikhonRows=allBooks.flatMap(wbToRows);
      SVN.baikhonThaiRows=extractThai(SVN.baikhonRows);
    }
    if(type==='spreadsheet'){
      SVN.ssFiles=files;
      SVN.ssRows=extractSS_VN(rows);
      toast(SVN.ssRows.length+' VINs จาก Spreadsheet VN','success');
    }
    if(type==='cost_vn'){
      SVN.cFiles=files;
      const allMasterRows=[];
      const today=new Date();
      for(const wb2 of await Promise.all(files.map(readWB))){
        const PRIORITY=['Update COO Q1','Previous MASTER COO'];
        const ordered=[
          ...PRIORITY.filter(s=>wb2.SheetNames.includes(s)),
          ...wb2.SheetNames.filter(s=>!PRIORITY.includes(s)&&!/^Sheet\d*$/i.test(s)),
        ];
        for(const shName of ordered){
          const ws=wb2.Sheets[shName];if(!ws)continue;
          const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
          if(aoa.length<2)continue;
          const hdr=aoa[0].map(v=>String(v||'').replace(/[\n\r]+/g,' ').replace(/\s+/g,' ').trim().toUpperCase());
          const findCol=(...terms)=>{for(const t2 of terms){const tu=t2.toUpperCase().replace(/\s+/g,' ').trim();const idx=hdr.findIndex(h=>h===tu||h.includes(tu)||tu.includes(h));if(idx>=0)return idx;}return -1;};
          const ci={mpvRep:findCol('MPV CODE (REPRESENTATIVE)','MPV CODE REPRESENTATIVE'),mkt:findCol('MARKET / PRIVILEGE','MARKET/PRIVILEGE'),tariff:findCol('TARIFF ON C/O'),rvc:findCol('RVC (%)','RVC'),csn:findCol('COST STRUCTURE NO.','COST STRUCTURE NO'),dateApp:findCol('DATE APPROVAL','APPROVAL DATE'),expDate:findCol('EXPIRED DATE','EXPIRY DATE'),descForm:findCol('DESCRIPTION (FORM)','DESCRIPTION FORM'),prodEng:findCol('PRODUCT ENG NAME','PRODUCT ENG','ENG NAME')};
          if(ci.mpvRep<0||ci.csn<0)continue;
          for(let i=1;i<aoa.length;i++){
            const row=aoa[i];if(!row||!row.length)continue;
            const mpv=String(row[ci.mpvRep]||'').trim();const csn=String(row[ci.csn]||'').trim();
            if(!mpv||!csn)continue;
            let valid=true;if(ci.expDate>=0&&row[ci.expDate]){try{valid=new Date(row[ci.expDate])>=today}catch{}}
            if(!valid)continue;
            allMasterRows.push({mpvRep:mpv,mkt:ci.mkt>=0?String(row[ci.mkt]||''):'',tariff:ci.tariff>=0?row[ci.tariff]:'',rvc:ci.rvc>=0?row[ci.rvc]:'',csn,dateApp:ci.dateApp>=0?row[ci.dateApp]:'',expDate:ci.expDate>=0?row[ci.expDate]:'',descForm:ci.descForm>=0?String(row[ci.descForm]||''):'',prodEng:ci.prodEng>=0?String(row[ci.prodEng]||''):'',_sheet:shName});
          }
        }
      }
      SVN.masterRows=allMasterRows;SVN.masterSaved=false;
      if(!allMasterRows.length){toast('⚠️ ไม่พบข้อมูล Master VN','error');}
      else{const vs=new Set(allMasterRows.map(r=>mpvToVista(r.mpvRep)));toast(`✅ Master VN: ${allMasterRows.length} rows | ${vs.size} VISTA — กด SAVE`,'success');}
    }
    if(type==='formau_vn'){
      SVN.formAuFiles=[...files];
      const ex=[];
      for(const wb2 of await Promise.all(files.map(readWB))){ex.push(...extractFormAuExisting(wb2));}
      SVN.formAuExRows=ex;
      toast('Form AU เดิม: '+ex.length+' rows','success');
    }
    recompute_VN();
    if(type!=='spreadsheet')toast(files.length+' ไฟล์โหลดสำเร็จ','success');
  }catch(e){SVN.mapErr=e?.message||'ประมวลผลไฟล์ไม่สำเร็จ'}
  SVN.mapLoading=false;R();
}

  const usd=Number(S.usd), aud=Number(S.aud), thb=Number(S.thb)||1;
  if(!usd||!aud||!S.ssRows.length){S.report=[];S.bolSheets={};return}
  // Thai rows จาก ใบขน เท่านั้น (ส่ตร.xlsx ไม่ใช้แล้ว)
  const tIdx=buildThaiIdx(S.baikhonThaiRows);
  const cIdx=buildCostIdxFull([], S.masterRows);  // costRows ว่าง, ใช้แค่ Master
  S.report=makeReport(S.ssRows,tIdx,usd,aud,thb);
  S.bolSheets=makeBOL(S.report,cIdx,null);
}

function el(tag, props={}, children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='cls'){e.className=v}
    else e.setAttribute(k,v);
  });
  children.forEach(c=>c!=null&&(typeof c==='string'?e.appendChild(document.createTextNode(c)):e.appendChild(c)));
  return e;
}
function d(cls, children=[], style={}){
  const div=document.createElement('div');
  if(cls)div.className=cls;
  Object.assign(div.style,style);
  children.forEach(c=>c!=null&&(typeof c==='string'?div.appendChild(document.createTextNode(c)):div.appendChild(c)));
  return div;
}
function t(text, style={}){const s=document.createElement('span');s.textContent=text;Object.assign(s.style,style);return s}

async function doLogin(){
  if(S.loginLoad)return;
  S.loginLoad=true;S.loginErr='';R();
  // Super Admin shortcut
  if(S.loginUser===SA.username&&S.loginPass===SA.password){
    S.user={username:SA.username,role:SA.role,email:SA.email};S.loginLoad=false;R();return;
  }
  try{
    if(IS_FILE_PROTO){
      // ── file:// → ไม่มี network: แสดง error ชัดเจน ──
      throw new Error('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง (หรือต้องเปิดผ่าน Web Server สำหรับ Supabase login)');
    }
    // Try Supabase auth — convert username to email format
    const email=S.loginUser.includes('@')?S.loginUser:`${S.loginUser}@njlogistics.local`;
    const {data,error}=await sb.auth.signInWithPassword({email,password:S.loginPass});
    if(error)throw error;
    const meta=data.user?.user_metadata||{};
    S.user={username:meta.username||S.loginUser,role:meta.role||'User',email:data.user.email,id:data.user.id};
  }catch(e){
    S.loginErr=e.message==='Invalid login credentials'?'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง':e.message;
  }
  S.loginLoad=false;R();
}

async function doRegister(){
  if(S.regLoad)return;
  S.regErr='';
  if(!S.regUser||!S.regPass||!S.regEmail){S.regErr='กรุณากรอกข้อมูลให้ครบทุกช่อง';R();return}
  if(S.regPass!==S.regConf){S.regErr='รหัสผ่านไม่ตรงกัน';R();return}
  if(S.regPass.length<6){S.regErr='รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';R();return}
  if(S.regUser===SA.username){S.regErr='ชื่อผู้ใช้นี้ไม่สามารถใช้ได้';R();return}
  S.regLoad=true;R();
  try{
    const {error}=await sb.auth.signUp({
      email:S.regEmail, password:S.regPass,
      options:{data:{username:S.regUser,role:'User',display_name:S.regUser}},
    });
    if(error)throw error;
    S.regOk=true;
  }catch(e){S.regErr=e.message}
  S.regLoad=false;R();
}

async function doGitHub(){
  try{
    const {error}=await sb.auth.signInWithOAuth({
      provider:'github',
      options:{redirectTo:window.location.href},
    });
    if(error)throw error;
  }catch(e){toast('GitHub OAuth: '+e.message,'error')}
}

async function doLogout(){
  if(S.user?.id&&!IS_FILE_PROTO)await sb.auth.signOut();
  S.user=null;S.page='login';S.loginUser='';S.loginPass='';S.loginErr='';
  S.report=[];S.bolSheets={};S.ssRows=[];S.thaiRows=[];S.costRows=[];S.baikhonRows=[];S.baikhonThaiRows=[];
  S.baikhonFiles=[];S.ssFiles=[];S.cFiles=[];R();
}

async function removeBaikhon(idx){
  S.baikhonFiles=S.baikhonFiles.filter((_,i)=>i!==idx);
  // recompute baikhon rows from remaining files
  if(S.baikhonFiles.length){
    try{const books=await Promise.all(S.baikhonFiles.map(readWB));const r=books.flatMap(wbToRows);S.baikhonRows=r;S.baikhonThaiRows=extractThai(r);}
    catch{S.baikhonRows=[];S.baikhonThaiRows=[];}
  } else {S.baikhonRows=[];S.baikhonThaiRows=[];}
  recompute();R();
}

async function procFiles(files, type, append=false){
  if(!files||!files.length)return;
  S.mapLoading=true;S.mapErr='';R();
  try{
    const books=await Promise.all(files.map(readWB));
    const rows=books.flatMap(wbToRows);
    if(type==='baikhon'){
      // accumulate — append new files
      const existingNames=new Set(S.baikhonFiles.map(f=>f.name));
      const newFiles=files.filter(f=>!existingNames.has(f.name));
      if(!newFiles.length){toast('ไฟล์นี้อัปโหลดแล้ว','error');S.mapLoading=false;R();return}
      S.baikhonFiles=[...S.baikhonFiles,...newFiles];
      // rebuild rows from ALL baikhon files
      const allBooks=await Promise.all(S.baikhonFiles.map(readWB));
      S.baikhonRows=allBooks.flatMap(wbToRows);
      // *** extract Thai rows from ใบขน for VIN matching ***
      S.baikhonThaiRows=extractThai(S.baikhonRows);
    }
    if(type==='spreadsheet'){S.ssFiles=files;S.ssRows=extractSS(rows)}
    if(type==='cost'){
      // ต้นทุน = Master file (Update COO Q1 → Previous MASTER COO)
      S.cFiles=files;
      const allMasterRows=[];
      const today=new Date();

      for(const wb2 of await Promise.all(files.map(readWB))){
        const PRIORITY=['Update COO Q1','Previous MASTER COO'];
        const ordered=[
          ...PRIORITY.filter(s=>wb2.SheetNames.includes(s)),
          ...wb2.SheetNames.filter(s=>!PRIORITY.includes(s)&&!/^Sheet\d*$/i.test(s)),
        ];

        for(const shName of ordered){
          const ws=wb2.Sheets[shName];
          if(!ws)continue;

          // ── AOA approach: 100% immune to column name variations ──
          const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
          if(aoa.length<2)continue;

          // Normalize header row: collapse all whitespace/newlines → single space
          const hdr=aoa[0].map(v=>String(v||'').replace(/[\n\r]+/g,' ').replace(/\s+/g,' ').trim().toUpperCase());

          // Find column by fuzzy match
          const findCol=(...terms)=>{
            for(const t of terms){
              const tu=t.toUpperCase().replace(/\s+/g,' ').trim();
              const idx=hdr.findIndex(h=>h===tu||h.includes(tu)||tu.includes(h));
              if(idx>=0)return idx;
            }
            return -1;
          };

          const ci={
            mpvRep:  findCol('MPV CODE (REPRESENTATIVE)','MPV CODE REPRESENTATIVE'),
            mkt:     findCol('MARKET / PRIVILEGE','MARKET/PRIVILEGE'),
            tariff:  findCol('TARIFF ON C/O','TARIFF ON C/O'),
            rvc:     findCol('RVC (%)','RVC'),
            csn:     findCol('COST STRUCTURE NO.','COST STRUCTURE NO','COST STRUCTURE NUMBER'),
            dateApp: findCol('DATE APPROVAL','APPROVAL DATE'),
            expDate: findCol('EXPIRED DATE','EXPIRY DATE','EXPIRE DATE'),
            descForm:findCol('DESCRIPTION (FORM)','DESCRIPTION FORM'),
            prodEng: findCol('PRODUCT ENG NAME','PRODUCT ENG','ENG NAME'),
          };

          // Skip if no MPV Code or CSN column found
          if(ci.mpvRep<0||ci.csn<0)continue;

          for(let i=1;i<aoa.length;i++){
            const row=aoa[i];
            if(!row||!row.length)continue;
            const mpv=String(row[ci.mpvRep]||'').trim();
            const csn=String(row[ci.csn]||'').trim();
            if(!mpv||!csn)continue;

            // Check expiry
            let valid=true;
            if(ci.expDate>=0&&row[ci.expDate]){
              try{valid=new Date(row[ci.expDate])>=today}catch{}
            }
            if(!valid)continue;

            allMasterRows.push({
              mpvRep:  mpv,
              mkt:     ci.mkt>=0    ?String(row[ci.mkt]||'')   :'',
              tariff:  ci.tariff>=0  ?row[ci.tariff]             :'',
              rvc:     ci.rvc>=0     ?row[ci.rvc]                :'',
              csn:     csn,
              dateApp: ci.dateApp>=0 ?row[ci.dateApp]            :'',

        }

        toast('⚠️ ไม่พบข้อมูล Master — ตรวจสอบว่าไฟล์มี sheet "Update COO Q1" หรือ "Previous MASTER COO"','error');

      }
    }
    if(type==='master'){
      // legacy fallback — same as cost
      S.masterRows=extractMaster(rows);
      S.masterSaved=false;
    }
    recompute();
    const added=type==='baikhon'?files.filter(f=>S.baikhonFiles.some(x=>x.name===f.name)).length:files.length;

  }catch(e){S.mapErr=e?.message||'ประมวลผลไฟล์ไม่สำเร็จ'}
  S.mapLoading=false;R();
}

  ctZone.ondragleave=()=>ctZone.classList.remove('drag');
  ctZone.ondrop=e=>{e.preventDefault();ctZone.classList.remove('drag');SVN.masterSaved=false;procFiles_VN(Array.from(e.dataTransfer.files).filter(f=>/\.(xlsx|xls)$/i.test(f.name)),'cost_vn')};
  ctZone.onclick=()=>ctInp.click();ctZone.appendChild(ctInp);ctCard.appendChild(ctZone);
  if(hasCost){ctCard.appendChild(mkPillVN(SVN.cFiles[0].name,()=>{SVN.cFiles=[];SVN.masterRows=[];SVN.masterSaved=false;recompute_VN();R()}));}
  grid3.appendChild(ctCard);
  wrap.appendChild(grid3);

  // ── Loading / Error ──
  if(SVN.mapLoading){const ld=d('',[], {display:'flex',alignItems:'center',gap:'8px',padding:'10px 4px'});ld.appendChild(d('',[], {width:'16px',height:'16px',border:'2px solid rgba(34,211,238,0.3)',borderTopColor:'#22d3ee',borderRadius:'50%',animation:'spin .7s linear infinite',flexShrink:'0'}));ld.appendChild(t('กำลังอ่านไฟล์...',{color:'#94a3b8',fontSize:'13px'}));wrap.appendChild(ld);}
  if(SVN.mapErr)wrap.appendChild(d('alert-danger',[SVN.mapErr],{marginTop:'12px'}));

  // ── Export card ──
  const exportCard=d('',[], {background:'rgba(34,211,238,0.04)',borderRadius:'16px',border:'1px solid rgba(34,211,238,0.15)',padding:'16px 20px',marginTop:'16px'});
  const statsRow=d('',[], {display:'flex',gap:'16px',marginBottom:'14px',flexWrap:'wrap'});
  [[SVN.baikhonFiles.length,'📋','ใบขน'],[SVN.ssFiles.length,'📊','Spreadsheet'],[SVN.cFiles.length,'💰','ต้นทุน'],[SVN.report.length,'📄','Report rows'],[Object.keys(SVN.bolSheets).length,'🗂️','BOL Ports']].forEach(([n,icon,label])=>{
    const itm=d('',[], {display:'flex',alignItems:'center',gap:'6px',background:'rgba(255,255,255,0.04)',borderRadius:'8px',padding:'6px 10px'});
    itm.appendChild(t(icon,{fontSize:'13px'}));
    const txt=d('');txt.appendChild(t(String(n),{color:n>0?'#22d3ee':'#64748b',fontWeight:'700',fontSize:'14px',display:'block',lineHeight:'1.1'}));txt.appendChild(t(label,{color:'#64748b',fontSize:'10px',display:'block'}));
    itm.appendChild(txt);statsRow.appendChild(itm);
  });
  exportCard.appendChild(statsRow);
  exportCard.appendChild(d('',[], {height:'1px',background:'rgba(34,211,238,0.1)',marginBottom:'14px'}));
  const ready=SVN.report.length>0;
  const btnRow=d('',[], {display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'});

  function mkVNBtn(label, color, onClick){
    const btn=document.createElement('button');
    const isMain=color==='main';
    Object.assign(btn.style,{display:'inline-flex',alignItems:'center',gap:'7px',padding:'9px 16px',borderRadius:'10px',border:isMain?'none':'1px solid rgba(34,211,238,0.25)',background:ready?(isMain?'linear-gradient(135deg,#06b6d4,#0891b2)':'rgba(34,211,238,0.08)'):'rgba(255,255,255,0.04)',color:ready?(isMain?'#fff':'#22d3ee'):'#475569',fontWeight:'600',fontSize:'13px',cursor:ready?'pointer':'not-allowed',opacity:ready?'1':'0.45',whiteSpace:'nowrap',boxShadow:ready&&isMain?'0 3px 12px rgba(6,182,212,0.28)':'none',transition:'all .18s'});
    btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>${label}`;
    if(ready)btn.onclick=onClick;
    return btn;
  }

  btnRow.appendChild(mkVNBtn('Export BOL VN','main',()=>{
    if(!Number(SVN.usd)||!Number(SVN.aud)){toast('กรุณากรอก USD / AUD Rate','error');return;}
    doExportXLSX_VN();
  }));
  btnRow.appendChild(mkVNBtn('Export Form AU VN','sec',()=>{
    if(!Number(SVN.usd)||!Number(SVN.aud)){toast('กรุณากรอก USD / AUD Rate','error');return;}
    exportFormAU_VN();
  }));

  // Form AU existing merge zone
  const auHas=SVN.formAuFiles.length>0;
  const auZone=d('upload-zone',[], {padding:'7px 10px',display:'inline-flex',alignItems:'center',gap:'8px',borderRadius:'10px',borderColor:auHas?'rgba(34,211,238,0.4)':'rgba(255,255,255,0.15)',marginLeft:'4px'});
  auZone.innerHTML=`<span style="font-size:14px">${auHas?'✅':'📎'}</span><span style="color:${auHas?'#22d3ee':'#64748b'};font-size:11px;font-weight:600">${auHas?SVN.formAuExRows.length+' rows เดิม':'Form AU เดิม (optional)'}</span>`;
  const auInp=document.createElement('input');auInp.type='file';auInp.accept='.xlsx,.xls';auInp.multiple=true;auInp.style.display='none';
  auInp.onchange=e=>procFiles_VN(Array.from(e.target.files),'formau_vn');
  auZone.onclick=()=>auInp.click();auZone.appendChild(auInp);btnRow.appendChild(auZone);

  if(!ready)btnRow.appendChild(t('⚠️ อัปโหลดไฟล์ให้ครบก่อน',{color:'#64748b',fontSize:'12px',marginLeft:'8px'}));
  exportCard.appendChild(btnRow);
  wrap.appendChild(exportCard);
  return wrap;
}

// ── VN Report Tab ─────────────────────────────
function reportTabVN(){
  const q=SVN.search.trim().toLowerCase();
  const preview=q?SVN.report.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q)):SVN.report;
  const wrap=d('card',[], {padding:'0',overflow:'hidden',border:'1px solid rgba(34,211,238,0.2)'});
  const sb2=d('search-box');
  sb2.appendChild(t('🔍',{fontSize:'16px'}));
  const si=document.createElement('input');si.value=SVN.search;si.placeholder='ค้นหา VIN / Port / Invoice...';si.className='search-inp';
  si.oninput=e=>{SVN.search=e.target.value;R()};
  sb2.appendChild(si);sb2.appendChild(t(preview.length+' rows',{color:'#64748b',fontSize:'12px',whiteSpace:'nowrap'}));
  if(SVN.report.length>0){
    const auBtn=document.createElement('button');
    Object.assign(auBtn.style,{padding:'7px 14px',background:'linear-gradient(135deg,#06b6d4,#0891b2)',borderRadius:'10px',color:'#fff',fontWeight:'700',fontSize:'12px',border:'none',cursor:'pointer',whiteSpace:'nowrap',marginLeft:'8px'});
    auBtn.innerHTML='🇦🇺 Form AU VN';auBtn.onclick=exportFormAU_VN;sb2.appendChild(auBtn);
  }
  wrap.appendChild(sb2);
  const scroll=d('',[], {overflowX:'auto'});
  const cols=['VIN','BoL Number','VISTA Entity Code','Amount 3RD(AUD)','Amount TH ( THB )','FOB TH','FOB 3RD','INVOICE NO TH','Invoice Date'];
  const tb=document.createElement('table');
  const thead=document.createElement('thead');const htr=document.createElement('tr');
  cols.forEach(h=>{const th2=document.createElement('th');th2.textContent=h;htr.appendChild(th2)});
  thead.appendChild(htr);tb.appendChild(thead);
  const tbody=document.createElement('tbody');
  if(!preview.length){const tr=document.createElement('tr');const td=document.createElement('td');td.colSpan=cols.length;td.textContent='ยังไม่มีข้อมูล — กรุณาอัปโหลดไฟล์ในแท็บ Upload';Object.assign(td.style,{padding:'40px',textAlign:'center',color:'#64748b'});tr.appendChild(td);tbody.appendChild(tr)}
  else preview.slice(0,500).forEach(r=>{const tr=document.createElement('tr');cols.forEach(k=>{const td=document.createElement('td');const v=r[k];td.textContent=typeof v==='number'?v.toFixed(4):(v||'—');tr.appendChild(td)});tbody.appendChild(tr)});
  tb.appendChild(tbody);scroll.appendChild(tb);wrap.appendChild(scroll);
  if(preview.length>500){const note=d('',[], {padding:'8px 14px',color:'#64748b',fontSize:'12px'});note.textContent=`แสดง 500 จาก ${preview.length} rows`;wrap.appendChild(note)}
  return wrap;
}

// ── VN BOL Tab ────────────────────────────────
function bolTabVN(){
  const bols=Object.keys(SVN.bolSheets);
  if(!bols.length)return d('',[], {color:'#64748b',textAlign:'center',padding:'50px',fontSize:'14px'});
  const grid=d('bol-grid');
  bols.forEach(bol=>{
    const rows=SVN.bolSheets[bol];const c=d('card',[], {border:'1px solid rgba(34,211,238,0.18)'});
    const hdr=d('',[], {display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'});
    hdr.appendChild(t('🇻🇳',{fontSize:'16px'}));hdr.appendChild(t(bol,{color:'#22d3ee',fontWeight:'700',fontSize:'13px',flex:'1'}));
    const badge=d('',[], {background:'rgba(34,211,238,0.15)',borderRadius:'8px',padding:'2px 8px'});
    badge.appendChild(t(rows.length+' items',{color:'#22d3ee',fontSize:'11px'}));hdr.appendChild(badge);c.appendChild(hdr);
    const scroll=d('',[], {maxHeight:'210px',overflowY:'auto'});
    rows.forEach(r=>{
      const item=d('',[], {padding:'8px 10px',borderRadius:'8px',background:'rgba(255,255,255,0.03)',marginBottom:'5px'});
      item.appendChild(t(`ITEM ${r.ITEM} — ${r['VISTA Entity Code']||'—'}`,{color:'#22d3ee',fontWeight:'600',fontSize:'11px',display:'block'}));
      item.appendChild(t(r['QAD Description1']||'—',{color:'#94a3b8',fontSize:'11px',display:'block',marginTop:'2px'}));
      item.appendChild(t(`Invoice: ${r['INVOICE NO TH']||'—'} · Qty: ${r['ผลรวม ของ QTY']}`,{color:'#64748b',fontSize:'11px',display:'block',marginTop:'2px'}));
      scroll.appendChild(item);
    });
    c.appendChild(scroll);grid.appendChild(c);
  });
  return grid;
}

// ════════════════════════════════════════════
//  INIT — Handle OAuth callback + session
// ════════════════════════════════════════════
(async function init(){
  // Load saved Master/ต้นทุน rows
  try{const saved=await loadMasterFromStorage();if(saved&&saved.length){S.masterRows=saved;S.masterSaved=true;}}catch{}
  try{const savedVN=localStorage.getItem('nj_master_rows_vn');if(savedVN){const r=JSON.parse(savedVN);if(r&&r.length){SVN.masterRows=r;SVN.masterSaved=true;}}}catch{}
  if(!IS_FILE_PROTO){
    // ── รัน Web Server: ใช้ Supabase session ปกติ ──
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(session?.user){
        const meta=session.user.user_metadata||{};
        S.user={
          username:meta.username||meta.full_name||session.user.email?.split('@')[0]||'User',
          role:meta.role||'User',email:session.user.email,id:session.user.id,
        };
      }
      sb.auth.onAuthStateChange((event, session)=>{
        if(event==='SIGNED_IN'&&session?.user){
          const meta=session.user.user_metadata||{};
          S.user={
            username:meta.username||meta.full_name||session.user.email?.split('@')[0]||'User',
            role:meta.role||'User',email:session.user.email,id:session.user.id,
          };
          S.authLoading=false;R();
        } else if(event==='SIGNED_OUT'){
          S.user=null;S.authLoading=false;R();
        }
      });
    }catch(e){console.error('Init error:',e)}
  }
  // ── file:// หรือ Web: ให้ login form ทำงานปกติ ──
  S.authLoading=false;R();
})();
</script>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>N.J.LOGISTIC & FRUIT CO.,LTD - Import Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a{touch-action:manipulation;-webkit-touch-callout:none;user-select:none}
body{background:#0d1117;font-family:'Sarabun',sans-serif;color:#e2e8f4}
button,input,textarea,select{font-family:'Sarabun',sans-serif!important}
.wrap{max-width:100%;margin:0 auto;min-height:100vh}
@media(min-width:900px){
  body{padding:0 20px}
  .wrap{max-width:1200px;width:100%}
  .mode-bar{margin:0 0 14px}
  .fix-bar{max-width:1200px}
}
.hdr{padding:22px 16px 46px;position:relative;overflow:hidden}
.blob{position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.hdr-inner{position:relative;display:flex;align-items:center;gap:12px}
.card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:12px;margin-bottom:10px;contain:layout paint style}
/* PERF v5: virtualized list cards — skip paint when off-screen (huge win for long lists) */
.vc{content-visibility:auto;contain-intrinsic-size:0 160px}
.btn-green{width:100%;background:#06C755;border:none;border-radius:14px;padding:15px;color:white;font-size:15px;font-weight:800;cursor:pointer}
.btn-outline{width:100%;background:transparent;border:1.5px solid #1e2d45;border-radius:14px;padding:13px;color:#64748b;font-size:14px;cursor:pointer;margin-top:10px}
.inp{width:100%;background:#0d1117;border:1.5px solid #1e2d45;border-radius:10px;padding:11px 12px;color:#e2e8f4;font-size:14px;outline:none}
.inp:focus{border-color:#06C755}
textarea.inp{resize:none;min-height:80px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#161b27;border:1px solid #1e2d45;color:#e2e8f4;padding:12px 22px;border-radius:100px;font-size:14px;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:999;max-width:90vw;overflow:hidden;text-overflow:ellipsis;display:none}
.fix-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#0d1117;border-top:1px solid #1e2d45;padding:10px 13px 28px;z-index:100}
@media(max-width:900px){.fix-bar{max-width:100%}}
.mode-bar{display:flex;gap:6px;margin:0 13px 14px;flex-wrap:wrap}
.mode-btn{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid #1e2d45;background:#161b27;color:#64748b;font-size:clamp(11px,2vw,15px);font-weight:800;cursor:pointer;text-align:center;white-space:nowrap}
.mode-btn.active{color:white}
.filter-bar{display:flex;gap:8px;margin-bottom:12px}
.filter-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #1e2d45;background:#1a2540;color:#64748b;font-size:12px;font-weight:700;cursor:pointer}
.filter-btn.active{background:rgba(6,199,85,.11);color:#06C755;border-color:#06C755}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);contain:strict}
.modal-box{background:#161b27;width:100%;border-radius:22px 22px 0 0;padding:22px 18px 44px;border-top:1px solid #1e2d45}
.timeline-dot{width:10px;height:10px;border-radius:50%;border:2px solid #0f172a;flex-shrink:0}
.status-btn{background:#1a2540;border:1.5px solid #1e2d45;border-radius:12px;padding:11px 10px;cursor:pointer;font-size:12px;color:#94a3b8;font-weight:500;text-align:left;line-height:1.4}
.status-btn.sel-normal{background:rgba(6,199,85,.11);border-color:#06C755;color:#06C755;font-weight:700}
.status-btn.sel-delay{background:rgba(245,158,11,.1);border-color:#f59e0b;color:#f59e0b;font-weight:700}
.tab-btn{flex:1;padding:9px 6px;border-radius:10px;border:1.5px solid #1e2d45;background:#1a2540;color:#64748b;font-size:13px;font-weight:700;cursor:pointer}
.tab-btn.active-normal{background:rgba(6,199,85,.11);border-color:#06C755;color:#06C755}
.tab-btn.active-delay{background:rgba(245,158,11,.1);border-color:#f59e0b;color:#f59e0b}
.copy-btn{flex:1;background:#161b27;border-radius:12px;padding:11px 4px;font-size:13px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.copy-btn span{font-size:18px}
.fl-drop{position:fixed;background:#161b27;border:1.5px solid #06C755;border-radius:12px;max-height:240px;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:9999;display:none}
.fl-drop .fl-item{padding:11px 14px;cursor:pointer;font-size:13px;color:#e2e8f4;border-bottom:1px solid #1e2d45;display:flex;align-items:center;justify-content:space-between}
.fl-drop .fl-item:hover{background:rgba(255,255,255,.05)}
.fl-drop .fl-add{padding:8px 10px;border-top:1.5px solid #2a3a54;background:#0d1117;display:flex;gap:8px;align-items:center}
/* ========== SIDEBAR LAYOUT (V.4 DECORATION) ========== */
.app-shell{display:flex;min-height:100vh;position:relative}
.sidebar{width:248px;background:#0d1117;border-right:1px solid #1e2d45;flex-shrink:0;overflow-y:auto;padding:0;contain:layout paint style}
/* PERF v5: skeleton shimmer — perceived-speed win while jobs load (replaces plain "⏳ กำลังโหลด..." plain text) */
.sk-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:12px;margin-bottom:10px;height:130px;position:relative;overflow:hidden}
.sk-card::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);animation:sk-wave 1.4s infinite linear;will-change:transform}
@keyframes sk-wave{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:3px}
.main-content{flex:1;min-width:0;overflow-x:hidden;padding-bottom:40px;overscroll-behavior:contain}
/* PERF v5: list area — isolate layout/paint from surrounding UI */
#jobListArea{contain:layout style;will-change:auto}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.mobile-topbar{display:none}
@media(max-width:900px){
  /* PERF: removed permanent will-change — promote layer only when actually open/shown */
  .sidebar{position:fixed;top:0;left:-320px;height:100vh;z-index:500;transition:left .25s ease;box-shadow:4px 0 30px rgba(0,0,0,.5);width:285px;-webkit-overflow-scrolling:touch}
  .sidebar.open{left:0;will-change:transform}
  .sb-overlay.show{display:block;will-change:opacity}
  .mobile-topbar{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#0d1117;border-bottom:1px solid #1e2d45;position:sticky;top:0;z-index:100}
  body{padding:0;-webkit-overflow-scrolling:touch}
  .wrap{max-width:100%}
  /* Mobile: scroll smoothing for main content */
  .main-content{-webkit-overflow-scrolling:touch}
}
@media(min-width:901px){
  /* Grid shell: sidebar + content 1fr (no empty right-space) */
  body{padding:0!important}
  .wrap{max-width:100%!important;width:100%!important}
  .app-shell{display:grid;grid-template-columns:228px 1fr;min-height:100vh}
  .sidebar{width:228px;position:static;left:auto}
  .sidebar .sb-header{padding:18px 16px 16px}
  .sidebar .sb-user{padding:14px 16px}
  .main-content{max-width:100%;min-width:0}
  .main-content>.inner{max-width:1320px;margin:0 auto;width:100%}
  /* Aligned padding (header ≡ body) */
  .main-content .ds-hdr,.ds-hdr{padding:8px 24px}
  .main-content .ds-body,.ds-body{padding:20px 24px;max-width:1320px}
  .ds-body-narrow{max-width:1200px;padding:20px 24px}
  /* Cards: full width + bigger padding + cleaner spacing */
  .main-content .card,.ds-body .card,.ds-body-narrow .card{padding:16px 18px;width:100%;max-width:100%;margin-bottom:14px}
  /* Form: real 2-col grid */
  .ds-form-grid{grid-template-columns:1fr 1fr;gap:16px}
  /* Toolbar: desktop row */
  .ds-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .ds-search-wrap{max-width:420px;flex:1 1 auto;margin-bottom:0}
  /* Empty state centered in content (not viewport) */
  .ds-empty{max-width:500px;margin:80px auto}
  /* Section spacing */
  .ds-chip-row{margin-bottom:14px}
}
.sb-header{padding:20px 18px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e2d45}
.sb-logo-box{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 3px 12px rgba(249,115,22,.35)}
.sb-title{font-size:17px;font-weight:800;color:#e2e8f4;line-height:1.2;letter-spacing:.2px}
.sb-subtitle{font-size:10.5px;color:#64748b;margin-top:3px;font-weight:600;letter-spacing:.4px;display:flex;align-items:center;gap:5px}
.sb-user{padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e2d45}
.sb-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;flex-shrink:0;letter-spacing:.5px}
.sb-user-name{font-size:14.5px;font-weight:800;color:#e2e8f4;line-height:1.2}

.sb-section{padding:14px 14px 4px}
.sb-section-label{font-size:10px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:1.3px;padding:0 6px 10px;display:flex;align-items:center;gap:7px}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;position:relative;transition:background .15s,border-color .15s;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.04)}

.sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.sb-icon{font-size:16px;width:18px;text-align:center;color:#94a3b8;flex-shrink:0;line-height:1}
.sb-item.active .sb-icon{color:#f97316}
.sb-text{font-size:14px;font-weight:600;color:#cbd5e1;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item.active .sb-text{color:#f97316;font-weight:800}
.sb-badge{font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:.5px;flex-shrink:0;line-height:1}
.sb-badge-live{background:rgba(6,199,85,.15);color:#06C755;border:1px solid rgba(6,199,85,.4)}
.sb-badge-new{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.4)}
.sb-badge-count{background:rgba(255,255,255,.08);color:#94a3b8;border:1px solid rgba(255,255,255,.1);font-size:11px}
.sb-divider{height:1px;background:#1e2d45;margin:10px 18px}
.hamburger{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:8px 12px;color:#e2e8f4;font-size:18px;cursor:pointer;line-height:1;flex-shrink:0}
.mt-title{font-weight:800;font-size:14.5px;color:#e2e8f4;line-height:1.2}
.mt-sub{font-size:10.5px;color:#64748b;font-weight:600;margin-top:2px}
.mode-mini-hdr{padding:18px 16px 12px;border-bottom:1px solid #1e2d45;background:#0d1117}
/* ========== COMPACT ADMIN VIEW FILTER (V.4.1) — Admin View Only ========== */
.adm-filter-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:10px;margin-bottom:12px}
.adm-filter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:720px){.adm-filter-grid{grid-template-columns:1.1fr 1fr 1fr 1.1fr auto;align-items:end}}
.adm-field{display:flex;flex-direction:column;gap:4px;min-width:0}
.adm-label{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding-left:2px;line-height:1.2}
.adm-input{height:32px;background:#0d1117;border:1px solid #1e2d45;border-radius:6px;padding:4px 8px;color:#e2e8f4;font-size:12px;font-weight:600;outline:none;font-family:'Sarabun',sans-serif;width:100%;box-sizing:border-box;line-height:1.2;appearance:auto}
.adm-input:focus{border-color:#06C755}
input.adm-input[type="date"]{color-scheme:dark}

.adm-export:hover{background:#05a647;box-shadow:0 3px 12px rgba(6,199,85,.45)}
.adm-export:active{transform:translateY(1px)}
@media(max-width:719px){.adm-export{grid-column:span 2;margin-top:2px}}
/* ========== REPORT DASHBOARD (V.4.4) — Report Only — rewritten ========== */
.rpt-hdr{height:56px;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid #1e2d45;position:sticky;top:0;z-index:50}
.rpt-back-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#cbd5e1;padding:0 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;height:30px;display:inline-flex;align-items:center;gap:4px;transition:background .12s,color .12s}

.rpt-hdr-title{font-size:14px;font-weight:800;color:#e2e8f4;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.rpt-body{padding:14px 13px;max-width:900px;margin:0 auto}
.rpt-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:14px}
.rpt-card-title{font-size:13px;font-weight:800;color:#e2e8f4;display:flex;align-items:center;gap:6px}
.rpt-card-sub{font-size:11px;color:#64748b;font-weight:500;margin-top:3px;margin-bottom:12px}
.rpt-row{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}

.rpt-input{height:32px;background:#0d1117;border:1px solid #1e2d45;border-radius:6px;padding:4px 8px;color:#e2e8f4;font-size:12px;font-weight:600;outline:none;font-family:'Sarabun',sans-serif;width:100%;box-sizing:border-box;line-height:1.2;appearance:auto}

/* ========== DASHBOARD DESIGN SYSTEM (V.5) — Global ========== */
.ds-hdr{min-height:54px;background:#161b27;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #1e2d45;position:sticky;top:0;z-index:50}
.ds-hdr-back{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#cbd5e1;padding:0 11px;border-radius:6px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;height:28px;display:inline-flex;align-items:center;gap:4px;transition:background .12s,color .12s;white-space:nowrap;flex-shrink:0}
.ds-hdr-back:hover{background:rgba(255,255,255,.12);color:white}
.ds-hdr-ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;line-height:1}

.ds-hdr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.ds-hdr-act{height:28px;padding:0 10px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#cbd5e1;font-size:11.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:'Sarabun',sans-serif;white-space:nowrap;transition:background .12s}
.ds-hdr-act:hover{background:rgba(255,255,255,.12);color:white}

.ds-hdr-act.primary:hover{filter:brightness(1.1)}

.ds-sect{display:flex;align-items:center;gap:8px;margin:14px 2px 10px}
.ds-sect-title{font-size:13px;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.ds-sect-count{font-size:10.5px;color:#94a3b8;font-weight:700;padding:2px 8px;background:rgba(255,255,255,.06);border-radius:999px}
.ds-body{padding:14px 14px;max-width:1180px;margin:0 auto}
.ds-body-narrow{padding:14px 14px;max-width:720px;margin:0 auto}

.ds-search:focus{border-color:#06C755}
.ds-search-wrap{position:relative;max-width:340px;margin-bottom:10px}
.ds-form-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:620px){.ds-form-grid{grid-template-columns:1fr 1fr;gap:12px}}

// PERF: Smart setState - use renderListOnly when only list-relevant keys change
const LIST_ONLY_KEYS=new Set(['jobs','filter','search','loading']);
// PERF v5: Microtask scheduler — coalesces multiple setState() calls in same tick into one render
let _rafPending=false,_pendingListOnly=true;
function _flushRender(){
  _rafPending=false;
  const listOnly=_pendingListOnly;
  _pendingListOnly=true;
  if(listOnly&&STATE.page==='list'&&document.getElementById('jobListArea')){
    renderListOnly();
  }else{
    render();
  }
}
function setState(obj){
  Object.assign(STATE,obj);
  const keys=Object.keys(obj);
  const isListOnly=STATE.page==='list'&&keys.every(k=>LIST_ONLY_KEYS.has(k))&&document.getElementById('jobListArea');
  if(!isListOnly)_pendingListOnly=false;
  if(!_rafPending){
    _rafPending=true;
    // rAF ensures we batch inside the same frame; fallback for older browsers
    (window.requestAnimationFrame||function(cb){setTimeout(cb,16);})(_flushRender);
  }
}
// PERF: switchMode uses per-mode cache — show cached jobs instantly, refetch silently (no blank flash)
function switchMode(mk){
  STATE.mode=mk;
  STATE.filter="today";
  STATE.search="";
  STATE._lastSearch=""; // PERF: reset search dedup guard
  STATE.page="list";
  STATE.aid=null;
  // PERF: Show cached jobs for this mode instantly instead of blank
  if(!window._modeJobCache)window._modeJobCache={};
  STATE.jobs=window._modeJobCache[mk]||[];
  // PERF: Ensure derived fields exist on cached jobs (defensive for older cache) — idle since cache was already precomputed
  if(STATE.jobs.length)precomputeJobsIdle(STATE.jobs);
  STATE._listFp=""; // reset fingerprint so silentRefresh will revalidate
  loadJobsFromDB(); // fetches fresh data, renders when ready
}

async function loadJobsFromDB(){
  if(!CURRENT_USER)return;
  // PERF: Skip loading flash if we already have data (cached from previous visit)
  const hasCached=STATE.jobs&&STATE.jobs.length>0;
  STATE.loading=!hasCached;render();
  const role=CURRENT_USER.role;
  const canSeeAll=(role==="admin"||role==="superadmin");
  // PERF: Explicit SELECT (smaller payload than select=*) — only fields used by list+detail
  const FIELDS="id,mode,customer,bl,customs,warehouse,date,done,foot_note,owner_id,owner_name,created_at,updated_at";
  const qBase=canSeeAll
    ?"mode=eq."+STATE.mode+"&order=created_at.desc&limit=50&select="+FIELDS
    :"mode=eq."+STATE.mode+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&limit=50&select="+FIELDS;
  const rawJobs=await sbGet("nj_jobs",qBase);
  // Load entries in background after list renders
  const jobs=(rawJobs||[]).map(j=>({...j,entries:j.entries||[]}));
  precomputeJobs(jobs); // PERF: compute _latestEntry/_searchText/_dayBucket once
  STATE.jobs=jobs;STATE.loading=false;render();
  // PERF: Cache this mode's jobs for instant display on revisit
  if(!window._modeJobCache)window._modeJobCache={};
  window._modeJobCache[STATE.mode]=jobs;
  // PERF: Lazy load entries in background with explicit field list
  const ids=(rawJobs||[]).map(j=>j.id);
  if(ids.length){
    const entQ="job_id=in.("+ids.join(",")+")&order=time.asc&select=id,job_id,time,status,note,created_by,entry_date,type";
    const ents=await sbGet("nj_entries",entQ);
    if(ents&&ents.length){
      const entMap={};
      ents.forEach(e=>{if(!entMap[e.job_id])entMap[e.job_id]=[];entMap[e.job_id].push(e);});
      STATE.jobs=STATE.jobs.map(j=>{
        const nj={...j,entries:entMap[j.id]||[]};
        precomputeJob(nj); // PERF: refresh derived fields after entries arrive
        return nj;
      });
      // PERF: Update cache with entries too
      window._modeJobCache[STATE.mode]=STATE.jobs;
      renderListOnly();return;
    }
  }
  const dummy=0;//dummy
  // PERF: Auto-switch tab logic runs after lazy load completes
  if(STATE.filter==="today"){
    const hasToday=(STATE.jobs||[]).filter(j=>!j.done&&getDaysDiff(j.date)===0).length>0;
    const hasPending=(STATE.jobs||[]).filter(j=>!j.done&&getDaysDiff(j.date)>0).length>0;
    if(!hasToday&&hasPending)STATE.filter="older";
    else if(!hasToday&&!hasPending)STATE.filter="today";
  }
}

  const pillBg=job.done?"rgba(100,116,139,.15)":bucket==="today"?GL:bucket==="yesterday"?"rgba(245,158,11,.15)":"rgba(239,68,68,.15)";
  const pillFg=job.done?"#64748b":bucket==="today"?G:bucket==="yesterday"?"#f59e0b":"#ef4444";
  let pillTxt;

// PERF v6: TRUE VIRTUAL SCROLL + DOM PATCH ─────────────────
// - Renders only items in viewport (+ small buffer) — cards outside DOM entirely
// - On scroll/resize, reconciles DOM (remove off-screen, add on-screen, keep position)
// - On data change, patches only cards whose fingerprint (id|done|entryCount|latestTime|dayBucket) changed
// - Filter result cached by jobs array reference (mutations create new arrays via .map()/.filter() so cache auto-invalidates)
const _vs={
  filtered:[],       // current filtered jobs array
  params:null,       // {m, G, GL, blLbl}
  listEl:null,
  cardH:170,         // estimated card height (refined from measurements)
  buffer:5,          // render N items above/below viewport
  scrollRaf:null,
  onScroll:null,
  fps:new Map(),     // job.id → last-rendered fingerprint (for DOM patch diff)
};

// Filter cache — uses array identity; any mutation via .map()/.filter() produces new array → cache misses
let _fcJobsRef=null,_fcMode="",_fcFilter="",_fcQuery="",_fcResult=null,_fcModeCount=0;
function _computeFilter(mode,filter,search,jobs){
  const q=search.trim().toLowerCase();
  if(jobs===_fcJobsRef&&mode===_fcMode&&filter===_fcFilter&&q===_fcQuery&&_fcResult){
    return {filtered:_fcResult,modeCount:_fcModeCount};
  }
  let modeCount=0;
  const filtered=[];
  for(let i=0;i<jobs.length;i++){
    const j=jobs[i];
    if(j.mode!==mode)continue;
    modeCount++;
    if(j._dayBucket===undefined)precomputeJob(j);
    const b=j._dayBucket;
    let ok;
    if(filter==="done")ok=b==="done";
    else if(filter==="today")ok=b==="today";
    else if(filter==="yesterday")ok=b==="yesterday";
    else if(filter==="older")ok=b==="older";
    else ok=true;
    if(!ok)continue;
    if(q&&!(j._searchText||"").includes(q))continue;
    filtered.push(j);
  }
  _fcJobsRef=jobs;_fcMode=mode;_fcFilter=filter;_fcQuery=q;_fcResult=filtered;_fcModeCount=modeCount;
  return {filtered,modeCount};
}
function _invalidateFilterCache(){_fcJobsRef=null;_fcResult=null;}

// Fingerprint for DOM patch — changes when the visible card content changes
function _cardFp(job){
  const le=job._latestEntry;
  return job.id+"|"+(job.done?1:0)+"|"+(job._entryCount||0)+"|"+(job._dayBucket||"")+"|"+(le?(le.time||"")+":"+(le.status||"")+":"+(le.created_by||""):"");
}

function _cleanupVL(){
  if(_vs.onScroll){
    window.removeEventListener("scroll",_vs.onScroll);
    window.removeEventListener("resize",_vs.onScroll);
    _vs.onScroll=null;
  }
  if(_vs.scrollRaf){cancelAnimationFrame(_vs.scrollRaf);_vs.scrollRaf=null;}
  _vs.fps.clear();
}

function _attachScroll(){
  if(_vs.onScroll)return;
  _vs.onScroll=function(){
    if(_vs.scrollRaf)return;
    _vs.scrollRaf=requestAnimationFrame(function(){_vs.scrollRaf=null;_reconcileVirtualList();});
  };
  window.addEventListener("scroll",_vs.onScroll,{passive:true});
  window.addEventListener("resize",_vs.onScroll,{passive:true});
}

// Compute visible [startIdx, endIdx) for current scroll position
function _computeRange(){
  const {filtered,cardH,buffer,listEl}=_vs;
  const n=filtered.length;
  if(!n||!listEl)return[0,0];
  const rect=listEl.getBoundingClientRect();
  const vpH=window.innerHeight||document.documentElement.clientHeight;
  const startY=Math.max(0,-rect.top);
  const endY=Math.max(0,Math.min(n*cardH,-rect.top+vpH));
  let s=Math.max(0,Math.floor(startY/cardH)-buffer);
  let e=Math.min(n,Math.ceil(endY/cardH)+buffer);
  // If list is still below viewport (rect.top > vpH) render first buffer items to avoid empty list
  if(e<=s){s=0;e=Math.min(n,buffer*2);}
  return[s,e];
}

// Reconcile DOM to match computed range + current filtered data (DOM PATCH)
function _reconcileVirtualList(){
  const {filtered,params,listEl,cardH}=_vs;
  if(!listEl||!params)return;
  if(!filtered.length){return;}
  const cards=listEl.querySelector(".vs-cards");
  const top=listEl.querySelector(".vs-top");
  const bot=listEl.querySelector(".vs-bot");
  if(!cards||!top||!bot)return;

  const [s,e]=_computeRange();
  const targetIds=new Set();
  for(let i=s;i<e;i++)targetIds.add(filtered[i].id);

  // 1. Remove cards no longer in range
  for(const child of Array.from(cards.children)){
    const id=child.getAttribute("data-job-id");
    if(!id||!targetIds.has(id)){child.remove();_vs.fps.delete(id);}
  }

  // 2. Insert/move/patch cards for range [s,e) in correct order
  let prev=null;
  const {m,G,GL,blLbl}=params;
  for(let i=s;i<e;i++){
    const job=filtered[i];
    const fp=_cardFp(job);
    let el=cards.querySelector('[data-job-id="'+job.id+'"]');
    if(!el){
      // New card — insert
      const tmp=document.createElement("div");
      tmp.innerHTML=buildJobCardHtml(job,m,G,GL,blLbl);
      el=tmp.firstElementChild;
      if(prev)prev.after(el);
      else cards.prepend(el);
      _vs.fps.set(job.id,fp);
    }else if(_vs.fps.get(job.id)!==fp){
      // Content changed — replace
      const tmp=document.createElement("div");
      tmp.innerHTML=buildJobCardHtml(job,m,G,GL,blLbl);
      const newEl=tmp.firstElementChild;
      el.replaceWith(newEl);
      el=newEl;
      _vs.fps.set(job.id,fp);
    }else{
      // Unchanged — ensure position
      if(prev&&prev.nextElementSibling!==el)prev.after(el);
      else if(!prev&&cards.firstElementChild!==el)cards.prepend(el);
    }
    prev=el;
  }

  // 3. Update spacers
  top.style.height=(s*cardH)+"px";
  bot.style.height=((filtered.length-e)*cardH)+"px";

  // 4. Refine cardH from actual measurements (smooth convergence, avoid scroll jumps)
  if(cards.children.length>=3){
    let total=0,cnt=0;
    for(const c of cards.children){const h=c.offsetHeight;if(h>60){total+=h;cnt++;}}
    if(cnt>=3){
      const avg=total/cnt;
      if(Math.abs(avg-_vs.cardH)>8){_vs.cardH=Math.round(avg);}
    }
  }
}

function renderVirtualList(listEl,filtered,m,G,GL,blLbl){
  _vs.filtered=filtered;
  _vs.params={m,G,GL,blLbl};
  _vs.listEl=listEl;
  // Scaffold: top spacer | cards container | bottom spacer — preserved across reconciliations
  if(!listEl.querySelector(".vs-cards")){
    listEl.innerHTML='<div class="vs-top" style="height:0"></div><div class="vs-cards"></div><div class="vs-bot" style="height:0"></div>';
    _vs.fps.clear();
  }
  _attachScroll();
  _reconcileVirtualList();
}

// Render only the job list without destroying search input
function renderListOnly(){
  const listEl=document.getElementById("jobListArea");
  if(!listEl){render();return;}
  const{mode,filter,search,jobs}=STATE;
  const m=MODES[mode];
  const G=m.color;const GL=m.gl;
  const isSea=mode==="sea"||mode==="sebkk";
  const blLbl=isSea?"B/L":"HAWB";
  // PERF v6: filter cache — reuses result when (jobs ref, mode, filter, query) unchanged
  const {filtered,modeCount}=_computeFilter(mode,filter,search,jobs);
  if(filtered.length===0){
    _cleanupVL();
    listEl.innerHTML=`<div style="text-align:center;color:#64748b;padding:40px 0;font-size:14px;line-height:2"><div style="font-size:40px;margin-bottom:10px">${m.icon}</div>${modeCount===0?"ยังไม่มีงาน<br/>กด + เปิดงานใหม่":"ไม่พบผลการค้นหา"}</div>`;
    return;
  }
  // PERF v6: true virtual scroll — DOM patch, only visible cards exist in DOM
  renderVirtualList(listEl,filtered,m,G,GL,blLbl);
}

// PERF: silentRefresh - lightweight compare (count + latest id only)
async function silentRefresh(){
  if(!CURRENT_USER||STATE.page!=="list")return;
  const role=CURRENT_USER.role;
  const canSeeAll=(role==="admin"||role==="superadmin");
  // PERF: Only fetch id+done+updated_at to check if data changed (tiny payload)
  const qCheck=canSeeAll
    ?"mode=eq."+STATE.mode+"&order=created_at.desc&limit=50&select=id,done,updated_at"
    :"mode=eq."+STATE.mode+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&limit=50&select=id,done,updated_at";
  // Run both fetches in parallel — custom statuses sync even if jobs haven't changed
  const [snapshot]=await Promise.all([sbGet("nj_jobs",qCheck),loadCustomStatuses()]);
  if(!snapshot)return;
  // PERF: Compare lightweight fingerprint instead of JSON.stringify(jobs)
  const newFp=snapshot.map(j=>j.id+"|"+j.done+"|"+j.updated_at).join(",");
  if(newFp===STATE._listFp)return; // No change - skip render entirely
  STATE._listFp=newFp;
  // Data changed - do full reload quietly
  await loadJobsFromDB();
}
// PERF: Visibility-aware polling - pause when tab hidden, resume+refresh when visible
let _pollTimer=null;
function startPolling(){
  if(_pollTimer)return;
  _pollTimer=setInterval(silentRefresh,60000);
}
function stopPolling(){
  if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}
}
startPolling();
let _visT=null;
document.addEventListener("visibilitychange",function(){
  if(document.hidden){stopPolling();if(_visT){clearTimeout(_visT);_visT=null;}}
  else{
    startPolling();
    // PERF v5: small delay so rapid alt-tab doesn't spam the network
    if(_visT)clearTimeout(_visT);
    _visT=setTimeout(function(){
      _visT=null;
      if(!CURRENT_USER)return;
      loadCustomStatuses(); // sync any custom statuses added elsewhere
      if(STATE.page==="list")silentRefresh();
    },350);
  }
});

// ── HELPERS ───────────────────────────────────────────────
function todayStr(){const d=new Date();return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function nowTime(){const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,"0");}
function uid(){
  // Generate proper UUID v4 format for Supabase
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    const r=Math.random()*16|0;
    return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function showToast(m){
  const t=document.getElementById("toast");
  t.textContent=m;t.style.display="block";
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",2800);
}

function buildMsg(job,mk){
  const m=MODES[mk];const L=[];
  const icon=mk==="air"?"✈️":mk==="exp"?"📤":mk==="sebkk"?"🚤":"📦";
  L.push(icon+" อัปเดตสถานะงาน : "+m.label);
  L.push("ลูกค้า : "+job.customer);
  const bls=job.bl.split("\n").map(h=>h.trim()).filter(h=>h);
  if(bls.length===1)L.push(m.bl+": "+bls[0]);
  else bls.forEach((h,i)=>L.push(m.bl+" "+(i+1)+": "+h));
  if(job.customs)L.push("เลขใบขน : "+job.customs);
  if(job.warehouse)L.push("โกดัง : "+job.warehouse);
  L.push("");
  // Group entries by date
  const entries=[...(job.entries||[])].sort((a,b)=>{
    const da=a.entry_date||job.date||"";const db=b.entry_date||job.date||"";
    if(da!==db){
      const pa=da.split("/");const pb=db.split("/");
      const ta=pa.length===3?pa[2]+pa[1]+pa[0]:"";
      const tb=pb.length===3?pb[2]+pb[1]+pb[0]:"";
      if(ta!==tb)return ta.localeCompare(tb);
    }
    return a.time.localeCompare(b.time);
  });
  const dateGroups={};
  entries.forEach(e=>{
    const d=e.entry_date||job.date||"";
    if(!dateGroups[d])dateGroups[d]=[];
    dateGroups[d].push(e);
  });
  Object.keys(dateGroups).forEach(d=>{
    L.push("⏱ Timeline การดำเนินงาน");
    L.push("วันที่ : "+d);
    L.push("");
    dateGroups[d].forEach(e=>{
      L.push("• ⏰ "+e.time.replace(":",".") +"  "+e.status+(e.note?" ("+e.note+")":""));
    });
    L.push("");
  });
  if(job.foot_note)L.push("📝 หมายเหตุ : "+job.foot_note);
  return L.join("\n");
}

function doCopy(text,type){
  const doIt=()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    showToast("📋 Copy "+type+" สำเร็จ!");
  };
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showToast("📋 Copy "+type+" สำเร็จ!")).catch(doIt);
  else doIt();
}

// ── ACTIONS ───────────────────────────────────────────────
async function createJob(){
  const {nCust,nBl,nDate,nWarehouse,nCustoms,mode}=STATE;
  if(!nCust.trim()){showToast("⚠️ กรุณาระบุชื่อลูกค้า");return;}
  if(!nBl.trim()){showToast("⚠️ กรุณาระบุ "+MODES[mode].bl);return;}
  const j={id:uid(),mode,customer:nCust.trim(),bl:nBl.trim(),customs:nCustoms.trim(),date:nDate||todayStr(),warehouse:nWarehouse.trim(),foot_note:"",done:false,entries:[],owner_id:CURRENT_USER?CURRENT_USER.id:"",owner_name:CURRENT_USER?CURRENT_USER.username:"Unknown"};
  // บันทึกลง Supabase ทันที
  const ok=await sbInsert("nj_jobs",{...j,entries:undefined});
  if(!ok){showToast("⚠️ บันทึกไม่สำเร็จ กรุณาลองใหม่");return;}
  clearDraft();
  setState({jobs:[j,...STATE.jobs],page:"job",aid:j.id,sel:null,custom:"",eTime:"",eNote:"",tab:"normal",dupWarn:false,editEId:null,nCust:"",nBl:"",nDate:todayStr(),nWarehouse:"",nCustoms:"",nWSearch:"",showWList:false});
  showToast("✅ เปิดงานใหม่แล้ว");
}

async function addEntry(){
  const ms=STATE.multiSel&&STATE.multiSel.length>0?[...STATE.multiSel]:null;
  let status=STATE.sel;
  if(!ms&&!status){showToast("⚠️ กรุณาเลือกสถานะก่อน");return;}
  if(!ms&&status==="__custom__"){if(!STATE.custom.trim()){showToast("⚠️ กรุณาพิมพ์สถานะ");return;}status=STATE.custom.trim();}
  showToast("⏳ กำลังบันทึก...");
  const time=STATE.eTime||nowTime();
  const finalStatus=ms?ms.join(" + "):status;
  const active=STATE.jobs.find(j=>j.id===STATE.aid);
  const isDup=active&&(active.entries||[]).some(e=>e.status===finalStatus);
  if(isDup&&!STATE.dupWarn){setState({dupWarn:true});showToast("⚠️ สถานะนี้เคยเพิ่มไปแล้ว!");return;}
  const entry={id:uid(),job_id:STATE.aid,time,status:finalStatus,note:STATE.eNote.trim(),type:STATE.tab,created_by:(CURRENT_USER&&CURRENT_USER.username)?CURRENT_USER.username:"Unknown",entry_date:STATE.eDate||todayStr()};
  const ok=await sbInsert("nj_entries",entry);
  if(!ok){showToast("❌ บันทึกไม่สำเร็จ! เช็ค Supabase");return;}
  const jobs=STATE.jobs.map(j=>{
    if(j.id===STATE.aid){
      const nj={...j,entries:[...(j.entries||[]),entry]};
      precomputeJob(nj); // PERF: refresh derived fields after mutation
      return nj;
    }
    return j;
  });
  setState({jobs,sel:null,multiSel:[],custom:"",eTime:"",eDate:todayStr(),eNote:"",dupWarn:false,lastSaved:time});
  showToast("💾 บันทึกสำเร็จ "+time+" น. แล้ว!");
}

async function removeEntry(eid){
  await sbDelete("nj_entries",eid);
  const jobs=STATE.jobs.map(j=>{
    if(j.id===STATE.aid){
      const nj={...j,entries:(j.entries||[]).filter(e=>e.id!==eid)};
      precomputeJob(nj); // PERF: refresh derived fields after mutation
      return nj;
    }
    return j;
  });
  setState({jobs});
}

async function updateEntryTime(eid,newTime){
  await sbUpdate("nj_entries",eid,{time:newTime});
  const jobs=STATE.jobs.map(j=>{
    if(j.id===STATE.aid){
      const nj={...j,entries:(j.entries||[]).map(e=>e.id===eid?{...e,time:newTime}:e)};
      precomputeJob(nj); // PERF: refresh derived fields after mutation
      return nj;
    }
    return j;
  });
  setState({jobs,editEId:null,editTime:""});
  showToast("✅ แก้ไขเวลาแล้ว");
}

// PERF: toggleDone updates STATE.jobs directly then renderListOnly
async function toggleDone(id){
  const job=STATE.jobs.find(j=>j.id===id);
  await sbUpdate("nj_jobs",id,{done:!job.done});
  let updated=null;
  STATE.jobs=STATE.jobs.map(j=>{
    if(j.id!==id)return j;
    const nj={...j,done:!j.done};
    precomputeJob(nj); // PERF: _dayBucket depends on done, recompute
    updated=nj;
    return nj;
  });
  // PERF v5: keep per-mode cache in sync so next switchMode shows updated card
  if(window._modeJobCache&&window._modeJobCache[STATE.mode]){
    window._modeJobCache[STATE.mode]=STATE.jobs;
  }
  if(STATE.page==="list"){
    // PERF v5: GRANULAR — replace just one card's DOM instead of rebuilding the whole list.
    // Fallback to renderListOnly() if the target card can't be located (e.g. off-screen in a virtualized chunk).
    const cardEl=document.querySelector('#jobListArea [data-job-id="'+id+'"]');
    if(cardEl&&updated){
      const f=STATE.filter;const b=updated._dayBucket;
      // Does the updated card still match the active filter chip?
      const stillVisible=(f==="today"&&b==="today")||(f==="yesterday"&&b==="yesterday")||(f==="older"&&b==="older")||(f==="done"&&b==="done");
      if(!stillVisible){
        cardEl.remove();
      }else{
        const m=MODES[STATE.mode];
        const blLbl=(STATE.mode==="sea"||STATE.mode==="sebkk")?"B/L":"HAWB";
        cardEl.outerHTML=buildJobCardHtml(updated,m,m.color,m.gl,blLbl);
      }
    }else{
      renderListOnly();
    }
  }else{render();}
  showToast(job&&job.done?"🔄 กำลังดำเนินการ":"✅ มาร์กจบงานแล้ว");
}

async function deleteJob(id){
  await sbDelete("nj_jobs",id);
  const jobs=STATE.jobs.filter(j=>j.id!==id);

  setState({jobs,delId:null,...extra});

async function exportCSV(){
  const{expDate,mode}=STATE;const m=MODES[mode];
  const list=STATE.jobs.filter(j=>j.mode===mode&&j.date===expDate.trim());
  if(!list.length){showToast("⚠️ ไม่พบงานในวันที่ "+expDate);return;}
  const eq=v=>'"'+String(v).replace(/"/g,'""')+'"';
  const rows=[[" วันที่","ลูกค้า",m.bl,"เลขใบขน","โกดัง","สถานะงาน","เวลา","สถานะ","หมายเหตุ","หมายเหตุท้าย"].map(eq).join(",")];
  // PERF v6: use precomputed _sortedEntries / _blLines (no per-loop sort/split), yield every 100 jobs
  const BATCH=100;
  for(let i=0;i<list.length;i++){
    const job=list[i];
    const s=job.done?"จบงาน":"กำลังดำเนินการ";
    const blD=(job._blLines&&job._blLines.length?job._blLines:(job.bl||"").split("\n").map(h=>h.trim()).filter(h=>h)).join(", ");
    const se=job._sortedEntries||(job.entries||[]);
    if(!se.length){rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,"","(ยังไม่มี)","",job.foot_note||""].map(eq).join(","));}
    else se.forEach((e,k)=>rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,(e.time||"").replace(":","."),e.status,e.note||"",k===0?(job.foot_note||""):""].map(eq).join(",")));
    if(i>0&&i%BATCH===0)await new Promise(r=>setTimeout(r,0)); // yield to browser
  }
  const csv="\uFEFF"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=mode.toUpperCase()+"-"+expDate.replace(/\//g,"-")+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  setState({showExp:false});showToast("✅ Export สำเร็จ "+list.length+" งาน");
}

async function doLogin(){
  const u=STATE.loginUser.trim();

  if(!u||!p){setState({loginErr:"กรุณากรอกให้ครบ"});return;}
  setState({loginErr:"⏳ กำลังตรวจสอบ..."});
  
  let found=null;
  try{
    // ดึงเฉพาะ user ที่ตรง username (เร็วกว่า fetch ทั้งตาราง)
    const res=await sbGet("users","username=eq."+encodeURIComponent(u)+"&select=id,username,password,role,status");
    if(res&&res.length>0){
      const match=res.find(x=>x.password===p);

    }
  }catch(e){setState({loginErr:"เชื่อมต่อไม่ได้ กรุณาลองใหม่"});return;}

}

async function loadAdminJobs(){
  // PERF v6: 30s cache keyed by adminMode — if fresh, reuse without network
  const mode=STATE.adminMode;
  const now=Date.now();
  const cacheFresh=STATE.adminJobs&&STATE.adminJobs.length>0&&STATE._admCacheMode===mode&&(now-(STATE._admCacheTs||0))<30000;
  if(cacheFresh){STATE.adminJobsLoading=false;render();return;}

  const hasCached=STATE.adminJobs&&STATE.adminJobs.length>0;
  STATE.adminJobsLoading=!hasCached;render();

  const modes=mode==="all"?Object.keys(MODES):[mode];
  // Phase 1: fetch jobs only (explicit SELECT, no entries join)
  const JOB_SEL="id,mode,customer,bl,customs,warehouse,date,done,foot_note,owner_id,owner_name,created_at,updated_at";
  const all=[];
  for(const mk of modes){
    const res=await sbGet("nj_jobs","mode=eq."+mk+"&order=created_at.desc&select="+JOB_SEL);
    if(res&&res.length)res.forEach(j=>all.push({...j,entries:[]}));
  }
  precomputeJobs(all);
  STATE.adminJobs=all;STATE.adminJobsLoading=false;
  STATE._admCacheMode=mode;STATE._admCacheTs=Date.now();
  render();

  // Phase 2: fetch entries per mode, sequential (gentle on network, lists paint while this runs)
  const ENT_SEL="id,job_id,time,status,note,created_by,entry_date,type";
  for(const mk of modes){
    const inMode=all.filter(j=>j.mode===mk);
    if(!inMode.length)continue;
    const ids=inMode.map(j=>j.id);
    const ents=await sbGet("nj_entries","job_id=in.("+ids.join(",")+")&order=time.asc&select="+ENT_SEL);
    if(ents&&ents.length){
      const entMap={};
      ents.forEach(e=>{(entMap[e.job_id]=entMap[e.job_id]||[]).push(e);});
      STATE.adminJobs=STATE.adminJobs.map(j=>{
        if(j.mode!==mk)return j;
        const nj={...j,entries:entMap[j.id]||[]};
        precomputeJob(nj);
        return nj;
      });
      if(STATE.showAdminView)render();
    }
  }
}

// ── CUSTOM STATUSES (Super Admin feature) ──────────────────
// Supabase-backed so ALL users share the same list.
// Supabase table required: nj_custom_statuses(id uuid pk, mode text, type text, text text, created_at timestamptz default now(), created_by text)
// See SQL migration at end of file comments.
const _customStatusMap={}; // key = mode+"_"+type  →  [{id, text}]
function _stKey(mode,type){return mode+"_"+type;}
async function loadCustomStatuses(){
  try{
    const rows=await sbGet("nj_custom_statuses","order=created_at.asc&select=id,mode,type,text");
    // Reset in place — preserve object identity for any cached references
    for(const k in _customStatusMap)delete _customStatusMap[k];
    (rows||[]).forEach(r=>{
      if(!r||!r.mode||!r.type)return;
      const k=_stKey(r.mode,r.type);
      if(!_customStatusMap[k])_customStatusMap[k]=[];
      _customStatusMap[k].push({id:r.id,text:r.text});
    });
  }catch(e){/* table may not exist yet — degrade to empty (hardcoded list still shows) */}
}
function getCustomStatuses(mode,type){
  const list=_customStatusMap[_stKey(mode,type)]||[];
  return list.map(r=>r.text); // UI consumers want plain string[]
}
async function saveCustomStatus(mode,type,name){
  if(!name||!name.trim()){showToast("⚠️ กรุณาพิมพ์สถานะก่อน");return false;}
  const trimmed=name.trim();
  // Dedupe vs built-in
  const base=type==="normal"?MODES[mode].N:MODES[mode].D;
  if(base.includes(trimmed)){showToast("⚠️ สถานะนี้มีอยู่ในระบบแล้ว");return false;}
  // Dedupe vs existing custom
  const k=_stKey(mode,type);
  if((_customStatusMap[k]||[]).some(r=>r.text===trimmed)){showToast("⚠️ มีสถานะนี้อยู่แล้ว");return false;}
  showToast("⏳ กำลังบันทึก...");
  const row={id:uid(),mode,type,text:trimmed,created_by:(CURRENT_USER&&CURRENT_USER.username)?CURRENT_USER.username:"Unknown"};
  const ok=await sbInsert("nj_custom_statuses",row);
  if(!ok){showToast("⚠️ บันทึกไม่สำเร็จ — โปรดตรวจว่า Supabase มีตาราง 'nj_custom_statuses'");return false;}
  if(!_customStatusMap[k])_customStatusMap[k]=[];
  _customStatusMap[k].push({id:row.id,text:trimmed});
  showToast("✅ บันทึกสถานะใหม่แล้ว (ทุกคนจะเห็น)");
  return true;
}
async function deleteCustomStatus(mode,type,name){
  const k=_stKey(mode,type);
  const list=_customStatusMap[k]||[];
  const row=list.find(r=>r.text===name);
  if(!row)return false;
  const ok=await sbDelete("nj_custom_statuses",row.id);
  if(!ok){showToast("⚠️ ลบไม่สำเร็จ");return false;}
  _customStatusMap[k]=list.filter(r=>r.id!==row.id);
  // If user had this selected, drop it from selection
  if(Array.isArray(STATE.multiSel))STATE.multiSel=STATE.multiSel.filter(s=>s!==name);
  if(STATE.sel===name)STATE.sel=null;
  showToast("🗑 ลบสถานะแล้ว");
  return true;
}
function getAllStatuses(mode,type){

async function exportReportExcel(jobs, filename){
  const eq=v=>'"'+String(v||"").replace(/"/g,'""')+'"';
  const rows=[["Mode","วันที่","ลูกค้า","B/L","เลขใบขน","โกดัง","สถานะงาน","เวลา","สถานะ Timeline","หมายเหตุ","ผู้บันทึก","วันที่บันทึก"].map(eq).join(",")];
  const BATCH=100;
  for(let i=0;i<jobs.length;i++){
    const job=jobs[i];
    const m=MODES[job.mode]||{bl:"B/L",label:job.mode};
    const s=job.done?"จบงาน":"กำลังดำเนินการ";
    const bls=(job._blLines&&job._blLines.length?job._blLines:(job.bl||"").split("\n").map(h=>h.trim()).filter(h=>h)).join(", ");
    // PERF v6: prefer _sortedEntries (asc) cached in precomputeJob; else cross-date fallback sort once
    let entries=job._sortedEntries;
    if(!entries||!entries.length){
      entries=(job.entries||[]).slice().sort((a,b)=>{
        const da=a.entry_date||job.date||"";const db=b.entry_date||job.date||"";
        return da!==db?da.localeCompare(db):(a.time||"").localeCompare(b.time||"");
      });
    }
    if(!entries.length){
      rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",s,"","(ยังไม่มี)","",job.owner_name||"",job.date].map(eq).join(","));
    }else{
      for(const e of entries)rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",s,(e.time||"").replace(":","."),e.status,e.note||"",e.created_by||"",e.entry_date||job.date].map(eq).join(","));
    }
    if(i>0&&i%BATCH===0)await new Promise(r=>setTimeout(r,0));
  }
  const csv="﻿"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("✅ Export สำเร็จ!");
}

function exportUserReport(userIdx){
  // Get users list from current reportJobs
  const userMap={};
  STATE.reportJobs.forEach(job=>{
    const owner=job.owner_name||"ไม่ระบุ";
    if(!userMap[owner])userMap[owner]=true;
    (job.entries||[]).forEach(e=>{
      const u=e.created_by||owner;
      userMap[u]=true;
    });
  });
  const users=Object.keys(userMap).sort((a,b)=>{
    const sa=STATE.reportJobs.reduce((s,j)=>(j.entries||[]).filter(e=>(e.created_by||j.owner_name||"ไม่ระบุ")===a).length+(j.owner_name===a?1:0)+s,0);
    const sb=STATE.reportJobs.reduce((s,j)=>(j.entries||[]).filter(e=>(e.created_by||j.owner_name||"ไม่ระบุ")===b).length+(j.owner_name===b?1:0)+s,0);
    return sb-sa;
  });
  const nm=users[userIdx];
  if(!nm)return;

async function doExportExcel(){
  const mode=document.getElementById("expMode")?.value||"all";
  const dateRaw=document.getElementById("expDate")?.value||"";
  const user=document.getElementById("expUser")?.value||"all";

  // Convert date from yyyy-mm-dd to dd/mm/yyyy
  let dateFilter="";
  if(dateRaw){const p=dateRaw.split("-");dateFilter=p[2]+"/"+p[1]+"/"+p[0];}

  showToast("⏳ กำลังโหลดข้อมูล...");

  // PERF v6: two-phase fetch — jobs-only first (small payload), then entries lazy per-mode (sequential)
  const modes=mode==="all"?Object.keys(MODES):[mode];
  const JOB_SEL="id,mode,customer,bl,customs,warehouse,date,done,foot_note,owner_id,owner_name";
  const ENT_SEL="id,job_id,time,status,note,created_by,entry_date,type";

  // Phase 1: fetch jobs
  let all=[];
  for(const mk of modes){
    const res=await sbGet("nj_jobs","mode=eq."+mk+"&order=created_at.desc&select="+JOB_SEL);
    if(res&&res.length)res.forEach(j=>all.push({...j,entries:[]}));
  }

  // Filter by date / user first (reduces entries-fetch set)
  if(dateFilter)all=all.filter(j=>j.date===dateFilter);
  if(user!=="all")all=all.filter(j=>(j.owner_name||"")===user);
  if(!all.length){showToast("⚠️ ไม่พบข้อมูลตามที่เลือก");return;}

  // Phase 2: fetch entries per mode sequentially (gentle on network)
  const byMode={};all.forEach(j=>{(byMode[j.mode]=byMode[j.mode]||[]).push(j);});
  for(const mk in byMode){
    const ids=byMode[mk].map(j=>j.id);
    if(!ids.length)continue;
    const ents=await sbGet("nj_entries","job_id=in.("+ids.join(",")+")&order=time.asc&select="+ENT_SEL);
    if(ents&&ents.length){
      const entMap={};
      ents.forEach(e=>{(entMap[e.job_id]=entMap[e.job_id]||[]).push(e);});
      byMode[mk].forEach(j=>{j.entries=entMap[j.id]||[];precomputeJob(j);});
    }
  }

  // Build CSV — batch yield every 100 rows
  const eq=v=>'"'+String(v||"").replace(/"/g,'""')+'"';
  const rows=[["Mode","วันที่","ลูกค้า","B/L / HAWB","เลขใบขน","โกดัง","สถานะงาน","เวลา","วันที่สถานะ","สถานะ Timeline","หมายเหตุ","ผู้บันทึก"].map(eq).join(",")];
  const BATCH=100;
  for(let i=0;i<all.length;i++){
    const job=all[i];
    const m=MODES[job.mode]||{bl:"B/L",label:job.mode};
    const status=job.done?"จบงาน":"กำลังดำเนินการ";
    const bls=(job._blLines&&job._blLines.length?job._blLines:(job.bl||"").split("\n").map(h=>h.trim()).filter(h=>h)).join(", ");
    let entries=job._sortedEntries;
    if(!entries||!entries.length){
      entries=(job.entries||[]).slice().sort((a,b)=>{
        const da=a.entry_date||job.date||"";const db=b.entry_date||job.date||"";
        return da!==db?da.localeCompare(db):(a.time||"").localeCompare(b.time||"");
      });
    }
    if(!entries.length){
      rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",status,"","","(ยังไม่มี)","",job.owner_name||""].map(eq).join(","));
    }else{
      for(const e of entries)rows.push([m.label,job.date,job.customer,bls,job.customs||"",job.warehouse||"",status,(e.time||"").replace(":","."),e.entry_date||job.date,e.status,e.note||"",e.created_by||""].map(eq).join(","));
    }
    if(i>0&&i%BATCH===0)await new Promise(r=>setTimeout(r,0));
  }

  const fn=["Timeline",(mode==="all"?"All":mode),(dateFilter||"AllDates"),(user==="all"?"AllUsers":user)].join("-");
  const csv="\uFEFF"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=fn+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("✅ Export สำเร็จ "+all.length+" งาน!");
}

// PERF: Memoized getDaysDiff — cache results per date string, invalidate on day change
const _ddCache={};
let _ddCacheKey="";
function getDaysDiff(dateStr){
  // dateStr format: DD/MM/YYYY
  if(!dateStr||typeof dateStr!=='string')return 0;
  // Invalidate cache when the calendar day changes
  const now=new Date();
  const todayKey=now.getFullYear()+"-"+now.getMonth()+"-"+now.getDate();
  if(todayKey!==_ddCacheKey){for(const k in _ddCache)delete _ddCache[k];_ddCacheKey=todayKey;}
  if(dateStr in _ddCache)return _ddCache[dateStr];
  try{
    const p=dateStr.split("/");
    if(p.length!==3)return _ddCache[dateStr]=0;
    const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    const today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);
    return _ddCache[dateStr]=Math.floor((today-d)/(1000*60*60*24));
  }catch(e){return _ddCache[dateStr]=0;}
}

// PERF: Precompute derived fields on each job once, reuse in every render
// Fields: _latestEntry, _entryCount, _searchText, _blLines, _dayBucket, _sortedEntries
function precomputeJob(job){
  if(!job)return job;
  const entries=job.entries||[];
  // latest entry: single O(n) pass, no sort+spread
  let latest=null;
  for(let i=0;i<entries.length;i++){
    const e=entries[i];
    if(!latest||(e.time||"")>(latest.time||""))latest=e;
  }
  job._latestEntry=latest;
  job._entryCount=entries.length;
  job._searchText=((job.bl||"")+"\n"+(job.customer||"")).toLowerCase();
  job._blLines=(job.bl||"").split("\n").map(h=>h.trim()).filter(h=>h);
  // PERF v5: cache sorted entries (asc) — avoids [...(entries)].sort() on every render of job detail
  job._sortedEntries=entries.length?entries.slice().sort((a,b)=>(a.time||"").localeCompare(b.time||"")):[];
  if(job.done){job._dayBucket="done";}
  else{
    const d=getDaysDiff(job.date);
    job._dayBucket=d===0?"today":d===1?"yesterday":d>=2?"older":"today";
  }
  return job;
}
function precomputeJobs(list){
  if(!list||!list.length)return list;
  for(let i=0;i<list.length;i++)precomputeJob(list[i]);
  return list;
}
// PERF v5: schedule derived-field refresh during idle time (used after entries lazy-load completes)
function precomputeJobsIdle(list){
  if(!list||!list.length)return list;
  const run=()=>{for(let i=0;i<list.length;i++)precomputeJob(list[i]);};
  if(typeof window.requestIdleCallback==="function"){
    window.requestIdleCallback(run,{timeout:500});
  }else{
    // Fallback — defer to next frame so we don't block the render that's about to happen
    setTimeout(run,0);
  }
  return list;
}

function getDayLabel(job){
  if(job.done)return null;
  const diff=getDaysDiff(job.date);
  if(diff===0)return{label:"วันนี้",color:"#06C755",bg:"rgba(6,199,85,.15)"};
  if(diff===1)return{label:"ค้างจากเมื่อวาน",color:"#f59e0b",bg:"rgba(245,158,11,.15)"};
  if(diff>1)return{label:"ค้าง "+diff+" วัน",color:"#ef4444",bg:"rgba(239,68,68,.15)"};
  return{label:"วันนี้",color:"#06C755",bg:"rgba(6,199,85,.15)"};
}

async function loadAllMyJobs(){
  const now=Date.now();
  const cacheFresh=STATE.myJobs&&STATE.myJobs.length>0&&(now-(STATE._myCacheTs||0))<30000;
  if(cacheFresh){STATE.myJobsLoading=false;render();return;}

  const hasCached=STATE.myJobs&&STATE.myJobs.length>0;
  STATE.myJobsLoading=!hasCached;render();
  const canSeeAll=(CURRENT_USER.role==="admin"||CURRENT_USER.role==="superadmin");
  const modes=Object.keys(MODES);
  const JOB_SEL="id,mode,customer,bl,customs,warehouse,date,done,foot_note,owner_id,owner_name,created_at,updated_at";
  // Phase 1: jobs only
  const all=[];
  for(const mk of modes){
    const q=canSeeAll
      ?"mode=eq."+mk+"&order=created_at.desc&select="+JOB_SEL
      :"mode=eq."+mk+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&select="+JOB_SEL;
    const res=await sbGet("nj_jobs",q);
    if(res&&res.length)res.forEach(j=>all.push({...j,entries:[]}));
  }
  precomputeJobs(all);
  STATE.myJobs=all;STATE.myJobsLoading=false;STATE._myCacheTs=Date.now();render();

  // Phase 2: entries lazy
  const ENT_SEL="id,job_id,time,status,note,created_by,entry_date,type";
  for(const mk of modes){
    const inMode=all.filter(j=>j.mode===mk);
    if(!inMode.length)continue;
    const ids=inMode.map(j=>j.id);
    const ents=await sbGet("nj_entries","job_id=in.("+ids.join(",")+")&order=time.asc&select="+ENT_SEL);
    if(ents&&ents.length){
      const entMap={};
      ents.forEach(e=>{(entMap[e.job_id]=entMap[e.job_id]||[]).push(e);});
      STATE.myJobs=STATE.myJobs.map(j=>{
        if(j.mode!==mk)return j;
        const nj={...j,entries:entMap[j.id]||[]};
        precomputeJob(nj);
        return nj;
      });
      if(STATE.showMyJobs)render();
    }
  }
}

          <span>📝</span><span style="font-size:13px">Word</span>
        </button>
        <button class="copy-btn" style="border:1.5px solid #a855f7;color:#a855f7" onclick="var job=STATE.jobs.find(j=>j.id===STATE.aid);var m=MODES[STATE.mode];var bls=job.bl.split('\n').map(h=>h.trim()).filter(h=>h);var L=[];L.push('Subject: อัปเดตสถานะงาน '+m.label+' | '+job.customer+' | '+m.bl+': '+bls.join(', '));L.push('');L.push('เรียน ทีมงาน / ลูกค้า');L.push('');L.push('ขอแจ้งอัปเดตสถานะงาน ดังนี้');L.push('');L.push('ลูกค้า       : '+job.customer);if(bls.length===1)L.push(m.bl+'          : '+bls[0]);else bls.forEach((h,i)=>L.push(m.bl+' '+(i+1)+'       : '+h));if(job.customs)L.push('เลขใบขน     : '+job.customs);if(job.warehouse)L.push('โกดัง       : '+job.warehouse);L.push('วันที่       : '+job.date);L.push('');L.push('Timeline การดำเนินงาน');L.push('─────────────────────────');[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time)).forEach(e=>{L.push('  '+e.time.replace(':','.')+' น.   '+e.status+(e.note?' ('+e.note+')':''))});L.push('─────────────────────────');if(job.foot_note){L.push('');L.push('หมายเหตุ : '+job.foot_note)}L.push('');L.push('ขอแสดงความนับถือ');doCopy(L.join('\n'),'Email')">
          <span>📧</span><span style="font-size:13px">Email</span>
        </button>
      </div>
    </div>`;
  }

  document.getElementById("app").innerHTML=html;
  // Restore search input value and focus after render
  const si=document.getElementById("searchInp");
  if(si){
    si.value=STATE.search||"";
    if(STATE._searchFocused){
      si.focus();
      const len=si.value.length;
      si.setSelectionRange(len,len);
    }
  }
  // Restore warehouse input value
  const wi=document.getElementById("whInp");
  if(wi)wi.value=STATE.nWarehouse||"";
  // Restore customer input value
  const ci=document.getElementById("custInp");
  if(ci)ci.value=STATE.nCust||"";
  // Restore admin search input
  const asi=document.getElementById("adminSearchInp");
  if(asi){
    asi.value=STATE.adminSearch||"";
    if(STATE._adminSearchFocused){
      const l=asi.value.length;
      asi.focus();
      asi.setSelectionRange(l,l);
    }
  }
}

if(CURRENT_USER){
  loadCustomStatuses(); // parallel — UI refreshes when complete
  loadJobsFromDB();
} else {
  render();
}
</script>
</body>
</html>

async function sbGet(table,q=""){
  try{const r=await fetch(API+"/"+table+(q?"?"+q:""),{headers:SH});return r.ok?r.json():[];}catch(e){return[];}
}
async function sbInsert(table,data){
  try{const r=await fetch(API+"/"+table,{method:"POST",headers:SH,body:JSON.stringify(data)});return r.ok;}catch(e){return false;}
}
async function sbUpdate(table,id,data){
  try{const r=await fetch(API+"/"+table+"?id=eq."+id,{method:"PATCH",headers:SH,body:JSON.stringify(data)});return r.ok;}catch(e){return false;}

async function loadJobsFromDB(){
  if(!CURRENT_USER)return;
  STATE.loading=true;render();
  const role=CURRENT_USER.role;
  const canSeeAll=(role==="admin"||role==="superadmin");
  const q=canSeeAll
    ?"mode=eq."+STATE.mode+"&order=created_at.desc&select=*,nj_entries(*)"
    :"mode=eq."+STATE.mode+"&owner_id=eq."+CURRENT_USER.id+"&order=created_at.desc&select=*,nj_entries(*)";

  // Normalize: rename nj_entries -> entries for compatibility
  const jobs=(rawJobs||[]).map(j=>({...j,entries:j.nj_entries||j.entries||[]}));
  STATE.jobs=jobs||[];
  STATE.loading=false;
  render();
}

// ── HELPERS ───────────────────────────────────────────────
function todayStr(){const d=new Date();return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function nowTime(){const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,"0");}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function showToast(m){
  const t=document.getElementById("toast");
  t.textContent=m;t.style.display="block";
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",2800);
}

function buildMsg(job,mk){
  const m=MODES[mk];const L=[];
  const icon=mk==="air"?"✈️":mk==="exp"?"📤":mk==="sebkk"?"🚤":"📦";
  L.push(icon+" อัปเดตสถานะงาน : "+m.label);
  L.push("ลูกค้า : "+job.customer);
  const bls=job.bl.split("\n").map(h=>h.trim()).filter(h=>h);
  if(bls.length===1)L.push(m.bl+": "+bls[0]);
  else bls.forEach((h,i)=>L.push(m.bl+" "+(i+1)+": "+h));
  if(job.customs)L.push("เลขใบขน : "+job.customs);
  if(job.warehouse)L.push("โกดัง : "+job.warehouse);
  L.push("");L.push("⏱ Timeline การดำเนินงาน");L.push("วันที่ : "+job.date);L.push("");
  [...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time)).forEach(e=>{
    L.push("• ⏰ "+e.time.replace(":",".") +"  "+e.status+(e.note?" ("+e.note+")":""));
  });
  if(job.foot_note)L.push("\n📝 หมายเหตุ : "+job.foot_note);
  return L.join("\n");
}

function doCopy(text,type){
  const doIt=()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    showToast("📋 Copy "+type+" สำเร็จ!");
  };
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showToast("📋 Copy "+type+" สำเร็จ!")).catch(doIt);
  else doIt();
}

async function createJob(){
  const {nCust,nBl,nDate,nWarehouse,nCustoms,mode}=STATE;

  if(!nBl.trim()){showToast("⚠️ กรุณาระบุ "+MODES[mode].bl);return;}
  const j={id:uid(),mode,customer:nCust.trim(),bl:nBl.trim(),customs:nCustoms.trim(),date:nDate||todayStr(),warehouse:nWarehouse.trim(),foot_note:"",done:false,entries:[],owner_id:CURRENT_USER?CURRENT_USER.id:""};
  // บันทึกลง Supabase ทันที
  const ok=await sbInsert("nj_jobs",{...j,entries:undefined});
  if(!ok){showToast("⚠️ บันทึกไม่สำเร็จ กรุณาลองใหม่");return;}
  clearDraft();
  setState({jobs:[j,...STATE.jobs],page:"job",aid:j.id,sel:null,custom:"",eTime:"",eNote:"",tab:"normal",dupWarn:false,editEId:null,nCust:"",nBl:"",nDate:todayStr(),nWarehouse:"",nCustoms:""});

}

async function addEntry(){

  if(status==="__custom__"){if(!STATE.custom.trim()){showToast("⚠️ กรุณาพิมพ์สถานะ");return;}status=STATE.custom.trim();}

function exportCSV(){
  const{expDate,mode}=STATE;const m=MODES[mode];
  const list=STATE.jobs.filter(j=>j.mode===mode&&j.date===expDate.trim());
  if(!list.length){showToast("⚠️ ไม่พบงานในวันที่ "+expDate);return;}
  const eq=v=>'"'+String(v).replace(/"/g,'""')+'"';
  const rows=[[" วันที่","ลูกค้า",m.bl,"เลขใบขน","โกดัง","สถานะงาน","เวลา","สถานะ","หมายเหตุ","หมายเหตุท้าย"].map(eq).join(",")];
  list.forEach(job=>{
    const s=job.done?"จบงาน":"กำลังดำเนินการ";
    const blD=job.bl.split("\n").filter(h=>h.trim()).map(h=>h.trim()).join(", ");
    const se=[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time));
    if(!se.length){rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,"","(ยังไม่มี)","",job.foot_note||""].map(eq).join(","));}
    else se.forEach((e,i)=>rows.push([job.date,job.customer,blD,job.customs||"",job.warehouse||"",s,e.time.replace(":","."),e.status,e.note||"",i===0?(job.foot_note||""):""].map(eq).join(",")));
  });
  const csv="\uFEFF"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=mode.toUpperCase()+"-"+expDate.replace(/\//g,"-")+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  setState({showExp:false});showToast("✅ Export สำเร็จ "+list.length+" งาน");
}

async function doLogin(){
  const u=STATE.loginUser.trim();
  const p=STATE.loginPass.trim();
  if(!u||!p){setState({loginErr:"กรุณากรอกให้ครบ"});return;}
  setState({loginErr:"⏳ กำลังตรวจสอบ..."});
  
  let found=null;
  // 1. Check Supabase FIRST (source of truth ข้ามเครื่องได้)
  try{
    const all=await sbGet("users","select=*");
    if(all&&all.length>0){
      const sbFound=all.find(x=>x.username===u&&x.password===p);
      if(sbFound)found={...sbFound,_fromSupabase:true};
    }
  }catch(e){}
  
  // 2. Fallback to localStorage (กรณี offline หรือ Supabase fail)
  if(!found){
    const localUsers=getLocalUsers();
    found=localUsers.find(x=>x.username===u&&x.password===p);
    // ถ้าเจอใน localStorage แต่ไม่มีใน Supabase → sync ขึ้น Supabase
    if(found){
      try{
        const sbCheck=await sbGet("users","id=eq."+found.id+"&select=id");
        if(!sbCheck||sbCheck.length===0){
          await sbInsert("users",found);
        }
      }catch(e){}
    }
  }
  
  if(found){
    if(found.status==="pending"){
      setState({loginErr:"⏳ รอ Admin อนุมัติบัญชีของคุณก่อนครับ"});return;
    }
    CURRENT_USER=found;
    localStorage.setItem("nj_cu",JSON.stringify(found));
    setState({loginErr:""});
    loadJobsFromDB();
  } else {
    setState({loginErr:"Username หรือ Password ไม่ถูกต้อง"});
  }
}

async function doRegister(){
  const{regUser,regPass,regPass2}=STATE;
  if(!regUser.trim()||!regPass.trim()){setState({regErr:"กรุณากรอกให้ครบ"});return;}
  if(regPass!==regPass2){setState({regErr:"Password ไม่ตรงกัน"});return;}
  if(regPass.length<4){setState({regErr:"Password ต้องมีอย่างน้อย 4 ตัว"});return;}
  setState({regErr:"⏳ กำลังตรวจสอบ..."});
  // Check duplicate in Supabase (source of truth)
  try{
    const all=await sbGet("users","username=eq."+encodeURIComponent(regUser.trim())+"&select=id");
    if(all&&all.length>0){setState({regErr:"Username นี้มีอยู่แล้ว"});return;}
  }catch(e){}
  // Check duplicate in localStorage
  const localUsers=getLocalUsers();
  if(localUsers.find(u=>u.username===regUser.trim())){setState({regErr:"Username นี้มีอยู่แล้ว"});return;}
  const newU={id:uid(),username:regUser.trim(),password:regPass.trim(),role:"user",status:"pending"};
  // Save to Supabase FIRST (RLS is now open)
  const ok=await sbInsert("users",newU);
  // Also save to localStorage as backup
  localUsers.push(newU);
  saveLocalUsers(localUsers);
  if(ok){setState({regOk:true,regErr:""});}
  else{setState({regErr:"เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง"});}
}

async function createUser(){

  saveLocalUsers(users);
  
  setState({newUName:"",newUPass:"",newURole:"user",userMgrErr:""});
  await loadUserList();
  showToast("✅ สร้าง User แล้ว");
}

async function loadUserList(){
  let users=[];
  try{
    const sbUsers=await sbGet("users","order=created_at.asc&select=*");
    const localUsers=getLocalUsers();
    if(sbUsers&&sbUsers.length>0){
      // Merge: ใช้ Supabase เป็นหลัก แต่เพิ่ม user จาก localStorage ที่ยังไม่มีใน Supabase
      const sbIds=new Set(sbUsers.map(u=>u.id));
      const sbNames=new Set(sbUsers.map(u=>u.username));
      const localOnly=localUsers.filter(u=>!sbIds.has(u.id)&&!sbNames.has(u.username));
      users=[...sbUsers,...localOnly];
    } else {
      users=localUsers;
    }
  }catch(e){users=getLocalUsers();}
  setState({userList:users});
}

async function approveUser(id){
  const localUsers=getLocalUsers();
  const targetUser=localUsers.find(u=>u.id===id);
  // If user exists in localStorage but not yet in Supabase, insert first
  if(targetUser){
    try{
      const sbCheck=await sbGet("users","id=eq."+id+"&select=id");
      if(!sbCheck||sbCheck.length===0){
        await sbInsert("users",{...targetUser,status:"approved"});
      } else {
        await sbUpdate("users",id,{status:"approved"});
      }
    }catch(e){}
  } else {
    await sbUpdate("users",id,{status:"approved"});
  }
  const updatedLocal=localUsers.map(u=>u.id===id?{...u,status:"approved"}:u);
  saveLocalUsers(updatedLocal);
  await loadUserList();
  showToast("✅ อนุมัติแล้ว");
}

          <div style="font-size:11px;color:rgba(255,255,255,.72);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(active.bl.split("\n").filter(h=>h.trim()).join(" / "))}${active.customs?" · 📄 "+esc(active.customs):""}${active.date?" · "+active.date:""}</div>

          ${isDone?"🔄 ยังไม่จบ":"✅ จบงาน"}
        </button>`:""}
      </div>
    </div>
    ${isDone?`<div style="background:rgba(245,158,11,.1);border:1px solid #f59e0b;border-radius:12px;margin:12px 13px 0;padding:11px 14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">✅</span>
      <div><div style="font-size:13px;font-weight:700;color:#f59e0b">งานนี้จบแล้ว</div><div style="font-size:12px;color:#64748b">กด "🔄 ยังไม่จบ" เพื่อเปิดอัปเดตต่อ</div></div>
    </div>`:""}

      <div style="font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px">➕ เพิ่มสถานะ</div>
      <div style="display:flex;gap:10px;margin-bottom:13px;align-items:center">
        <div style="background:#0f172a;border:1.5px solid #2a3a54;border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span>⏰</span>
          <span style="font-family:monospace;font-size:16px;font-weight:600;color:${eTime?G:"#64748b"};letter-spacing:1px">${eTime||"--:--"}</span>
        </div>
        <input class="inp" style="flex:1" value="${esc(eNote)}" oninput="STATE.eNote=this.value" placeholder="หมายเหตุ (ถ้ามี)"/>
      </div>

      ${dupWarn?`<div style="background:rgba(239,68,68,.1);border:1.5px solid #ef4444;border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:13px;color:#ef4444;font-weight:700;margin-bottom:4px">⚠️ สถานะนี้เคยเพิ่มไปแล้ว!</div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:10px">ต้องการเพิ่มซ้ำ หรือเลือกสถานะใหม่?</div>

        </div>
      </div>`:""}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

    </div>`:""}
    <div style="padding:0 13px;margin-top:18px">

        ⏱ Timeline<span style="background:${GL};color:${G};border-radius:20px;padding:1px 10px;font-size:10px;margin-left:4px">${sortedE.length} รายการ</span>

        return `<div style="display:flex;position:relative">
          ${i<sortedE.length-1?`<div style="position:absolute;left:15px;top:30px;bottom:0;width:2px;background:#2a3a54;z-index:0"></div>`:""}
          <div style="width:30px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:8px;z-index:1">
            <div class="timeline-dot" style="background:${dotColor}"></div>
          </div>
          <div style="flex:1;background:#1e2a3d;border:1px solid #2a3a54;border-radius:12px;padding:10px 12px;margin-bottom:10px;position:relative">
            ${isEditing?`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
              <input type="time" value="${ent.time}" onchange="STATE.editTime=this.value" style="background:#0f172a;border:1.5px solid ${G};border-radius:8px;padding:6px 10px;color:#e2e8f4;font-size:14px;outline:none;font-family:monospace;flex:1;color-scheme:dark"/>
              <button onclick="updateEntryTime('${ent.id}',STATE.editTime||'${ent.time}')" style="background:${G};border:none;border-radius:8px;padding:6px 12px;color:white;font-size:12px;font-weight:700;cursor:pointer">✓ บันทึก</button>
              <button onclick="setState({editEId:null,editTime:''})" style="background:#212d42;border:1px solid #2a3a54;border-radius:8px;padding:6px 10px;color:#64748b;font-size:12px;cursor:pointer">✕</button>
            </div>`:`<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
              <div style="font-family:monospace;font-size:11px;color:${timeColor};font-weight:600">⏰ ${ent.time.replace(":",".") }</div>
              ${(!isDone&&isSuperAdmin)?`<button onclick="setState({editEId:'${ent.id}',editTime:'${ent.time}'})" style="background:rgba(100,116,139,.15);border:1px solid #2a3a54;border-radius:6px;padding:3px 8px;color:#64748b;font-size:11px;cursor:pointer">✏️ แก้เวลา</button>`:""}
            </div>`}
            <div style="font-size:13px;font-weight:600;color:#e2e8f4;line-height:1.4;padding-right:${!isDone&&!isEditing?"36px":"0"}">${esc(ent.status)}</div>
            ${ent.note?`<div style="font-size:12px;color:#64748b;margin-top:3px">📌 ${esc(ent.note)}</div>`:""}
            ${(!isDone&&isSuperAdmin)?`<button onclick="removeEntry('${ent.id}')" style="position:absolute;top:8px;right:8px;background:rgba(239,68,68,.1);border:none;border-radius:6px;padding:3px 8px;color:#ef4444;font-size:11px;cursor:pointer">✕</button>`:""}
          </div>
        </div>`;
      }).join("")}
    </div>
    <div style="padding:0 13px;margin-top:4px">
      <div style="font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px">📝 หมายเหตุท้ายรายงาน</div>
      <textarea class="inp" style="min-height:60px" ${isDone?"readonly":""}  onblur="updateFootNote(this.value)" placeholder="เช่น ติดต่อสอบถาม 081-xxx-xxxx">${esc(active.foot_note||"")}</textarea>
    </div>
    <div style="padding:12px 13px 0">
      <div style="display:flex;justify-content:flex-start">
        <button onclick="setState({showPrev:!STATE.showPrev})" style="background:#212d42;border:1px solid #2a3a54;border-radius:12px;padding:9px 16px;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer">
          ${showPrev?"▲ ซ่อนตัวอย่าง":"▼ ดูตัวอย่างข้อความ"}
        </button>
      </div>
      ${showPrev?`<div style="margin-top:10px;background:#1a2235;border:1px solid #2a3a54;border-radius:12px;padding:14px;font-family:monospace;font-size:11.5px;line-height:2;color:#e2e8f4;white-space:pre-wrap">${esc(buildMsg(active,mode))}</div>`:""}
    </div>
    <div style="height:130px"></div>
    <div class="fix-bar">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <button onclick="addEntry()" style="background:${sel?G:'#2a3a54'};border:none;border-radius:10px;padding:9px 16px;color:${sel?'white':'#64748b'};font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;${sel?'box-shadow:0 3px 12px '+GL:''}">
          <span>💾</span>
          <span>${sel?"บันทึกลง Timeline":"เลือกสถานะก่อน"}</span>
        </button>
        ${STATE.lastSaved?`<span style="font-size:11px;color:#06C755;font-weight:600">✅ บันทึก ${STATE.lastSaved} น.</span>`:""}
      </div>
      <div style="font-size:10px;color:#64748b;text-align:center;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Copy รูปแบบ</div>
      <div style="display:flex;gap:8px">
        <button class="copy-btn" style="border:1.5px solid ${G};color:${G}" onclick="doCopy(buildMsg(STATE.jobs.find(j=>j.id===STATE.aid),STATE.mode),'LINE')">
          <span>💚</span><span style="font-size:13px">LINE</span>
        </button>
        <button class="copy-btn" style="border:1.5px solid #3b82f6;color:#3b82f6" onclick="var job=STATE.jobs.find(j=>j.id===STATE.aid);var m=MODES[STATE.mode];var L=[]; L.push('อัปเดตสถานะงาน : '+m.label);L.push('ลูกค้า : '+job.customer);var bls=job.bl.split('\n').map(h=>h.trim()).filter(h=>h);if(bls.length===1)L.push(m.bl+': '+bls[0]);else bls.forEach((h,i)=>L.push(m.bl+' '+(i+1)+': '+h));if(job.customs)L.push('เลขใบขน : '+job.customs);if(job.warehouse)L.push('โกดัง : '+job.warehouse);L.push('');L.push('Timeline การดำเนินงาน');L.push('วันที่ : '+job.date);L.push('');[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time)).forEach(e=>{L.push('  '+e.time.replace(':','.')+' '+e.status+(e.note?' ('+e.note+')':''))});if(job.foot_note)L.push('\nหมายเหตุ : '+job.foot_note);doCopy(L.join('\n'),'Word')">
          <span>📝</span><span style="font-size:13px">Word</span>
        </button>
        <button class="copy-btn" style="border:1.5px solid #a855f7;color:#a855f7" onclick="var job=STATE.jobs.find(j=>j.id===STATE.aid);var m=MODES[STATE.mode];var bls=job.bl.split('\n').map(h=>h.trim()).filter(h=>h);var L=[];L.push('Subject: อัปเดตสถานะงาน '+m.label+' | '+job.customer+' | '+m.bl+': '+bls.join(', '));L.push('');L.push('เรียน ทีมงาน / ลูกค้า');L.push('');L.push('ขอแจ้งอัปเดตสถานะงาน ดังนี้');L.push('');L.push('ลูกค้า       : '+job.customer);if(bls.length===1)L.push(m.bl+'          : '+bls[0]);else bls.forEach((h,i)=>L.push(m.bl+' '+(i+1)+'       : '+h));if(job.customs)L.push('เลขใบขน     : '+job.customs);if(job.warehouse)L.push('โกดัง       : '+job.warehouse);L.push('วันที่       : '+job.date);L.push('');L.push('Timeline การดำเนินงาน');L.push('─────────────────────────');[...(job.entries||[])].sort((a,b)=>a.time.localeCompare(b.time)).forEach(e=>{L.push('  '+e.time.replace(':','.')+' น.   '+e.status+(e.note?' ('+e.note+')':''))});L.push('─────────────────────────');if(job.foot_note){L.push('');L.push('หมายเหตุ : '+job.foot_note)}L.push('');L.push('ขอแสดงความนับถือ');doCopy(L.join('\n'),'Email')">
          <span>📧</span><span style="font-size:13px">Email</span>
        </button>
      </div>
    </div>`;
  }

  document.getElementById("app").innerHTML=html;
}

if(CURRENT_USER){
  loadJobsFromDB();
} else {
  render();
}
</script>

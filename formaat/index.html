// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function toast(msg, type='info'){
  const t = document.createElement('div');
  t.className = 'toast';
  const icon = type==='success'?'✅':type==='error'?'❌':'ℹ️';
  t.textContent = icon+' '+msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ════════════════════════════════════════════
//  EXCEL UTILS
// ════════════════════════════════════════════
function nt(v){return String(v??'').replace(/\u00A0/g,' ').replace(/\r?\n/g,' ').replace(/\s+/g,' ').trim()}
function nk(v){return nt(v).toUpperCase()}
function normVinKey(v){return nk(v).replace(/[^A-Z0-9]/g,'');}
function toN(v){if(v===null||v===undefined||v==='')return null;if(typeof v==='number')return v;const n=Number(String(v).replace(/,/g,'').trim());return Number.isFinite(n)?n:null}
function pick(o,ks){for(const k of ks)if(o?.[k]!==undefined&&o?.[k]!==null&&o?.[k]!=='')return o[k];return''}
function safeSheet(n,used){let b=String(n||'Sheet').replace(/[\\/*?:\[\]]/g,'_').slice(0,31)||'Sheet';let c=b;let i=1;while(used.has(c)){const s=`_${i}`;c=`${b.slice(0,31-s.length)}${s}`;i++;}used.add(c);return c}
async function readWB(file){return XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true})}

// Smart sheet parser — auto-detects header row by scanning for known column keywords
const HEADER_KEYWORDS = [
  // Spreadsheet / ใบขน / สูตร
  'VIN','BOL NUMBER','BOL','VISTA ENTITY','QAD DESCRIPTION','HTS CODE',
  'INVOICE','AMOUNT TH','FOB BAHT','PRODUCT ATT',
  // Master file columns
  'MARKET','MPV CODE','COST STRUCTURE','EXPIRED','DATE APPROVAL',
  'DESCRIPTION (FORM)','PRODUCT ENG','PRODUCT THAI','RVC','TARIFF',
];
function smartSheetToRows(ws, sheetName){
  const aoa = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
  // Find first row that contains at least 2 known header keywords
  let hdrIdx = 0;
  for(let i=0; i<Math.min(aoa.length,20); i++){
    const rowStr = aoa[i].map(v=>String(v??'').toUpperCase()).join('|');
    const matches = HEADER_KEYWORDS.filter(k=>rowStr.includes(k)).length;
    if(matches>=2){hdrIdx=i;break;}
  }
  const headers = aoa[hdrIdx].map(v=>String(v??'').trim());
  const rows=[];
  for(let i=hdrIdx+1; i<aoa.length; i++){
    const rowArr=aoa[i];
    if(!rowArr||rowArr.every(v=>v===''||v===null||v===undefined))continue;
    const obj={__sheet:sheetName};
    headers.forEach((h,ci)=>{if(h)obj[h]=rowArr[ci]??'';});
    rows.push(obj);
  }
  return rows;
}
function wbToRows(wb){
  const rows=[];
  wb.SheetNames.forEach(s=>smartSheetToRows(wb.Sheets[s],s).forEach(r=>rows.push(r)));
  return rows;
}

function extractSS(rows){
  return rows.map(r=>({
    vin:             normVinKey(pick(r,['VIN','VIN 3RD'])),
    bolNumber:       pick(r,['BoL Number','BOL Number','Bol Number']),
    portCode:        pick(r,['Port of Discharge Code']),
    vistaEntityCode: pick(r,['VISTA Entity Code']),
    qad1:            pick(r,['QAD Description1']),
    htsCode:         toHtsNum(pick(r,['HTS code','HTS cod'])),
    engineSN:        pick(r,['Engine Serial Number']),
    colorDesc:       pick(r,['Color Description']),
    weightKg:        toN(pick(r,['Weight in KGs'])),
    lenM:            toN(pick(r,['Length in Meters'])),
    widM:            toN(pick(r,['Width in Meters'])),
    htM:             toN(pick(r,['Height in Meters'])),
    volM3:           toN(pick(r,['Volume in Cubic Meters'])),
    amt3AUD:         toN(pick(r,['Total - Vehicle Invoice','Amount 3RD(AUD)','Amount 3RD ( AUD )'])),
    drive:           pick(r,['Drive']),
    driveDesc:       pick(r,['Drive Description']),
    proforma:        pick(r,['FTC Invoice Number','Proforma Invoice','Proforma Invoice Number']),
  })).filter(r=>r.vin)
}

// ── extractThai: รองรับ ใบขน (Product Att1.) และ สูตร VIN 3RD ──
function extractThai(rows){
  return rows.map(r=>{
    const vin = normVinKey(pick(r,[
      'VIN 3RD',         // สูตร VIN 3RD sheet (main)
      'VIN TH',          // VIN TH sheet
      'Product Att1.','Product Att1',  // ใบขน files
      'VIN','VIN NO','Chassis No','Chassis Number',
    ]));
    // Amount TH: FOB BAHT (ใบขน) or Amount TH (สูตร) — skip #N/A
    const rawAmt = pick(r,['Amount TH','FOB BAHT','FOB TH','Amount TH ( THB )','Amount THB']);
    const amtTh = (rawAmt && String(rawAmt)!=='#N/A') ? toN(rawAmt) : null;
    const rawInv = pick(r,['INVOICE NO TH','INVOICE NO.','Invoice No.','Invoice No','INVOICE NO','เลขที่ Invoice','Invoice Number']);
    const invNo = (rawInv && String(rawInv)!=='#N/A') ? String(rawInv) : '';
    const rawDate = pick(r,['Invoice Date','Invoice_Date','Invoice Date.','Date','วันที่ Invoice','Inv Date']);
    const invDate = (rawDate && String(rawDate)!=='#N/A') ? String(rawDate) : '';
    return {vinTh:vin, amtTh, invNo, invDate};
  }).filter(r=>r.vinTh)
}

function buildThaiIdx(rows){
  const m = new Map();
  rows.forEach(r=>{
    if(!r.vinTh) return;
    const cur = m.get(r.vinTh);
    const score = x => ((x?.amtTh??0)>0?3:0) + (x?.invNo?2:0) + (x?.invDate?1:0);
    if(!cur || score(r)>score(cur)) m.set(r.vinTh, r);
  });
  return m;
}

function extractCost(rows){
  return rows.map(r=>({
    vin:     normVinKey(pick(r,['VIN','VIN TH','VIN 3RD'])),
    mkt:     pick(r,['Market / Privilege']),
    tariff:  pick(r,['Tariff on C/O','Tariff on \nC/O']),
    rvc:     pick(r,['RVC (%)']),
    csn:     pick(r,['Cost Structure No.']),
    dateApp: pick(r,['Date Approval']),
    descForm:pick(r,['Description (FORM)']),
    prodEng: pick(r,['Product Eng Name']),
  })).filter(r=>r.vin)
}
function buildCostIdx(rows){const m=new Map();rows.forEach(r=>m.set(r.vin,r));return m}

// ── Flexible VIN lookup: exact → contains → last-17 ──
function findThaiByVin(thIdx, vin){
  if(!vin) return null;
  const key = normVinKey(vin);
  if(thIdx.has(key)) return thIdx.get(key);
  for(const [k,v] of thIdx.entries()){
    if(k.includes(key)||key.includes(k)) return v;
  }
  const last17 = key.slice(-17);
  if(last17.length >= 8){
    for(const [k,v] of thIdx.entries()){
      if(k.endsWith(last17)||last17.endsWith(k.slice(-17))) return v;
    }
  }
  return null;
}

function makeReport(ss, thIdx, usd, aud, thb){
  return ss
    .filter(r => r.vin && r.bolNumber)
    .map(r => {
      const th = findThaiByVin(thIdx, r.vin);
      const amtTh  = (th?.amtTh ?? 0);          // Amount TH (THB) จาก ใบขน/ส่ตร
      const amt3rd = r.amt3AUD || 0;             // Total Vehicle Invoice (AUD) จาก SS
      // FOB TH (USD) = AmtTH / USD rate
      const fobTh  = (usd>0 && amtTh>0) ? amtTh/usd : 0;
      // FOB 3RD (USD) = (Total3RD AUD × AUD rate) / USD rate
      const fob3rd = (usd>0 && aud>0) ? (amt3rd*aud)/usd : 0;
      return {
        VIN:                      r.vin,
        'BoL Number':             r.bolNumber,
        'Proforma Invoice':       r.proforma,
        'Port of Discharge Code': r.portCode,
        'VISTA Entity Code':      r.vistaEntityCode,
        'QAD Description1':       r.qad1,
        'HTS code':               r.htsCode,
        'Engine Serial Number':   r.engineSN,
        'Color Description':      r.colorDesc,
        'Weight in KGs':          r.weightKg,
        'Length in Meters':       r.lenM,
        'Width in Meters':        r.widM,
        'Height in Meters':       r.htM,
        'Volume in Cubic Meters': r.volM3,
        'Total - Vehicle Invoice':amt3rd,          // AUD
        Drive:                    r.drive,
        'Drive Description':      r.driveDesc,
        'FTC Invoice Number':     r.proforma,
        'Amount TH ( THB )':      amtTh,
        'Amount 3RD ( AUD )':     amt3rd,
        'AUD อัตราแลกเปลี่ยน':   aud,
        'USD อัตราแลกเปลี่ยน':   usd,
        'FOB TH':                 fobTh,
        'FOB 3RD':                fob3rd,
        QTY:                      1,
        'INVOICE NO TH':          th?.invNo  || '',
        'Invoice Date':           th?.invDate || '',
      };
    });
}
function isValidMaster(row){
  if(!row.expDate)return true;
  try{return new Date(row.expDate)>=new Date()}catch{return true}
}


function fmtRVC(v){
  if(v===''||v===null||v===undefined)return '';
  const n=Number(v);
  if(!Number.isFinite(n))return String(v);
  return(n*100).toFixed(2)+'%';
}
function fmtDate(v){
  if(!v)return '';
  let d;
  if(v instanceof Date)d=v;
  else{d=new Date(v);if(isNaN(d))return String(v);}
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dd=String(d.getDate()).padStart(2,'0');
  const mon=MON[d.getMonth()];
  const yy=String(d.getFullYear()).slice(-2);
  return `${dd}-${mon}-${yy}`;
}

// fmtDateBOL: แปลงวันที่เป็น dd.mm.yyyy สำหรับ Export BOL
// รองรับ: "20260421", "30-Mar-26", "2025-12-22", Date object, "26-Feb-26", "30/3/2026"
function fmtDateBOL(v){
  if(!v&&v!==0)return '';
  const s=String(v).trim();
  if(!s||s==='NaN'||s==='null'||s==='undefined')return '';
  const pad2=n=>String(n).padStart(2,'0');
  // รูปแบบ YYYYMMDD เช่น 20260421
  if(/^\d{8}$/.test(s)){
    const yr=s.slice(0,4),mon=s.slice(4,6),day=s.slice(6,8);
    const y=parseInt(yr,10),m=parseInt(mon,10),d=parseInt(day,10);
    if(y>=2000&&y<=2100&&m>=1&&m<=12&&d>=1&&d<=31)return `${pad2(d)}.${pad2(m)}.${yr}`;
  }
  // รูปแบบ dd/mm/yyyy หรือ d/m/yyyy → แปลงเป็น dd.mm.yyyy
  const mSlash=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mSlash)return `${pad2(parseInt(mSlash[1],10))}.${pad2(parseInt(mSlash[2],10))}.${mSlash[3]}`;
  // รูปแบบ dd.mm.yyyy → คืนค่าเดิม
  if(/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(s)){
    const p=s.split('.');return `${pad2(parseInt(p[0],10))}.${pad2(parseInt(p[1],10))}.${p[2]}`;
  }
  // รูปแบบ dd-Mon-yy เช่น 30-Mar-26
  const MON_MAP={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  const m1=s.match(/^(\d{1,2})[-\.](\w{3})[-\.](\d{2,4})$/i);
  if(m1){
    const day=parseInt(m1[1],10);
    const mon=MON_MAP[m1[2].toLowerCase()];
    let yr=parseInt(m1[3],10);
    if(yr<100)yr+=2000;
    if(day&&mon)return `${pad2(day)}.${pad2(mon)}.${yr}`;
  }
  // รูปแบบ yyyy-mm-dd หรือ Date object
  let d;
  if(v instanceof Date)d=v;
  else{d=new Date(s);if(isNaN(d.getTime()))return s;}
  const day=d.getDate(),mon2=d.getMonth()+1,yr=d.getFullYear();
  if(!day||!mon2||!yr||yr<2000||yr>2100)return s;
  return `${pad2(day)}.${pad2(mon2)}.${yr}`;
}
// แปลง HTS: '8704.21.26.00' → 870421 (6-digit number)
// หรือ '870421' → 870421 | หรือ 8703320000 → 870332 (6-digit)
function toHtsNum(v){
  if(!v&&v!==0)return '';
  const s=String(v).replace(/\./g,'').replace(/\D/g,'');
  if(!s)return '';
  // take first 6 digits = HS chapter+heading+subheading
  const n=parseInt(s.slice(0,6),10);
  return Number.isFinite(n)?n:'';
}

function makeBOL(rep,cIdx,masterCsnIdx,sortByQAD=false){
  const byB=new Map();
  rep.filter(r=>r['BoL Number']&&r['BoL Number']!=='NO_BOL')
    .forEach(r=>{const b=r['BoL Number'];if(!byB.has(b))byB.set(b,[]);byB.get(b).push(r)});
  const sheets={};
  byB.forEach((rows,bol)=>{
    const gm=new Map();
    rows.forEach(r=>{
      // ── Master lookup: VISTA Entity Code ──
      const vista = String(r['VISTA Entity Code']||'').trim().toUpperCase();
      const cr=lookupCost(cIdx, vista);

      const mkt      = cr?.mkt      || '';
      const rvc      = cr?.rvc      ?? '';
      const csn      = cr?.csn      || '';
      const dateApp  = cr?.dateApp  || '';
      const tariffCO = cr?.tariff   || '';          // 10-digit HTS e.g. 8703320000
      const descForm = cr?.descForm || r['QAD Description1'] || '';
      const prodEng  = cr?.prodEng  || r['QAD Description1'] || '';
      // HTS cod = 6-digit numeric from SS, fallback from Master tariff
      const hts = r['HTS code'] || toHtsNum(tariffCO) || '';

      const gk=[vista,r['QAD Description1'],hts,r['INVOICE NO TH'],r['Invoice Date']].join('||');
      if(!gm.has(gk)){gm.set(gk,{
        'BoL Number':bol,'VISTA Entity Code':r['VISTA Entity Code'],ITEM:0,
        'QAD Description1':r['QAD Description1'],'HTS cod':hts,
        'INVOICE NO TH':r['INVOICE NO TH'],'Invoice Date':r['Invoice Date'],
        'ผลรวม ของ QTY':0,'ผลรวม ของ Weight in KGs':0,
        'ผลรวม ของ Amount 3RD ( AUD )':0,'ผลรวม ของ Amount TH ( THB )':0,
        'ผลรวม ของ FOB TH':0,'ผลรวม ของ FOB 3RD':0,
        'Market / Privilege':mkt,'Tariff on \nC/O':tariffCO,'RVC (%)':rvc,
        'Cost Structure No.':csn,'Date Approval':dateApp,
        'Description (FORM)':descForm,'Product Eng Name':prodEng,
      })}
      const b2=gm.get(gk);
      b2['ผลรวม ของ QTY']                +=toN(r.QTY)||0;
      b2['ผลรวม ของ Weight in KGs']       +=toN(r['Weight in KGs'])||0;
      b2['ผลรวม ของ Amount 3RD ( AUD )']  +=toN(r['Amount 3RD ( AUD )'])||0;
      b2['ผลรวม ของ Amount TH ( THB )']   +=toN(r['Amount TH ( THB )'])||0;
      b2['ผลรวม ของ FOB TH']              +=toN(r['FOB TH'])||0;
      b2['ผลรวม ของ FOB 3RD']             +=toN(r['FOB 3RD'])||0;
    });
    let bolRows=Array.from(gm.values());
    if(sortByQAD){
      // TH/AUS: เรียง A→Z ตาม QAD Description1 ก่อน จากนั้น Invoice No., Date
      bolRows.sort((a,b)=>{
        const qa=String(a['QAD Description1']||'').trim().toUpperCase();
        const qb=String(b['QAD Description1']||'').trim().toUpperCase();
        const q=qa.localeCompare(qb,'th',{sensitivity:'base'});
        if(q!==0)return q;
        const ia=String(a['INVOICE NO TH']||'').localeCompare(String(b['INVOICE NO TH']||''));
        if(ia!==0)return ia;
        return String(a['Invoice Date']||'').localeCompare(String(b['Invoice Date']||''));
      });
    } else {
      // VN / default: เรียงตาม VISTA_ORDER เดิม
      const VISTA_ORDER=['TEK531F85C','TEK47C2CDC1','TEK44AFED6E','TEK49AE2868','NEW99999999','TRA47070748','TRA40400FE4','TRA7EECCBEC'];
      bolRows.sort((a,b)=>{
        const ca=String(a['VISTA Entity Code']||'').trim().toUpperCase();
        const cb=String(b['VISTA Entity Code']||'').trim().toUpperCase();
        const ia=VISTA_ORDER.indexOf(ca),ib=VISTA_ORDER.indexOf(cb);
        if(ia!==-1||ib!==-1)return(ia===-1?999:ia)-(ib===-1?999:ib);
        return ca.localeCompare(cb);
      });
    }
    bolRows=bolRows.map((x,i)=>({...x,ITEM:i+1}));
    if(bolRows.length)sheets[bol]=bolRows;
  });
  return sheets;
}
// ── makeTotalRow: สร้าง TOTAL row สำหรับ BOL sheet ──────────────
function makeBolTotalRow(bolCols, rows){
  const NUM_COLS=[
    'ผลรวม ของ QTY','ผลรวม ของ Weight in KGs',
    'ผลรวม ของ Amount TH ( THB )','ผลรวม ของ Amount 3RD ( AUD )',
    'ผลรวม ของ FOB TH','ผลรวม ของ FOB 3RD',
  ];
  const totals={};
  NUM_COLS.forEach(c=>{totals[c]=rows.reduce((s,r)=>s+(Number(r[c])||0),0);});
  return bolCols.map((c,i)=>{
    if(i===0)return 'ผลรวมทั้งหมด';
    if(NUM_COLS.includes(c))return totals[c];
    return '';
  });
}

function doExportXLSX(rep,bols,usd,aud){
  if(!Number(usd)||!Number(aud)){
    toast('กรุณากรอก USD / AUD Rate ก่อน Export','error');return;
  }
  const wb=XLSX.utils.book_new();const used=new Set();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Control','Value'],['USD Rate',usd],['AUD Rate',aud],['Generated At',new Date().toISOString()]]),safeSheet('CONTROL',used));

  // Report 1 — exact 27 columns
  const r1Cols=['VIN','BoL Number','Proforma Invoice','Port of Discharge Code','VISTA Entity Code','QAD Description1','HTS cod','Engine Serial Number','Color Description','Weight in KGs','Length in Meters','Width in Meters','Height in Meters','Volume in Cubic Meters','Total - Vehicle Invoice','Drive','Drive Description','FTC Invoice Number','Amount TH ( THB )','Amount 3RD ( AUD )','AUD อัตราแลกเปลี่ยน','USD อัตราแลกเปลี่ยน','FOB TH','FOB 3RD','QTY','INVOICE NO TH','Invoice Date'];
  const r1Aoa=[
    new Array(28).fill(''),
    ['','','','Report 1',...new Array(24).fill('')],
    new Array(28).fill(''),
    ['',...r1Cols],
    ...rep.map(r=>['',
      r.VIN,r['BoL Number'],r['Proforma Invoice'],r['Port of Discharge Code'],
      r['VISTA Entity Code'],r['QAD Description1'],r['HTS code'],
      r['Engine Serial Number'],r['Color Description'],
      r['Weight in KGs'],r['Length in Meters'],r['Width in Meters'],
      r['Height in Meters'],r['Volume in Cubic Meters'],
      r['Total - Vehicle Invoice'],r.Drive,r['Drive Description'],
      r['FTC Invoice Number'],
      r['Amount TH ( THB )'],r['Amount 3RD ( AUD )'],
      r['AUD อัตราแลกเปลี่ยน'],r['USD อัตราแลกเปลี่ยน'],
      r['FOB TH'],r['FOB 3RD'],
      r.QTY,r['INVOICE NO TH'],fmtDateBOL(r['Invoice Date']),
    ]),
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(r1Aoa),safeSheet('Report 1',used));

  // BOL sheets — 20 columns
  const bolCols=['BoL Number','INVOICE NO TH','Invoice Date','VISTA Entity Code','ITEM',
    'QAD Description1','HTS cod','ผลรวม ของ QTY','ผลรวม ของ Weight in KGs',
    'ผลรวม ของ Amount TH ( THB )','ผลรวม ของ Amount 3RD ( AUD )',
    'ผลรวม ของ FOB TH','ผลรวม ของ FOB 3RD','Market / Privilege',
    'Tariff on \nC/O','RVC (%)','Cost Structure No.','Date Approval',
    'Description (FORM)','Product Eng Name'];
  Object.entries(bols).forEach(([b,rows])=>{
    const dataRows=rows.map(r=>bolCols.map(c=>{
      if(c==='Date Approval'||c==='Invoice Date')return fmtDateBOL(r[c]);
      return r[c]??'';
    }));
    const totalRow=makeBolTotalRow(bolCols,rows);
    const aoa=[bolCols,...dataRows,totalRow];
    const ws2=XLSX.utils.aoa_to_sheet(aoa);
    // Style total row: bold + yellow background
    const totalRowIdx=dataRows.length+1; // 0-based header + data rows
    bolCols.forEach((_,ci)=>{
      const cellRef=XLSX.utils.encode_cell({r:totalRowIdx,c:ci});
      if(!ws2[cellRef])ws2[cellRef]={v:'',t:'s'};
      ws2[cellRef].s={font:{bold:true},fill:{fgColor:{rgb:'FFF9C4'}},border:{top:{style:'thin',color:{rgb:'F97316'}}}};
    });
    XLSX.utils.book_append_sheet(wb,ws2,safeSheet(b,used));
  });

  try{
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='From_Mapping_BOL_Output.xlsx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    toast('Export BOL สำเร็จ! 📥','success');
  }catch(err){toast('Export ผิดพลาด: '+err.message,'error');}
}

function makeFormAU(bolSheets, report1){
  const proformaMap = new Map();
  report1.forEach(r => {
    const k = [r['INVOICE NO TH'], r['HTS code'], r['QAD Description1']].join('||');
    if(r['Proforma Invoice Number']) proformaMap.set(k, r['Proforma Invoice Number']);
  });

  const rows = [];
  Object.values(bolSheets).forEach(bolRows => {
    bolRows.forEach(r => {
      // skip rows with no invoice or no qty
      if(!r['INVOICE NO TH']&&!r['BoL Number'])return;

      // BOL row เก็บ HTS เป็น field 'HTS cod' (ไม่มี e) ต้องใช้ชื่อให้ตรง
      const htsVal = r['HTS cod'] || r['HTS code'] || '';
      const proformaKey = [r['INVOICE NO TH'], htsVal, r['QAD Description1']].join('||');
      const proforma = proformaMap.get(proformaKey) || '';
      const fobTH   = Number(r['ผลรวม ของ FOB TH']) || 0;
      const fob3RD  = Number(r['ผลรวม ของ FOB 3RD']) || 0;
      const fobMain = fobTH > 0 ? fobTH : fob3RD;   // rule 23: FOB TH ก่อน
      const qty     = Number(r['ผลรวม ของ QTY']) || 0;
      const wt      = Number(r['ผลรวม ของ Weight in KGs']) || 0;

      // priority: Master descForm → BOL descForm → QAD
      const descForm = r['Description (FORM)'] || r['QAD Description1'] || '';
      // priority: Master prodEng → BOL prodEng
      const prodEng  = r['Product Eng Name'] || '';

      rows.push([
        r['INVOICE NO TH']      || '',  // 1  เลขที่ INVOICE
        fmtDateBOL(r['Invoice Date']),  // 2  วันที่
        r.ITEM                  || '',  // 3  ลำดับรายการตาม INVOICE
        proforma                || '',  // 4  เลขที่ INVOICE ต่างประเทศ
        fmtDateBOL(r['Invoice Date']),  // 5  วันที่ (ต่างประเทศ)
        r.ITEM                  || '',  // 6  ลำดับรายการตาม INVOICE ต่างประเทศ
        '',                             // 7  Shipping Mark — ว่างตามตัวอย่าง
        '',                             // 8  B2B - ประเทศต้นทาง
        '',                             // 9  B2B - เลขที่เอกสารต้นทาง
        '',                             // 10 B2B - พิกัดสินค้า
        '',                             // 11 พิกัดสินค้า — ว่างใน Master sheet (มี HTS เฉพาะใน BOL sheet)
        '',                             // 12 ตัวเลือกเพื่อแสดง
        '',                             // 13 กรณีการใช้ต้นทุน
        r['Cost Structure No.'] || '',  // 14 เลขที่ต้นทุน
        '',                             // 15 เลขประจำตัวผู้เสียภาษี
        '',                             // 16 บริษัทผู้ยินยอมให้ใช้ต้นทุนร่วม
        fmtDate(r['Date Approval'])||'',// 17 วันที่ออกต้นทุน → dd-Mon-yy
        r['Market / Privilege'] || '',  // 18 ความตกลง
        r['QAD Description1']   || '',  // 19 Model
        '',                             // 20 โรงงานผู้ผลิต
        '',                             // 21 แสดงชื่อโรงงานผู้ผลิต
        descForm,                       // 22 ชื่อสินค้าที่แสดงในคำขอ ← Description (FORM) จาก Master
        prodEng,                        // 23 ชื่อสินค้าภาษาอังกฤษ ← Product Eng Name จาก Master
        '',                             // 24 รายละเอียดสินค้าที่แสดงในแบบฟอร์ม
        '',                             // 25 เลือกแสดง NET WEIGHT
        '',                             // 26 เลือกแสดง GROSS WEIGHT
        '',                             // 27 เลือกแสดง OTHER QUANTITY
        qty,                            // 28 QTY Package
        'C62',                          // 29 หน่วย QTY
        wt,                             // 30 Net Weight
        'KGM',                          // 31 หน่วย Net
        wt,                             // 32 Gross Weight
        'KGM',                          // 33 หน่วย Gross
        qty,                            // 34 Other Quantity
        'C62',                          // 35 หน่วย Other
        fobMain,                        // 36 มูลค่า FOB (TH ก่อน)
        '',                             // 37 มูลค่า FOB สกุลเงินอื่น
        fob3RD,                         // 38 มูลค่า FOB Invoice ต่างประเทศ
        fobTH,                          // 39 มูลค่า FOB Invoice นายหน้าไทย
        r['Tariff on \nC/O']    || '',  // 40 กฏว่าด้วยถิ่นกำเนิดสินค้า
        fmtRVC(r['RVC (%)'])    || '',  // 41 % ของกฏ
        '',                             // 42 กฏพิกัดที่จะไปแสดงใน Output
        '',                             // 43 ค่าอื่นๆ ของกฏ
        '',                             // 44 + Criteria ที่ระบุ
        '',                             // 45 RCEP Country of Origin
        '',                             // 46 RCEP Country of Origin Marks
        '',                             // 47 JTEPA Accumulation
        '',                             // 48 JTEPA De Minimis
      ]);
    });
  });
  return rows;
}

// ── Extract existing FORM AU rows from uploaded files ──
function extractFormAuExisting(wb){
  const rows=[];
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
    if(!aoa.length)return;
    // check if first row matches our headers (col 0 = เลขที่ INVOICE)
    const hdr0=String(aoa[0][0]||'').trim();
    const startRow = hdr0==='เลขที่ INVOICE'?1:0;
    for(let i=startRow;i<aoa.length;i++){
      const r=aoa[i];
      if(!r||r.every(v=>v===''||v===null||v===undefined))continue;
      rows.push(r.map(v=>(v===null||v===undefined)?'':v));
    }
  });
  return rows;
}

// ── Merge key: col0 (invoice) + col2 (item seq) + col6 (shipping mark/BOL) ──
function makeRowKey(row){
  return [String(row[0]||''),String(row[2]||''),String(row[6]||''),String(row[10]||''),String(row[13]||'')].join('||');
}

function exportFormAU(bolSheets, report1){
  // ✅ ล็อกถ้า rate = 0
  if(!Number(S.usd)||!Number(S.aud)){
    toast('กรุณากรอก USD / AUD Rate ก่อน Export','error');return;
  }
  if(!Object.keys(bolSheets).length&&!S.formAuExRows.length){toast('ยังไม่มีข้อมูล — กรุณาอัปโหลดไฟล์ก่อน','error');return}
  if(typeof JSZip==='undefined'){toast('JSZip library ยังไม่โหลด — กรุณารีโหลดหน้า','error');return}

  // ── proformaMap (lookup เลขที่ INVOICE ต่างประเทศ จาก Report 1) ──
  const proformaMap = new Map();
  report1.forEach(r => {
    const k = [r['INVOICE NO TH'], r['HTS code'], r['QAD Description1']].join('||');
    if(r['Proforma Invoice Number']) proformaMap.set(k, r['Proforma Invoice Number']);
  });

  // ── 1) Master rows (Form AU sheet, 48 cols) + merge กับ existing rows ──
  const newRows = makeFormAU(bolSheets, report1);
  const mergedMap = new Map();
  S.formAuExRows.forEach(r => { mergedMap.set(makeRowKey(r), r); });
  let dupCount = 0;
  newRows.forEach(r => {
    const k = makeRowKey(r);
    if(mergedMap.has(k)) dupCount++;
    mergedMap.set(k, r);
  });
  const masterRows = Array.from(mergedMap.values());
  if(dupCount > 0) toast(`พบ Invoice ซ้ำ ${dupCount} รายการ — ระบบอัปเดตแถวเดิมอัตโนมัติ`,'info');

  // ── helper: สร้าง xlsx ArrayBuffer สำหรับ 1 ชีท ──
  const buildXlsx = (sheetName, headers, dataRows) => {
    const wb = XLSX.utils.book_new();
    const aoa = [headers, ...dataRows];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    return XLSX.write(wb, {bookType:'xlsx', type:'array'});
  };

  // ── helper: sanitize ชื่อไฟล์ (กันอักขระต้องห้ามใน filesystem) ──
  const safeFileName = name => String(name||'sheet').replace(/[\\/*?:"<>|]/g,'_').slice(0,80) || 'sheet';

  // ── 2) Master "Form AU" xlsx (1 ไฟล์ มี 1 sheet "Form AU", 48 cols) ──
  const masterBuf = buildXlsx('Form AU', FORM_AU_HEADERS, masterRows);

  // ── 3) Per-BOL xlsx (1 BOL = 1 ไฟล์ xlsx, 1 sheet, 36 cols) ──
  const bolFiles = {};
  Object.entries(bolSheets).forEach(([bol, rows]) => {
    const dataRows = rows.map(r => {
      const fobTH=Number(r['ผลรวม ของ FOB TH'])||0, fob3RD=Number(r['ผลรวม ของ FOB 3RD'])||0;
      const qty=Number(r['ผลรวม ของ QTY'])||0, wt=Number(r['ผลรวม ของ Weight in KGs'])||0;
      const fobMain=fobTH>0?fobTH:fob3RD;
      const htsVal=r['HTS cod']||r['HTS code']||'';
      const proformaKey=[r['INVOICE NO TH'],htsVal,r['QAD Description1']].join('||');
      const proforma=proformaMap.get(proformaKey)||'';
      const descForm=r['Description (FORM)']||r['QAD Description1']||'';
      const prodEng=r['Product Eng Name']||'';
      return [
        r['INVOICE NO TH']||'',         // 1  เลขที่ INVOICE
        fmtDateBOL(r['Invoice Date']),  // 2  วันที่ → dd.mm.yyyy
        r.ITEM||'',                     // 3  ลำดับรายการตาม INVOICE — เรียงต่อเนื่องใน BOL
        proforma,                       // 4  เลขที่ INVOICE ต่างประเทศ
        '',                             // 5  วันที่ (ต่างประเทศ) — ว่าง
        r.ITEM||'',                     // 6  ลำดับรายการตาม INVOICE ต่างประเทศ
        '',                             // 7  Shipping Mark
        '',                             // 8  B2B - ประเทศต้นทาง
        '',                             // 9  B2B - เลขที่เอกสารต้นทาง
        '',                             // 10 B2B - พิกัดสินค้า
        htsVal,                         // 11 พิกัดสินค้า — HTS 6-digit
        '',                             // 12 ตัวเลือกเพื่อแสดง
        '',                             // 13 กรณีการใช้ต้นทุน
        r['Cost Structure No.']||'',    // 14 เลขที่ต้นทุน
        '',                             // 15 เลขประจำตัวผู้เสียภาษี
        '',                             // 16 บริษัทผู้ยินยอมให้ใช้ต้นทุนร่วม
        fmtDate(r['Date Approval'])||'',// 17 วันที่ออกต้นทุน → dd-Mon-yy
        r['Market / Privilege']||'',    // 18 ความตกลง
        r['QAD Description1']||'',      // 19 Model
        '',                             // 20 โรงงานผู้ผลิต
        '',                             // 21 แสดงชื่อโรงงานผู้ผลิต
        descForm,                       // 22 ชื่อสินค้าที่แสดงในคำขอ
        prodEng,                        // 23 ชื่อสินค้าภาษาอังกฤษ
        '',                             // 24 รายละเอียดสินค้าที่แสดงในแบบฟอร์ม
        '',                             // 25 เลือกแสดง NET WEIGHT
        '',                             // 26 เลือกแสดง GROSS WEIGHT
        wt,                             // 27 Net Weight
        'KGM',                          // 28 หน่วย Net
        wt,                             // 29 Gross Weight
        'KGM',                          // 30 หน่วย Gross
        qty,                            // 31 Other Quantity
        'C62',                          // 32 หน่วย Other
        fobMain,                        // 33 มูลค่า FOB
        fob3RD,                         // 34 มูลค่า FOB Invoice ต่างประเทศ
        '',                             // 35 JTEPA Accumulation
        '',                             // 36 JTEPA De Minimis
      ];
    });
    const sheetName = safeSheet(bol, new Set());
    bolFiles[bol] = buildXlsx(sheetName, FORM_AU_BOL_HEADERS, dataRows);
  });

  // ── 4) สร้าง ZIP: master Form_AU.xlsx + per-BOL files (แต่ละ xlsx = 1 sheet) ──
  const zip = new JSZip();
  zip.file('Form_AU.xlsx', masterBuf);
  Object.entries(bolFiles).forEach(([bol, buf])=>{
    zip.file(`${safeFileName(bol)}.xlsx`, buf);
  });

  zip.generateAsync({type:'blob'}).then(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='Form_AU_Output.zip';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    const totalFiles = 1 + Object.keys(bolFiles).length;
    toast(`Export Form AU สำเร็จ! ${totalFiles} ไฟล์ใน ZIP (1 master + ${Object.keys(bolFiles).length} BOL) 📥`,'success');
  }).catch(err=>{
    toast('สร้าง ZIP ผิดพลาด: '+err.message,'error');
  });
}

// ── Extract VISTA code from MPV Code (Representative) ──
// e.g. "AJ_TEK531F85C" → "TEK531F85C", "VB_TEK531F85C" → "TEK531F85C"
function mpvToVista(mpv){
  if(!mpv)return '';
  const s=String(mpv).trim();
  return s.includes('_')?s.split('_').slice(1).join('_').toUpperCase():s.toUpperCase();
}

// ── Build master index keyed by VISTA Entity Code (UPPERCASE) ──
// Priority: Update COO Q1 → Previous MASTER COO (already ordered in S.masterRows)
// For same VISTA: newest Expired Date wins
// ── Build VISTA index — masterRows already filtered by expiry ──
// Priority preserved: Update COO Q1 rows come first in the array
function buildCostIdxFull(costRows, masterRows){
  // Priority: AJ_ prefix (Australia/AANZ) > อื่นๆ (RD_, VB_, ...)
  // ถ้า VISTA เดียวกันมีหลาย prefix → AJ_ ชนะเสมอ
  // ถ้าไม่มี AJ_ → ใช้ตัวแรกที่พบ (first wins จาก sheet ที่อยู่ก่อน)
  const m=new Map();
  masterRows.forEach(r=>{
    const vista=mpvToVista(r.mpvRep);
    if(!vista)return;
    const isAJ = String(r.mpvRep||'').trim().toUpperCase().startsWith('AJ_');
    const val = {
      mkt:r.mkt, tariff:r.tariff, rvc:r.rvc, csn:r.csn,
      dateApp:r.dateApp, descForm:r.descForm, prodEng:r.prodEng,
      _src:'master', _isAJ:isAJ,
    };
    if(!m.has(vista)){
      m.set(vista, val);          // ยังไม่มี → set ตัวแรก
    } else if(isAJ && !m.get(vista)._isAJ){
      m.set(vista, val);          // มีอยู่แล้วแต่เป็น non-AJ → แทนด้วย AJ_
    }
    // ถ้ามี AJ_ อยู่แล้ว → ไม่เปลี่ยน (AJ_ ชนะ)
  });
  return m;
}

  if(!vista)return null;
  return cIdx.get(vista.trim().toUpperCase())||null;
}

// Port of Discharge Code → BOL Sheet name (Vietnam)
const VN_PORT_MAP = {
  'VNHPH':'HAIPHONG',
  'VNSGN':'HO CHI MINH',
  'VNDAD':'DA NANG',
  'VNVUT':'VUNG TAU',
  'VNQNN':'QUY NHON',
};
function vnPortToBol(portCode, portName){
  if(!portCode&&!portName)return 'NO_BOL';
  const mapped = VN_PORT_MAP[String(portCode).trim().toUpperCase()];
  if(mapped)return mapped;
  // fallback: strip leading digits from port name e.g. "55224 HO CHI MINH C" → "HO CHI MINH"
  if(portName){
    const clean = String(portName).replace(/^\d+\s*/,'').replace(/\s+C\s*$/,'').trim().toUpperCase();
    if(clean)return clean;
  }
  return String(portCode||'NO_BOL').toUpperCase();
}

// ── VN Spreadsheet extractor ─────────────────
// Rule 1: ใช้ PCV Description เป็นหลัก — ถ้ามี PCV ห้าม fallback QAD — ถ้าไม่มี PCV → ใช้ QAD
function extractSS_VN(rows){
  return rows.map(r=>{
    const pcv = pick(r,['PCV Description']);
    const qad = pick(r,['QAD Description1','QAD Description']);
    const effDesc = pcv || qad;          // PCV primary; QAD fallback เฉพาะเมื่อไม่มี PCV
    return {
      vin:             normVinKey(pick(r,['VIN','VIN 3RD','Chassis No','Chassis Number'])),
      bolNumber:       vnPortToBol(
                         pick(r,['Port of Discharge Code']),
                         pick(r,['Port of Discharge Name'])
                       ),
      portCode:        pick(r,['Port of Discharge Code']),
      portName:        pick(r,['Port of Discharge Name']),
      vistaEntityCode: pick(r,['VISTA Entity Code']),
      pcvDesc:         pcv,              // raw PCV — สำหรับ grouping key + Description FORM fallback
      qadDesc:         qad,              // raw QAD — reference only
      qad1:            effDesc,          // effective: PCV || QAD
      htsCode:         toHtsNum(pick(r,['HTS code','HTS cod'])),
      engineSN:        pick(r,['Engine Serial Number']),
      colorDesc:       pick(r,['Color Description']),
      weightKg:        toN(pick(r,['Weight in KGs'])),
      lenM:            toN(pick(r,['Length in Meters'])),
      widM:            toN(pick(r,['Width in Meters'])),
      htM:             toN(pick(r,['Height in Meters'])),
      volM3:           toN(pick(r,['Volume in Cubic Meters'])),
      // VN: Total - Vehicle Invoice = AUD amount
      amt3AUD:         toN(pick(r,['Total - Vehicle Invoice','Amount 3RD(AUD)','Amount 3RD ( AUD )'])),
      drive:           pick(r,['Drive']),
      driveDesc:       pick(r,['Drive Description']),
      proforma:        pick(r,['Proforma Invoice Number','FTC Invoice Number','Proforma Invoice']),
    };
  }).filter(r=>r.vin)
}

// ── VN makeReport ────────────────────────────
// Rule 5: Amount TH จาก ใบขน Thai | Amount 3RD จาก Spreadsheet VN | FOB คำนวณแยก
// Rule 8: VIN ต้อง match Thai / HTS ต้องเป็น 6-digit / PORT ต้องไม่เป็น NO_BOL
function makeReport_VN(ss, thIdx, usd, aud, thb){
  return ss
    .filter(r => r.vin && r.bolNumber && r.bolNumber !== 'NO_BOL')   // PORT ไม่เป็น NO_BOL
    .map(r => {
      // VIN ต้อง match Thai — ไม่ match → ทิ้ง row
      const th = findThaiByVin(thIdx, r.vin);
      if(!th) return null;
      // HTS ต้อง valid (toHtsNum คืนเลข 6-digit หรือ '' ถ้า parse ไม่ได้)
      const htsNum = Number(r.htsCode);
      if(!r.htsCode || !Number.isFinite(htsNum) || htsNum <= 0) return null;
      const amtTh  = (th?.amtTh ?? 0);
      const amt3rd = r.amt3AUD || 0;
      // Rule 5: FOB TH = amtTH / USD | FOB 3RD = (AUD × rate) / USD
      const fobTh  = (usd>0 && amtTh>0) ? amtTh/usd : 0;
      const fob3rd = (usd>0 && aud>0)   ? (amt3rd*aud)/usd : 0;
      return {
        VIN:                      r.vin,
        'BoL Number':             r.bolNumber,        // port name จาก vnPortToBol
        'Proforma Invoice':       r.proforma,
        'Port of Discharge Code': r.portCode,
        'Port of Discharge Name': r.portName,
        'VISTA Entity Code':      r.vistaEntityCode,
        'QAD Description1':       r.qad1,             // effective: PCV || QAD
        'PCV Description':        r.pcvDesc,          // raw PCV — ใช้ group + descForm fallback
        'HTS code':               r.htsCode,
        'Engine Serial Number':   r.engineSN,
        'Color Description':      r.colorDesc,
        'Weight in KGs':          r.weightKg,
        'Length in Meters':       r.lenM,
        'Width in Meters':        r.widM,
        'Height in Meters':       r.htM,
        'Volume in Cubic Meters': r.volM3,
        'Total - Vehicle Invoice':amt3rd,
        Drive:                    r.drive,
        'Drive Description':      r.driveDesc,
        'FTC Invoice Number':     r.proforma,
        'Amount TH ( THB )':      amtTh,              // จาก Thai ใบขน
        'Amount 3RD ( AUD )':     amt3rd,             // จาก Spreadsheet VN
        'AUD อัตราแลกเปลี่ยน':   aud,
        'USD อัตราแลกเปลี่ยน':   usd,
        'FOB TH':                 fobTh,
        'FOB 3RD':                fob3rd,
        QTY:                      1,
        'INVOICE NO TH':          th?.invNo  || '',
        'Invoice Date':           th?.invDate || '',
      };
    })
    .filter(r => r !== null);
}

// ── VN makeBOL ───────────────────────────────
// Rule 2: split sheet ตาม PORT (BoL Number = port name จาก vnPortToBol) — ห้ามใช้ BoL Number เดิม
// Rule 3: group key = [VISTA, PCV Description, HTS, INVOICE NO TH, Invoice Date]
// Rule 4: Master lookup ด้วย VISTA Entity Code เท่านั้น (mpvToVista + AJ_ priority จาก buildCostIdxFull)
// Rule 6: sort VISTA → PCV Description → Invoice
// Rule 7: Description (FORM) = Master.descForm → PCV (ห้ามใช้ QAD)
function makeBOL_VN(rep, cIdx){
  const byPort = new Map();
  rep.filter(r => r['BoL Number'] && r['BoL Number'] !== 'NO_BOL')
    .forEach(r => {
      const p = r['BoL Number'];       // port name
      if(!byPort.has(p)) byPort.set(p, []);
      byPort.get(p).push(r);
    });

  const sheets = {};
  byPort.forEach((rows, port) => {
    const gm = new Map();
    rows.forEach(r => {
      const vista = String(r['VISTA Entity Code'] || '').trim().toUpperCase();
      const cr    = lookupCost(cIdx, vista);          // Rule 4: match by VISTA only
      const mkt      = cr?.mkt      || '';
      const rvc      = cr?.rvc      ?? '';
      const csn      = cr?.csn      || '';
      const dateApp  = cr?.dateApp  || '';
      const tariffCO = cr?.tariff   || '';
      const pcv      = r['PCV Description'] || '';
      // Rule 7: descForm = Master → PCV (NO QAD fallback)
      const descForm = cr?.descForm || pcv || '';
      const prodEng  = cr?.prodEng  || pcv || '';
      const hts      = r['HTS code'] || toHtsNum(tariffCO) || '';

      // Rule 3: group key = VISTA | PCV | HTS | INVOICE | Invoice Date
      const gk = [vista, pcv, hts, r['INVOICE NO TH'], r['Invoice Date']].join('||');
      if(!gm.has(gk)){
        gm.set(gk, {
          'BoL Number':          port,                  // port name (split key)
          'VISTA Entity Code':   r['VISTA Entity Code'],
          ITEM:                  0,
          'QAD Description1':    r['QAD Description1'], // effective (PCV||QAD) — สำหรับ column เดิม
          'PCV Description':     pcv,                   // raw PCV — สำหรับ sort + Form AU fallback
          'HTS cod':             hts,
          'INVOICE NO TH':       r['INVOICE NO TH'],
          'Invoice Date':        r['Invoice Date'],
          'ผลรวม ของ QTY':                    0,
          'ผลรวม ของ Weight in KGs':           0,
          'ผลรวม ของ Amount 3RD ( AUD )':      0,
          'ผลรวม ของ Amount TH ( THB )':       0,
          'ผลรวม ของ FOB TH':                  0,
          'ผลรวม ของ FOB 3RD':                 0,
          'Market / Privilege':  mkt,
          'Tariff on \nC/O':     tariffCO,
          'RVC (%)':             rvc,
          'Cost Structure No.':  csn,
          'Date Approval':       dateApp,
          'Description (FORM)':  descForm,
          'Product Eng Name':    prodEng,
        });
      }
      const b2 = gm.get(gk);
      b2['ผลรวม ของ QTY']                += toN(r.QTY) || 0;
      b2['ผลรวม ของ Weight in KGs']       += toN(r['Weight in KGs']) || 0;
      b2['ผลรวม ของ Amount 3RD ( AUD )']  += toN(r['Amount 3RD ( AUD )']) || 0;
      b2['ผลรวม ของ Amount TH ( THB )']   += toN(r['Amount TH ( THB )']) || 0;
      b2['ผลรวม ของ FOB TH']              += toN(r['FOB TH']) || 0;
      b2['ผลรวม ของ FOB 3RD']             += toN(r['FOB 3RD']) || 0;
    });

    // Rule 6: sort VISTA → PCV Description → Invoice
    let bolRows = Array.from(gm.values()).sort((a,b) => {
      const va = String(a['VISTA Entity Code'] || '').trim().toUpperCase();
      const vb = String(b['VISTA Entity Code'] || '').trim().toUpperCase();
      const v  = va.localeCompare(vb);
      if(v !== 0) return v;
      const da = String(a['PCV Description'] || '').trim().toUpperCase();
      const db = String(b['PCV Description'] || '').trim().toUpperCase();
      const d  = da.localeCompare(db);
      if(d !== 0) return d;
      return String(a['INVOICE NO TH']||'').localeCompare(String(b['INVOICE NO TH']||''));
    });
    bolRows = bolRows.map((x,i) => ({ ...x, ITEM: i+1 }));
    if(bolRows.length) sheets[port] = bolRows;
  });
  return sheets;
}

// ── VN recompute ─────────────────────────────
// Rule 9: VN recompute แยกจาก global — ใช้ SVN เท่านั้น (ห้ามใช้ S.report)
function recompute_VN(){
  const usd = Number(SVN.usd), aud = Number(SVN.aud), thb = Number(SVN.thb) || 1;
  if(!usd || !aud || !SVN.ssRows.length){
    SVN.report    = [];
    SVN.bolSheets = {};
    return;
  }
  const tIdx = buildThaiIdx(SVN.baikhonThaiRows);
  const cIdx = buildCostIdxFull([], SVN.masterRows);   // mpvToVista + AJ_ priority
  SVN.report    = makeReport_VN(SVN.ssRows, tIdx, usd, aud, thb);
  SVN.bolSheets = makeBOL_VN(SVN.report, cIdx);
}

// ── VN procFiles ─────────────────────────────
async function procFiles_VN(files, type){
  if(!files||!files.length)return;
  SVN.mapLoading=true;SVN.mapErr='';R();
  try{
    const books=await Promise.all(files.map(readWB));
    const rows=books.flatMap(wbToRows);
    if(type==='baikhon'){
      const existingNames=new Set(SVN.baikhonFiles.map(f=>f.name));
      const newFiles=files.filter(f=>!existingNames.has(f.name));
      if(!newFiles.length){toast('ไฟล์นี้อัปโหลดแล้ว','error');SVN.mapLoading=false;R();return}
      SVN.baikhonFiles=[...SVN.baikhonFiles,...newFiles];
      const allBooks=await Promise.all(SVN.baikhonFiles.map(readWB));
      SVN.baikhonRows=allBooks.flatMap(wbToRows);
      SVN.baikhonThaiRows=extractThai(SVN.baikhonRows);
    }
    if(type==='spreadsheet'){
      SVN.ssFiles=files;
      SVN.ssRows=extractSS_VN(rows);
      toast(SVN.ssRows.length+' VINs จาก Spreadsheet VN','success');
    }
    if(type==='cost_vn'){
      SVN.cFiles=files;
      const allMasterRows=[];
      const today=new Date();
      for(const wb2 of await Promise.all(files.map(readWB))){
        const PRIORITY=['Update COO Q1','Update COO Q2','Update COO Q3','Previous MASTER COO'];
        const ordered=[
          ...PRIORITY.filter(s=>wb2.SheetNames.includes(s)),
          ...wb2.SheetNames.filter(s=>!PRIORITY.includes(s)&&!/^Sheet\d*$/i.test(s)),
        ];
        for(const shName of ordered){
          const ws=wb2.Sheets[shName];if(!ws)continue;
          const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
          if(aoa.length<2)continue;
          const hdr=aoa[0].map(v=>String(v||'').replace(/[\n\r]+/g,' ').replace(/\s+/g,' ').trim().toUpperCase());
          const findCol=(...terms)=>{for(const t2 of terms){const tu=t2.toUpperCase().replace(/\s+/g,' ').trim();const idx=hdr.findIndex(h=>h===tu||h.includes(tu)||tu.includes(h));if(idx>=0)return idx;}return -1;};
          const ci={mpvRep:findCol('MPV CODE (REPRESENTATIVE)','MPV CODE REPRESENTATIVE'),mkt:findCol('MARKET / PRIVILEGE','MARKET/PRIVILEGE'),tariff:findCol('TARIFF ON C/O'),rvc:findCol('RVC (%)','RVC'),csn:findCol('COST STRUCTURE NO.','COST STRUCTURE NO'),dateApp:findCol('DATE APPROVAL','APPROVAL DATE'),expDate:findCol('EXPIRED DATE','EXPIRY DATE'),descForm:findCol('DESCRIPTION (FORM)','DESCRIPTION FORM'),prodEng:findCol('PRODUCT ENG NAME','PRODUCT ENG','ENG NAME')};
          if(ci.mpvRep<0||ci.csn<0)continue;
          for(let i=1;i<aoa.length;i++){
            const row=aoa[i];if(!row||!row.length)continue;
            const mpv=String(row[ci.mpvRep]||'').trim();const csn=String(row[ci.csn]||'').trim();
            if(!mpv||!csn)continue;
            let valid=true;if(ci.expDate>=0&&row[ci.expDate]){try{valid=new Date(row[ci.expDate])>=today}catch{}}
            if(!valid)continue;
            allMasterRows.push({mpvRep:mpv,mkt:ci.mkt>=0?String(row[ci.mkt]||''):'',tariff:ci.tariff>=0?row[ci.tariff]:'',rvc:ci.rvc>=0?row[ci.rvc]:'',csn,dateApp:ci.dateApp>=0?row[ci.dateApp]:'',expDate:ci.expDate>=0?row[ci.expDate]:'',descForm:ci.descForm>=0?String(row[ci.descForm]||''):'',prodEng:ci.prodEng>=0?String(row[ci.prodEng]||''):'',_sheet:shName});
          }
        }
      }
      SVN.masterRows=allMasterRows;SVN.masterSaved=false;
      if(!allMasterRows.length){toast('⚠️ ไม่พบข้อมูล Master VN','error');}
      else{const vs=new Set(allMasterRows.map(r=>mpvToVista(r.mpvRep)));toast(`✅ Master VN: ${allMasterRows.length} rows | ${vs.size} VISTA — กด SAVE`,'success');}
    }
    if(type==='formau_vn'){
      SVN.formAuFiles=[...files];
      const ex=[];
      for(const wb2 of await Promise.all(files.map(readWB))){ex.push(...extractFormAuExisting(wb2));}
      SVN.formAuExRows=ex;
      toast('Form AU เดิม: '+ex.length+' rows','success');
    }
    recompute_VN();
    if(type!=='spreadsheet')toast(files.length+' ไฟล์โหลดสำเร็จ','success');
  }catch(e){SVN.mapErr=e?.message||'ประมวลผลไฟล์ไม่สำเร็จ'}
  SVN.mapLoading=false;R();
}

async function removeBaikhon_VN(idx){
  SVN.baikhonFiles=SVN.baikhonFiles.filter((_,i)=>i!==idx);
  if(SVN.baikhonFiles.length){
    try{const books=await Promise.all(SVN.baikhonFiles.map(readWB));const r=books.flatMap(wbToRows);SVN.baikhonRows=r;SVN.baikhonThaiRows=extractThai(r);}
    catch{SVN.baikhonRows=[];SVN.baikhonThaiRows=[];}
  }else{SVN.baikhonRows=[];SVN.baikhonThaiRows=[];}
  recompute_VN();R();
}

  baikhonRows:[], ssRows:[], baikhonThaiRows:[],
  report:[], bolSheets:{},
  search:'', mapLoading:false, mapErr:'',
  masterRows:[], masterSaved:false,
};

// ── PH Spreadsheet extractor ─────────────────
// parse: BL, VIN, PCV Code, PCV Description, QAD Description, Engine SN, Color,
//        Weight, Volume, Total - Vehicle Invoice, VISTA Entity Code
function extractSS_PH(rows){
  return rows.map(r=>{
    const pcv = pick(r,['PCV Description']);
    const qad = pick(r,['QAD Description','QAD Description1']);
    const effDesc = pcv || qad;              // PCV primary — QAD fallback เฉพาะไม่มี PCV
    return {
      vin:             normVinKey(pick(r,['VIN','VIN 3RD','Chassis No','Chassis Number'])),
      bl:              String(pick(r,['BL','B/L','BL Number','BL No','BL No.','Bill of Lading','BoL Number'])||'').trim().toUpperCase(),
      pcvCode:         pick(r,['PCV Code']),
      pcvDesc:         pcv,
      qadDesc:         qad,
      effDesc:         effDesc,
      vistaEntityCode: pick(r,['VISTA Entity Code']),
      engineSN:        pick(r,['Engine Serial Number']),
      color:           pick(r,['Color']),
      colorDesc:       pick(r,['Color Description']),
      trim:            pick(r,['Trim']),
      trimDesc:        pick(r,['Trim Description']),
      weightKg:        toN(pick(r,['Weight in KGs'])),
      volM3:           toN(pick(r,['Volume in Cubic Meters'])),
      totalInv:        toN(pick(r,['Total - Vehicle Invoice'])),
      htsCode:         toHtsNum(pick(r,['HTS code','HTS cod','HTS'])),
    };
  }).filter(r => r.vin && r.bl);             // BL-based: ต้องมี BL (ไม่ใช้ port)
}

// ── PH makeReport ────────────────────────────
// Amount TH จาก Thai ใบขน | Total Invoice จาก Spreadsheet PH (ไม่แปลง AUD)
// Validation: VIN ต้อง match Thai / HTS ต้อง valid / BL ต้องมี
function makeReportPH(ss, thIdx, usd, thb){
  return ss
    .filter(r => r.vin && r.bl)
    .map(r => {
      const th = findThaiByVin(thIdx, r.vin);
      if(!th) return null;                   // VIN ไม่ match Thai → ตัด row
      const htsNum = Number(r.htsCode);
      if(!r.htsCode || !Number.isFinite(htsNum) || htsNum <= 0) return null;
      const amtTh   = (th?.amtTh ?? 0);
      const totalInv= r.totalInv || 0;
      const fobTh   = (usd>0 && amtTh>0)    ? amtTh/usd    : 0;
      const fob3rd  = (usd>0 && totalInv>0) ? totalInv/usd : totalInv;   // USD-based, no AUD
      return {
        BL:                       r.bl,
        VIN:                      r.vin,
        'PCV Code':               r.pcvCode,
        'PCV Description':        r.pcvDesc,
        'QAD Description':        r.qadDesc,
        'Engine Serial Number':   r.engineSN,
        Color:                    r.color || '',
        'Color Description':      r.colorDesc,
        Trim:                     r.trim || '',
        'Trim Description':       r.trimDesc || '',
        'Weight in KGs':          r.weightKg,
        'Volume in Cubic Meters': r.volM3,
        'Total - Vehicle Invoice':totalInv,
        'VISTA Entity Code':      r.vistaEntityCode,
        'Amount TH ( THB )':      amtTh,
        'Amount 3RD ( PHP )':     totalInv,          // map: Total-Vehicle Invoice → Amount 3RD (PHP)
        'AUD อัตราแลกเปลี่ยน':    '',                // PH ไม่มี AUD rate
        'USD อัตราแลกเปลี่ยน':    usd,
        'FOB TH':                 fobTh,
        'FOB 3RD':                fob3rd,            // ใช้ FOB 3RD แทน FOB PH
        QTY:                      1,
        'INVOICE NO TH':          th?.invNo   || '',
        'Invoice Date':           th?.invDate || '',
      };
    })
    .filter(r => r !== null);
}

// ── PH makeBOL ───────────────────────────────
// 1 BL = 1 sheet | group key = [BL, VISTA, QAD Description, INVOICE, Invoice Date]
// Master lookup: mpvToVista + AJ_ priority (ใช้ buildCostIdxFull/lookupCost เดิม)
// Description (FORM) = Master.descForm → PCV → QAD
// Sort: VISTA → QAD Description → Invoice
function makeBOL_PH(rep, cIdx){
  const byBL = new Map();
  rep.filter(r => r.BL).forEach(r => {
    if(!byBL.has(r.BL)) byBL.set(r.BL, []);
    byBL.get(r.BL).push(r);
  });

  const sheets = {};
  byBL.forEach((rows, bl) => {
    const gm = new Map();
    rows.forEach(r => {
      const vista = String(r['VISTA Entity Code'] || '').trim().toUpperCase();
      const cr    = lookupCost(cIdx, vista);
      const mkt      = cr?.mkt      || '';
      const rvc      = cr?.rvc      ?? '';
      const csn      = cr?.csn      || '';
      const dateApp  = cr?.dateApp  || '';
      const tariffCO = cr?.tariff   || '';
      const qadDesc  = r['QAD Description'] || '';
      const pcv      = r['PCV Description'] || '';
      const descForm = cr?.descForm || pcv || qadDesc || '';
      const prodEng  = cr?.prodEng  || pcv || qadDesc || '';

      // grouping key per reference: [BL, VISTA, QAD Description, INVOICE, Invoice Date]
      const gk = [bl, vista, qadDesc, r['INVOICE NO TH'], r['Invoice Date']].join('||');
      if(!gm.has(gk)){
        gm.set(gk, {
          BL:                   bl,
          'INVOICE NO TH':      r['INVOICE NO TH'],
          'Invoice Date':       r['Invoice Date'],
          'QAD Description':    qadDesc,
          'VISTA Entity Code':  r['VISTA Entity Code'],
          'ผลรวม ของ QTY':                         0,
          'ผลรวม ของ Weight in KGs':                0,
          'ผลรวม ของ Amount TH ( THB )':            0,
          'ผลรวม ของ Amount 3RD ( PHP )':           0,
          'ผลรวม ของ FOB TH':                       0,
          'ผลรวม ของ FOB 3RD':                      0,
          'Market / Privilege':  mkt,
          'Tariff on \nC/O':     tariffCO,
          'RVC (%)':             rvc,
          'Cost Structure No.':  csn,
          'Date Approval':       dateApp,
          'Description (FORM)':  descForm,
          'Product Eng Name':    prodEng,
        });
      }
      const b2 = gm.get(gk);
      b2['ผลรวม ของ QTY']                   += toN(r.QTY) || 0;
      b2['ผลรวม ของ Weight in KGs']          += toN(r['Weight in KGs']) || 0;
      b2['ผลรวม ของ Amount TH ( THB )']      += toN(r['Amount TH ( THB )']) || 0;
      b2['ผลรวม ของ Amount 3RD ( PHP )']     += toN(r['Amount 3RD ( PHP )']) || 0;
      b2['ผลรวม ของ FOB TH']                 += toN(r['FOB TH']) || 0;
      b2['ผลรวม ของ FOB 3RD']                += toN(r['FOB 3RD']) || 0;
    });

    const bolRows = Array.from(gm.values()).sort((a,b) => {
      const va = String(a['VISTA Entity Code'] || '').trim().toUpperCase();
      const vb = String(b['VISTA Entity Code'] || '').trim().toUpperCase();
      const v  = va.localeCompare(vb);
      if(v !== 0) return v;
      const da = String(a['QAD Description'] || '').trim().toUpperCase();
      const db = String(b['QAD Description'] || '').trim().toUpperCase();
      const d  = da.localeCompare(db);
      if(d !== 0) return d;
      return String(a['INVOICE NO TH']||'').localeCompare(String(b['INVOICE NO TH']||''));
    });
    // per spec: no ITEM numbering in PH BOL
    if(bolRows.length) sheets[bl] = bolRows;
  });
  return sheets;
}

// ── PH recompute ─────────────────────────────
// ใช้ SPH เท่านั้น (ไม่แตะ S หรือ SVN)
function recompute_PH(){
  const usd = Number(SPH.usd), thb = Number(SPH.thb) || 1;
  if(!usd || !SPH.ssRows.length){
    SPH.report    = [];
    SPH.bolSheets = {};
    return;
  }
  const tIdx = buildThaiIdx(SPH.baikhonThaiRows);
  const cIdx = buildCostIdxFull([], SPH.masterRows);
  SPH.report    = makeReportPH(SPH.ssRows, tIdx, usd, thb);
  SPH.bolSheets = makeBOL_PH(SPH.report, cIdx);
}

// ── PH file processor ────────────────────────
async function procFiles_PH(files, type){
  if(!files||!files.length)return;
  SPH.mapLoading=true;SPH.mapErr='';R();
  try{
    const books=await Promise.all(files.map(readWB));
    const rows=books.flatMap(wbToRows);
    if(type==='baikhon'){
      const existingNames=new Set(SPH.baikhonFiles.map(f=>f.name));
      const newFiles=files.filter(f=>!existingNames.has(f.name));
      if(!newFiles.length){toast('ไฟล์นี้อัปโหลดแล้ว','error');SPH.mapLoading=false;R();return}
      SPH.baikhonFiles=[...SPH.baikhonFiles,...newFiles];
      const allBooks=await Promise.all(SPH.baikhonFiles.map(readWB));
      SPH.baikhonRows=allBooks.flatMap(wbToRows);
      SPH.baikhonThaiRows=extractThai(SPH.baikhonRows);
    }
    if(type==='spreadsheet'){
      SPH.ssFiles=files;
      SPH.ssRows=extractSS_PH(rows);
      toast(SPH.ssRows.length+' VINs จาก Spreadsheet PH','success');
    }
    if(type==='cost_ph'){
      SPH.cFiles=files;
      const allMasterRows=[];
      const today=new Date();
      for(const wb2 of await Promise.all(files.map(readWB))){
        const PRIORITY=['Update COO Q1','Update COO Q2','Update COO Q3','Previous MASTER COO'];
        const ordered=[
          ...PRIORITY.filter(s=>wb2.SheetNames.includes(s)),
          ...wb2.SheetNames.filter(s=>!PRIORITY.includes(s)&&!/^Sheet\d*$/i.test(s)),
        ];
        for(const shName of ordered){
          const ws=wb2.Sheets[shName];if(!ws)continue;
          const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
          if(aoa.length<2)continue;
          const hdr=aoa[0].map(v=>String(v||'').replace(/[\n\r]+/g,' ').replace(/\s+/g,' ').trim().toUpperCase());
          const findCol=(...terms)=>{for(const t2 of terms){const tu=t2.toUpperCase().replace(/\s+/g,' ').trim();const idx=hdr.findIndex(h=>h===tu||h.includes(tu)||tu.includes(h));if(idx>=0)return idx;}return -1;};
          const ci={mpvRep:findCol('MPV CODE (REPRESENTATIVE)','MPV CODE REPRESENTATIVE'),mkt:findCol('MARKET / PRIVILEGE','MARKET/PRIVILEGE'),tariff:findCol('TARIFF ON C/O'),rvc:findCol('RVC (%)','RVC'),csn:findCol('COST STRUCTURE NO.','COST STRUCTURE NO'),dateApp:findCol('DATE APPROVAL','APPROVAL DATE'),expDate:findCol('EXPIRED DATE','EXPIRY DATE'),descForm:findCol('DESCRIPTION (FORM)','DESCRIPTION FORM'),prodEng:findCol('PRODUCT ENG NAME','PRODUCT ENG','ENG NAME')};
          if(ci.mpvRep<0||ci.csn<0)continue;
          for(let i=1;i<aoa.length;i++){
            const row=aoa[i];if(!row||!row.length)continue;
            const mpv=String(row[ci.mpvRep]||'').trim();const csn=String(row[ci.csn]||'').trim();
            if(!mpv||!csn)continue;
            let valid=true;if(ci.expDate>=0&&row[ci.expDate]){try{valid=new Date(row[ci.expDate])>=today}catch{}}
            if(!valid)continue;
            allMasterRows.push({mpvRep:mpv,mkt:ci.mkt>=0?String(row[ci.mkt]||''):'',tariff:ci.tariff>=0?row[ci.tariff]:'',rvc:ci.rvc>=0?row[ci.rvc]:'',csn,dateApp:ci.dateApp>=0?row[ci.dateApp]:'',expDate:ci.expDate>=0?row[ci.expDate]:'',descForm:ci.descForm>=0?String(row[ci.descForm]||''):'',prodEng:ci.prodEng>=0?String(row[ci.prodEng]||''):'',_sheet:shName});
          }
        }
      }
      SPH.masterRows=allMasterRows;SPH.masterSaved=false;
      if(!allMasterRows.length){toast('⚠️ ไม่พบข้อมูล Master PH','error');}
      else{const vs=new Set(allMasterRows.map(r=>mpvToVista(r.mpvRep)));toast(`✅ Master PH: ${allMasterRows.length} rows | ${vs.size} VISTA — กด SAVE`,'success');}
    }
    recompute_PH();
    if(type!=='spreadsheet')toast(files.length+' ไฟล์โหลดสำเร็จ','success');
  }catch(e){SPH.mapErr=e?.message||'ประมวลผลไฟล์ไม่สำเร็จ'}
  SPH.mapLoading=false;R();
}

async function removeBaikhon_PH(idx){
  SPH.baikhonFiles=SPH.baikhonFiles.filter((_,i)=>i!==idx);
  if(SPH.baikhonFiles.length){
    try{const books=await Promise.all(SPH.baikhonFiles.map(readWB));const r=books.flatMap(wbToRows);SPH.baikhonRows=r;SPH.baikhonThaiRows=extractThai(r);}
    catch{SPH.baikhonRows=[];SPH.baikhonThaiRows=[];}
  }else{SPH.baikhonRows=[];SPH.baikhonThaiRows=[];}
  recompute_PH();R();
}

// ── PH Export BOL ────────────────────────────
function doExportXLSX_PH(){
  if(!requireXLSX())return;
  if(!Number(SPH.usd)){toast('กรุณากรอก USD Rate','error');return;}
  if(!SPH.report.length){toast('ยังไม่มีข้อมูล','error');return;}
  const wb=XLSX.utils.book_new();const used=new Set();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Control','Value'],['USD Rate',SPH.usd],['THB Rate',SPH.thb],['Generated At',new Date().toISOString()]]),safeSheet('CONTROL',used));
  const r1Cols=['BL','VIN','PCV Code','PCV Description','QAD Description','Engine Serial Number','Color','Color Description','Trim','Trim Description','Weight in KGs','Volume in Cubic Meters','Total - Vehicle Invoice','VISTA Entity Code','Amount TH ( THB )','Amount 3RD ( PHP )','AUD อัตราแลกเปลี่ยน','USD อัตราแลกเปลี่ยน','FOB TH','FOB 3RD','QTY','INVOICE NO TH','Invoice Date'];
  const padLen=r1Cols.length+1;
  const r1Aoa=[new Array(padLen).fill(''),['','','','Report 1 PH',...new Array(padLen-4).fill('')],new Array(padLen).fill(''),['',...r1Cols],...SPH.report.map(r=>['',...r1Cols.map(c=>r[c]??'')])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(r1Aoa),safeSheet('Report 1',used));
  const bolCols=['BL','INVOICE NO TH','Invoice Date','QAD Description','VISTA Entity Code','ผลรวม ของ QTY','ผลรวม ของ Weight in KGs','ผลรวม ของ Amount TH ( THB )','ผลรวม ของ Amount 3RD ( PHP )','ผลรวม ของ FOB TH','ผลรวม ของ FOB 3RD','Market / Privilege','Tariff on \nC/O','RVC (%)','Cost Structure No.','Date Approval','Description (FORM)','Product Eng Name'];
  Object.entries(SPH.bolSheets).forEach(([b,rows])=>{
    const dataRows=rows.map(r=>bolCols.map(c=>{
      if(c==='Date Approval'||c==='Invoice Date')return fmtDateBOL(r[c]);
      return r[c]??'';
    }));
    const totalRow=makeBolTotalRow(bolCols,rows);
    const aoa=[bolCols,...dataRows,totalRow];
    const ws2=XLSX.utils.aoa_to_sheet(aoa);
    const totalRowIdx=dataRows.length+1;
    bolCols.forEach((_,ci)=>{
      const cellRef=XLSX.utils.encode_cell({r:totalRowIdx,c:ci});
      if(!ws2[cellRef])ws2[cellRef]={v:'',t:'s'};
      ws2[cellRef].s={font:{bold:true},fill:{fgColor:{rgb:'FEF3C7'}},border:{top:{style:'thin',color:{rgb:'F59E0B'}}}};
    });
    XLSX.utils.book_append_sheet(wb,ws2,safeSheet(b,used));
  });
  try{
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='Mapping_FORM_PH_Output.xlsx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    toast('Export BOL PH สำเร็จ! 📥','success');
  }catch(err){toast('Export ผิดพลาด: '+err.message,'error');}
}

          'Cost Structure No.':  csn,
          'Date Approval':       dateApp,
          'Description (FORM)':  descForm,
          'Product Eng Name':    prodEng,
        });
      }
      const b2 = gm.get(gk);
      b2['ผลรวม ของ QTY']                 += toN(r.QTY) || 0;
      b2['ผลรวม ของ WeightinKGs']          += toN(r.WeightinKGs) || 0;
      b2['ผลรวม ของ Amount TH ( THB )']    += toN(r['Amount TH ( THB )']) || 0;
      b2['ผลรวม ของ Total-VehicleInvoice'] += toN(r['Total-VehicleInvoice']) || 0;
      b2['ผลรวม ของ FOB TH']               += toN(r['FOB TH']) || 0;
      b2['ผลรวม ของ FOB MY']               += toN(r['FOB MY']) || 0;
    });

    let bolRows = Array.from(gm.values()).sort((a,b) => {
      const va = String(a.VISTAEntityCode || '').trim().toUpperCase();
      const vb = String(b.VISTAEntityCode || '').trim().toUpperCase();
      const v  = va.localeCompare(vb);
      if(v !== 0) return v;
      const da = String(a.Description || '').trim().toUpperCase();
      const db = String(b.Description || '').trim().toUpperCase();
      const d  = da.localeCompare(db);
      if(d !== 0) return d;
      return String(a['INVOICE NO TH']||'').localeCompare(String(b['INVOICE NO TH']||''));
    });
    bolRows = bolRows.map((x,i) => ({ ...x, ITEM: i+1 }));
    if(bolRows.length) sheets[bl] = bolRows;
  });
  return sheets;
}

// ── MY file processor ────────────────────────
async function procFiles_MY(files, type){
  if(!files||!files.length)return;
  SMY.mapLoading=true;SMY.mapErr='';R();
  try{
    const books=await Promise.all(files.map(readWB));
    const rows=books.flatMap(wbToRows);
    if(type==='baikhon'){
      const existingNames=new Set(SMY.baikhonFiles.map(f=>f.name));
      const newFiles=files.filter(f=>!existingNames.has(f.name));
      if(!newFiles.length){toast('ไฟล์นี้อัปโหลดแล้ว','error');SMY.mapLoading=false;R();return}
      SMY.baikhonFiles=[...SMY.baikhonFiles,...newFiles];
      const allBooks=await Promise.all(SMY.baikhonFiles.map(readWB));
      SMY.baikhonRows=allBooks.flatMap(wbToRows);
      SMY.baikhonThaiRows=extractThai(SMY.baikhonRows);
    }
    if(type==='spreadsheet'){
      SMY.ssFiles=files;
      SMY.ssRows=extractSS_MY(rows);
      toast(SMY.ssRows.length+' VINs จาก Spreadsheet MY','success');
    }
    if(type==='cost_my'){
      SMY.cFiles=files;
      const allMasterRows=[];
      const today=new Date();
      for(const wb2 of await Promise.all(files.map(readWB))){
        const PRIORITY=['Update COO Q1','Update COO Q2','Update COO Q3','Previous MASTER COO'];
        const ordered=[
          ...PRIORITY.filter(s=>wb2.SheetNames.includes(s)),
          ...wb2.SheetNames.filter(s=>!PRIORITY.includes(s)&&!/^Sheet\d*$/i.test(s)),
        ];
        for(const shName of ordered){
          const ws=wb2.Sheets[shName];if(!ws)continue;
          const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
          if(aoa.length<2)continue;
          const hdr=aoa[0].map(v=>String(v||'').replace(/[\n\r]+/g,' ').replace(/\s+/g,' ').trim().toUpperCase());
          const findCol=(...terms)=>{for(const t2 of terms){const tu=t2.toUpperCase().replace(/\s+/g,' ').trim();const idx=hdr.findIndex(h=>h===tu||h.includes(tu)||tu.includes(h));if(idx>=0)return idx;}return -1;};
          const ci={mpvRep:findCol('MPV CODE (REPRESENTATIVE)','MPV CODE REPRESENTATIVE'),mkt:findCol('MARKET / PRIVILEGE','MARKET/PRIVILEGE'),tariff:findCol('TARIFF ON C/O'),rvc:findCol('RVC (%)','RVC'),csn:findCol('COST STRUCTURE NO.','COST STRUCTURE NO'),dateApp:findCol('DATE APPROVAL','APPROVAL DATE'),expDate:findCol('EXPIRED DATE','EXPIRY DATE'),descForm:findCol('DESCRIPTION (FORM)','DESCRIPTION FORM'),prodEng:findCol('PRODUCT ENG NAME','PRODUCT ENG','ENG NAME')};
          if(ci.mpvRep<0||ci.csn<0)continue;
          for(let i=1;i<aoa.length;i++){
            const row=aoa[i];if(!row||!row.length)continue;
            const mpv=String(row[ci.mpvRep]||'').trim();const csn=String(row[ci.csn]||'').trim();
            if(!mpv||!csn)continue;
            let valid=true;if(ci.expDate>=0&&row[ci.expDate]){try{valid=new Date(row[ci.expDate])>=today}catch{}}
            if(!valid)continue;
            allMasterRows.push({mpvRep:mpv,mkt:ci.mkt>=0?String(row[ci.mkt]||''):'',tariff:ci.tariff>=0?row[ci.tariff]:'',rvc:ci.rvc>=0?row[ci.rvc]:'',csn,dateApp:ci.dateApp>=0?row[ci.dateApp]:'',expDate:ci.expDate>=0?row[ci.expDate]:'',descForm:ci.descForm>=0?String(row[ci.descForm]||''):'',prodEng:ci.prodEng>=0?String(row[ci.prodEng]||''):'',_sheet:shName});
          }
        }
      }
      SMY.masterRows=allMasterRows;SMY.masterSaved=false;
      if(!allMasterRows.length){toast('⚠️ ไม่พบข้อมูล Master MY','error');}
      else{const vs=new Set(allMasterRows.map(r=>mpvToVista(r.mpvRep)));toast(`✅ Master MY: ${allMasterRows.length} rows | ${vs.size} VISTA — กด SAVE`,'success');}
    }
    recompute_MY();
    if(type!=='spreadsheet')toast(files.length+' ไฟล์โหลดสำเร็จ','success');
  }catch(e){SMY.mapErr=e?.message||'ประมวลผลไฟล์ไม่สำเร็จ'}
  SMY.mapLoading=false;R();
}

async function removeBaikhon_MY(idx){
  SMY.baikhonFiles=SMY.baikhonFiles.filter((_,i)=>i!==idx);
  if(SMY.baikhonFiles.length){
    try{const books=await Promise.all(SMY.baikhonFiles.map(readWB));const r=books.flatMap(wbToRows);SMY.baikhonRows=r;SMY.baikhonThaiRows=extractThai(r);}
    catch{SMY.baikhonRows=[];SMY.baikhonThaiRows=[];}

}

  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(r1Aoa),safeSheet('Report 1 MY',used));

  Object.entries(SMY.bolSheets).forEach(([b,rows])=>{
    const dataRows=rows.map(r=>bolCols.map(c=>{
      if(c==='Date Approval'||c==='Invoice Date')return fmtDateBOL(r[c]);
      return r[c]??'';
    }));

    setTimeout(()=>URL.revokeObjectURL(url),3000);

function el(tag, props={}, children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='cls'){e.className=v}
    else e.setAttribute(k,v);
  });
  children.forEach(c=>c!=null&&(typeof c==='string'?e.appendChild(document.createTextNode(c)):e.appendChild(c)));
  return e;
}
function d(cls, children=[], style={}){
  const div=document.createElement('div');
  if(cls)div.className=cls;
  Object.assign(div.style,style);
  children.forEach(c=>c!=null&&(typeof c==='string'?div.appendChild(document.createTextNode(c)):div.appendChild(c)));
  return div;
}

async function doLogin(){
  if(S.loginLoad)return;
  S.loginLoad=true;S.loginErr='';R();

  // ── Step 1: เช็ค LOCAL_USERS ก่อนเสมอ (ใช้ได้ทั้ง file:// และ Web) ──
  const localMatch = LOCAL_USERS.find(u=>u.username===S.loginUser.trim()&&u.password===S.loginPass);
  if(localMatch){
    S.user={username:localMatch.username,role:localMatch.role,email:localMatch.email};
    S.loginLoad=false;R();return;
  }

  // ── Step 2: ถ้าเป็น file:// และไม่ตรง local → แจ้ง error ──
  if(IS_FILE_PROTO){
    S.loginErr='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
    S.loginLoad=false;R();return;
  }

  // ── Step 3: Supabase auth (เฉพาะ Web Server) ──
  try{
    const email=S.loginUser.includes('@')?S.loginUser:`${S.loginUser.trim()}@njlogistics.local`;
    const {data,error}=await sb.auth.signInWithPassword({email,password:S.loginPass});
    if(error)throw error;
    const meta=data.user?.user_metadata||{};
    S.user={username:meta.username||S.loginUser,role:meta.role||'User',email:data.user.email,id:data.user.id};
  }catch(e){
    S.loginErr=e.message==='Invalid login credentials'?'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง':e.message;
  }
  S.loginLoad=false;R();
}

async function doRegister(){
  if(S.regLoad)return;
  S.regErr='';
  if(!S.regUser||!S.regPass||!S.regEmail){S.regErr='กรุณากรอกข้อมูลให้ครบทุกช่อง';R();return}
  if(S.regPass!==S.regConf){S.regErr='รหัสผ่านไม่ตรงกัน';R();return}
  if(S.regPass.length<6){S.regErr='รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';R();return}
  if(LOCAL_USERS.some(u=>u.username===S.regUser.trim())){S.regErr='ชื่อผู้ใช้นี้ไม่สามารถใช้ได้';R();return}
  S.regLoad=true;R();
  try{
    const {error}=await sb.auth.signUp({
      email:S.regEmail, password:S.regPass,
      options:{data:{username:S.regUser,role:'User',display_name:S.regUser}},
    });
    if(error)throw error;
    S.regOk=true;
  }catch(e){S.regErr=e.message}
  S.regLoad=false;R();
}

async function doGitHub(){
  try{
    const {error}=await sb.auth.signInWithOAuth({
      provider:'github',
      options:{redirectTo:window.location.href},
    });
    if(error)throw error;
  }catch(e){toast('GitHub OAuth: '+e.message,'error')}
}

async function doLogout(){
  if(S.user?.id&&!IS_FILE_PROTO)await sb.auth.signOut();
  S.user=null;S.page='login';S.loginUser='';S.loginPass='';S.loginErr='';
  S.report=[];S.bolSheets={};S.ssRows=[];S.thaiRows=[];S.costRows=[];S.baikhonRows=[];S.baikhonThaiRows=[];
  S.baikhonFiles=[];S.ssFiles=[];S.cFiles=[];R();
}

function uploadTab(){
  const wrap=document.createElement('div');

  // helper: green-style card
  function mkCard(hasFile){

      background:hasFile?'rgba(34,197,94,0.07)':'rgba(255,255,255,0.05)',
      borderRadius:'14px',
      border:hasFile?'1.5px solid rgba(34,197,94,0.45)':'1px solid rgba(255,255,255,0.09)',

    });
  }
  // helper: compact drop zone
  function mkZone(icon, line1, line2, hasFile){
    const z=d('upload-zone',[], {
      padding:'10px 8px',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:'3px',
      borderColor:hasFile?'rgba(34,197,94,0.35)':'rgba(255,255,255,0.14)',

    return z;
  }
  // helper: file pill with X
  function mkPill(fname, onDel){
    const p=d('file-pill',[], {justifyContent:'space-between',paddingRight:'5px',fontSize:'10px'});
    p.appendChild(t('📄',{fontSize:'12px',flexShrink:'0'}));

    x.onclick=e=>{e.stopPropagation();onDel()};p.appendChild(x);return p;
  }
  // helper: card title row
  function mkTitle(icon, label, hasFile, countLabel){
    const row=d('',[], {display:'flex',alignItems:'center',gap:'6px'});
    row.appendChild(t(icon,{fontSize:'15px'}));
    row.appendChild(t(label,{color:hasFile?'#4ade80':'#f1f5f9',fontWeight:'700',fontSize:'13px',flex:'1'}));
    if(hasFile){

      b.appendChild(t('✓',{color:'#4ade80',fontSize:'9px',fontWeight:'800'}));
      b.appendChild(t(countLabel,{color:'#4ade80',fontSize:'10px',fontWeight:'600'}));
      row.appendChild(b);
    }
    return row;
  }

  // ── 3-column grid ─────────────────────────────
  const grid3=d('',[], {display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'14px'});

  // ── 1) ใบขน ────────────────────────────────────
  const bkHas=S.baikhonFiles.length>0;
  const bkCard=mkCard(bkHas);
  bkCard.appendChild(mkTitle('📋','ใบขน',bkHas,S.baikhonFiles.length+' ไฟล์'));
  const bkZone=mkZone(bkHas?'✅':'📂', bkHas?'เพิ่มใบขนได้อีก':'วางหรือคลิกเพื่อเลือก', '.xlsx/.xls • หลายไฟล์', bkHas);
  const bkInp=document.createElement('input');bkInp.type='file';bkInp.accept='.xlsx,.xls';bkInp.multiple=true;bkInp.style.display='none';
  bkInp.onchange=e=>procFiles(Array.from(e.target.files),'baikhon',true);
  bkZone.ondragover=e=>{e.preventDefault();bkZone.classList.add('drag')};
  bkZone.ondragleave=()=>bkZone.classList.remove('drag');

  bkZone.onclick=()=>bkInp.click();bkZone.appendChild(bkInp);bkCard.appendChild(bkZone);
  // file pills

      S.ssFiles=S.ssFiles.filter((_,i)=>i!==idx);

    const delBtn=document.createElement('button');delBtn.innerHTML='🗑️';

    ctTitleRow.appendChild(delBtn);
  } else if(costHas){
    const validCnt=S.masterRows.filter(isValidMaster).length;
    const cntBadge=d('',[], {background:'rgba(168,85,247,0.18)',borderRadius:'20px',padding:'2px 8px'});

async function removeBaikhon(idx){
  S.baikhonFiles=S.baikhonFiles.filter((_,i)=>i!==idx);
  // recompute baikhon rows from remaining files
  if(S.baikhonFiles.length){
    try{const books=await Promise.all(S.baikhonFiles.map(readWB));const r=books.flatMap(wbToRows);S.baikhonRows=r;S.baikhonThaiRows=extractThai(r);}
    catch{S.baikhonRows=[];S.baikhonThaiRows=[];}
  } else {S.baikhonRows=[];S.baikhonThaiRows=[];}
  recompute();R();
}

async function procFiles(files, type, append=false){
  if(!files||!files.length)return;
  S.mapLoading=true;S.mapErr='';R();
  try{
    const books=await Promise.all(files.map(readWB));
    const rows=books.flatMap(wbToRows);
    if(type==='baikhon'){
      // accumulate — append new files
      const existingNames=new Set(S.baikhonFiles.map(f=>f.name));
      const newFiles=files.filter(f=>!existingNames.has(f.name));
      if(!newFiles.length){toast('ไฟล์นี้อัปโหลดแล้ว','error');S.mapLoading=false;R();return}
      S.baikhonFiles=[...S.baikhonFiles,...newFiles];
      // rebuild rows from ALL baikhon files
      const allBooks=await Promise.all(S.baikhonFiles.map(readWB));
      S.baikhonRows=allBooks.flatMap(wbToRows);
      // *** extract Thai rows from ใบขน for VIN matching ***
      S.baikhonThaiRows=extractThai(S.baikhonRows);
    }
    if(type==='spreadsheet'){S.ssFiles=files;S.ssRows=extractSS(rows)}
    if(type==='cost'){
      // ต้นทุน = Master file (Update COO Q1 → Previous MASTER COO)
      S.cFiles=files;
      const allMasterRows=[];
      const today=new Date();

      for(const wb2 of await Promise.all(files.map(readWB))){
        const PRIORITY=['Update COO Q1','Update COO Q2','Update COO Q3','Previous MASTER COO'];
        const ordered=[
          ...PRIORITY.filter(s=>wb2.SheetNames.includes(s)),
          ...wb2.SheetNames.filter(s=>!PRIORITY.includes(s)&&!/^Sheet\d*$/i.test(s)),
        ];

        for(const shName of ordered){
          const ws=wb2.Sheets[shName];
          if(!ws)continue;

          // ── AOA approach: 100% immune to column name variations ──
          const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
          if(aoa.length<2)continue;

          // Normalize header row: collapse all whitespace/newlines → single space
          const hdr=aoa[0].map(v=>String(v||'').replace(/[\n\r]+/g,' ').replace(/\s+/g,' ').trim().toUpperCase());

          // Find column by fuzzy match
          const findCol=(...terms)=>{
            for(const t of terms){
              const tu=t.toUpperCase().replace(/\s+/g,' ').trim();
              const idx=hdr.findIndex(h=>h===tu||h.includes(tu)||tu.includes(h));
              if(idx>=0)return idx;
            }
            return -1;
          };

          const ci={
            mpvRep:  findCol('MPV CODE (REPRESENTATIVE)','MPV CODE REPRESENTATIVE'),
            mkt:     findCol('MARKET / PRIVILEGE','MARKET/PRIVILEGE'),
            tariff:  findCol('TARIFF ON C/O','TARIFF ON C/O'),
            rvc:     findCol('RVC (%)','RVC'),
            csn:     findCol('COST STRUCTURE NO.','COST STRUCTURE NO','COST STRUCTURE NUMBER'),
            dateApp: findCol('DATE APPROVAL','APPROVAL DATE'),
            expDate: findCol('EXPIRED DATE','EXPIRY DATE','EXPIRE DATE'),
            descForm:findCol('DESCRIPTION (FORM)','DESCRIPTION FORM'),
            prodEng: findCol('PRODUCT ENG NAME','PRODUCT ENG','ENG NAME'),
          };

          // Skip if no MPV Code or CSN column found
          if(ci.mpvRep<0||ci.csn<0)continue;

          for(let i=1;i<aoa.length;i++){
            const row=aoa[i];
            if(!row||!row.length)continue;
            const mpv=String(row[ci.mpvRep]||'').trim();
            const csn=String(row[ci.csn]||'').trim();
            if(!mpv||!csn)continue;

            // Check expiry
            let valid=true;
            if(ci.expDate>=0&&row[ci.expDate]){
              try{valid=new Date(row[ci.expDate])>=today}catch{}
            }
            if(!valid)continue;

            allMasterRows.push({
              mpvRep:  mpv,
              mkt:     ci.mkt>=0    ?String(row[ci.mkt]||'')   :'',
              tariff:  ci.tariff>=0  ?row[ci.tariff]             :'',
              rvc:     ci.rvc>=0     ?row[ci.rvc]                :'',
              csn:     csn,
              dateApp: ci.dateApp>=0 ?row[ci.dateApp]            :'',
              expDate: ci.expDate>=0 ?row[ci.expDate]            :'',
              descForm:ci.descForm>=0?String(row[ci.descForm]||''):'',
              prodEng: ci.prodEng>=0 ?String(row[ci.prodEng]||'') :'',
              _sheet:  shName,
            });
          }
        }
      }

      S.masterRows=allMasterRows;
      S.masterSaved=false;
      if(!allMasterRows.length){
        toast('⚠️ ไม่พบข้อมูล Master — ตรวจสอบว่าไฟล์มี sheet "Update COO Q1/Q2/Q3" หรือ "Previous MASTER COO"','error');
      } else {
        const vistaSet=new Set(allMasterRows.map(r=>mpvToVista(r.mpvRep)));
        toast(`✅ ต้นทุน/Master: ${allMasterRows.length} rows | ${vistaSet.size} VISTA codes — กด SAVE เพื่อบันทึก`,'success');
      }
    }
    if(type==='master'){
      // legacy fallback — same as cost
      S.masterRows=extractMaster(rows);
      S.masterSaved=false;
    }
    recompute();
    const added=type==='baikhon'?files.filter(f=>S.baikhonFiles.some(x=>x.name===f.name)).length:files.length;
    toast(added+' ไฟล์โหลดสำเร็จ','success');
  }catch(e){S.mapErr=e?.message||'ประมวลผลไฟล์ไม่สำเร็จ'}
  S.mapLoading=false;R();
}

// ── MY Report Tab ─────────────────────────────
function reportTabMY(){
  const q=SMY.search.trim().toLowerCase();
  const preview=q?SMY.report.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q)):SMY.report;
  const wrap=d('card',[], {padding:'0',overflow:'hidden',border:'1px solid rgba(16,185,129,0.2)'});
  const sb2=d('search-box');
  sb2.appendChild(t('🔍',{fontSize:'16px'}));
  const si=document.createElement('input');si.value=SMY.search;si.placeholder='ค้นหา VIN / BoL / Invoice...';si.className='search-inp';
  si.oninput=e=>{SMY.search=e.target.value;R()};
  sb2.appendChild(si);sb2.appendChild(t(preview.length+' rows',{color:'#64748b',fontSize:'12px',whiteSpace:'nowrap'}));
  wrap.appendChild(sb2);
  const scroll=d('',[], {overflowX:'auto'});
  const cols=['VIN','BoLNumber','VISTAEntityCode','Description','Total-VehicleInvoice','Amount TH ( THB )','FOB TH','FOB MY','INVOICE NO TH','Invoice Date'];
  const tb=document.createElement('table');
  const thead=document.createElement('thead');const htr=document.createElement('tr');
  cols.forEach(h=>{const th2=document.createElement('th');th2.textContent=h;htr.appendChild(th2)});
  thead.appendChild(htr);tb.appendChild(thead);
  const tbody=document.createElement('tbody');
  if(!preview.length){const tr=document.createElement('tr');const td=document.createElement('td');td.colSpan=cols.length;td.textContent='ยังไม่มีข้อมูล — กรุณาอัปโหลดไฟล์ในแท็บ Upload';Object.assign(td.style,{padding:'40px',textAlign:'center',color:'#64748b'});tr.appendChild(td);tbody.appendChild(tr)}
  else preview.slice(0,500).forEach(r=>{const tr=document.createElement('tr');cols.forEach(k=>{const td=document.createElement('td');const v=r[k];td.textContent=typeof v==='number'?v.toFixed(4):(v||'—');tr.appendChild(td)});tbody.appendChild(tr)});
  tb.appendChild(tbody);scroll.appendChild(tb);wrap.appendChild(scroll);

  return wrap;
}

// ════════════════════════════════════════════
//  INIT — Handle OAuth callback + session
// ════════════════════════════════════════════
(async function init(){
  // Load saved Master/ต้นทุน rows
  try{const saved=await loadMasterFromStorage();if(saved&&saved.length){S.masterRows=saved;S.masterSaved=true;}}catch{}
  try{const savedVN=localStorage.getItem('nj_master_rows_vn');if(savedVN){const r=JSON.parse(savedVN);if(r&&r.length){SVN.masterRows=r;SVN.masterSaved=true;}}}catch{}
  try{const savedPH=localStorage.getItem('nj_master_rows_ph');if(savedPH){const r=JSON.parse(savedPH);if(r&&r.length){SPH.masterRows=r;SPH.masterSaved=true;}}}catch{}
  try{const savedMY=localStorage.getItem('nj_master_rows_my');if(savedMY){const r=JSON.parse(savedMY);if(r&&r.length){SMY.masterRows=r;SMY.masterSaved=true;}}}catch{}
  if(!IS_FILE_PROTO){
    // ── รัน Web Server: ใช้ Supabase session ปกติ ──
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(session?.user){
        const meta=session.user.user_metadata||{};
        S.user={
          username:meta.username||meta.full_name||session.user.email?.split('@')[0]||'User',
          role:meta.role||'User',email:session.user.email,id:session.user.id,
        };
      }
      sb.auth.onAuthStateChange((event, session)=>{
        if(event==='SIGNED_IN'&&session?.user){
          const meta=session.user.user_metadata||{};
          S.user={
            username:meta.username||meta.full_name||session.user.email?.split('@')[0]||'User',
            role:meta.role||'User',email:session.user.email,id:session.user.id,
          };
          S.authLoading=false;R();
        } else if(event==='SIGNED_OUT'){
          S.user=null;S.authLoading=false;R();
        }
      });
    }catch(e){console.error('Init error:',e)}
  }
  // ── file:// หรือ Web: ให้ login form ทำงานปกติ ──
  S.authLoading=false;R();
})();
</script>
